# Synthetic clone cohort: the 11 production KMC opportunities -> one labs-only
# "KMC (Synthetic)" program.
#
# This is a CLONE cohort spec (distinct from the synthetic_env_ensure templates in
# ../envs/, which seed workflows into opps that already exist). It is consumed by the
# two-phase clone via the connect_labs MCP tools:
#
#   1. synthetic_clone_profile(spec_yaml = <this file's contents>)
#        Phase 1 (reads the real opps server-side, writes aggregate bundles to GDrive).
#        Returns the spec with bundle_root resolved to gdrive:<folder_id>.
#   2. synthetic_clone_generate(spec_yaml = <the returned spec>)
#        Phase 2 (offline) — builds the labs-only opps, each with a NEW id (>= 10000)
#        stamped cloned_from = <source id>; never reuses source ids.
#
# program_id is omitted -> auto-allocated on first generate. bundle_root "gdrive:" ->
# Phase 1 creates a Drive run folder and resolves it. (See docs/synthetic-kmc-clone-runbook.md)
program_id: 10011 # live KMC (Synthetic) program — pin so re-runs refresh it in place
program_name: 'KMC (Synthetic)'
org_name: 'Dimagi-KMC (Synthetic)'
bundle_root: 'gdrive:'
# Curate Phase-1 profiling for analytics signal (floor flag rates + degenerate clinical
# categoricals, per-opp varied) — the real KMC opps are ~100% approved with ~0 recorded
# danger signs, which leaves those dimensions with no variance for Scout's modeling.
# Numeric bounds + text fabrication apply regardless of this flag. See issue #670.
curate: true
# High-fidelity 'close mirror' (issue #713): carry a de-identified per-entity
# transplant pool so each clone reproduces its source opp's exact visits/case,
# cases/FLW, timing, and per-child weight-vs-age growth curve — not just marginals.
mirror: true
opportunity_ids: [523, 524, 675, 874, 938, 1234, 1236, 1487, 1488, 1739, 1790]
