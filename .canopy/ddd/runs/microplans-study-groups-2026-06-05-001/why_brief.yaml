schema_version: 1
narrative_slug: microplans-study-groups
feature: microplans-study-groups
problem: >-
  A program owner who wants to measure a field program's impact has no place to
  design a controlled two-arm study — an intervention ward the program covered and
  a comparable control ward it didn't — that field surveyors can execute completely
  blind. Done by hand, the two arms are picked by name (not by where the program
  actually delivered), sampled differently, and the arm leaks into the field file,
  biasing the very survey meant to measure the effect.

spine:
  - id: S12
    claim: >-
      A controlled study starts as an empty named container the planner fills from
      the map, before any ward names are committed up front.
    rationale: >-
      The planner knows where the program worked, not the ward names a paste-list
      wants. Starting empty and filling from the map keeps the design grounded in
      real delivery instead of a guessed list.
    status: grounded
    evidence:
      - kind: implemented
        ref: EV-101

  - id: S13
    claim: >-
      The planner chooses the study's wards on a delivery map: the program's own
      service-delivery points show where it worked, and ward-wide saturation is what
      makes surveying the whole intervention ward the honest unit.
    rationale: >-
      Exposure, not a name, defines the intervention ward. Seeing the delivery
      footprint cover an entire ward justifies treating that whole ward as
      intervention and picking an adjacent un-served ward as the control.
    status: grounded
    evidence:
      - kind: implemented
        ref: EV-102

  - id: S3
    claim: >-
      Both study arms live in ONE plan: in the unified plan editor the planner selects
      several admin boundaries into a single plan and tags each with its arm
      (intervention vs comparison), so a study is one two-arm plan — not a separate
      plan per ward.
    rationale: >-
      The infrastructure now carries a per-boundary arm tag inside a single plan, so
      the intervention and control wards can be designed, sampled, compared, and
      reviewed together in one place. This replaces the older one-plan-per-ward model:
      a study no longer needs separate plans to hold its two arms. (Each ward's work
      areas still export to its own Connect file.)
    status: grounded
    evidence:
      - kind: implemented
        ref: EV-103

  - id: S11
    claim: >-
      Arm (intervention vs comparison) is a deliberate per-boundary tag the planner
      sets in the plan editor's left rail. It is carried onto each ward's work areas
      labs-side so future analysis can tell the arms apart — but it is deliberately
      kept out of the FLW-facing case properties and never displayed to the LLO/field,
      so the survey stays blind.
    rationale: >-
      Blinding is a display choice, not data loss. The arm is stored first-class on
      the work area so an analyst can later attribute outcomes to intervention vs
      control, while it is excluded from the Connect-facing work-area payload and the
      UI shown to the LLO/FLWs — so a surveyor can never see which arm a ward belongs
      to, yet the design keeps its arms for analysis.
    status: grounded
    evidence:
      - kind: implemented
        ref: EV-104

  - id: S7
    claim: >-
      One Generate samples both arms of the single plan at once on the same
      methodology — size-balanced PSU bands and a building-footprint-size filter — so
      the only intended difference between the arms is the ward, not the sampling
      method.
    rationale: >-
      Comparability starts at sampling. Drawing both arms in one action from one shared
      size-balanced methodology means a measured difference between arms reflects the
      wards being compared, not an artifact of how each was drawn.
    status: grounded
    evidence:
      - kind: implemented
        ref: EV-105

  - id: S6
    claim: >-
      Both arms live on the single plan's review map coloured by arm (intervention
      green, comparison blue), so the planner sees intervention and control together
      in real geography on one plan.
    rationale: >-
      With both arms in one plan, the planner sees them side by side in the actual
      landscape on a single map and can sanity-check the match without juggling
      separate plans.
    status: grounded
    evidence:
      - kind: implemented
        ref: EV-106

  - id: S8
    claim: >-
      Because the plan holds two arms, its review page renders a comparability panel
      comparing intervention vs comparison on buildings, area, and settlement density,
      with a matched / not-matched flag (and the reason when they diverge), so the
      planner can validate the counterfactual in place before completing.
    rationale: >-
      Validation belongs on the plan that holds both arms: one comparability panel
      over the two arms' sampled settlements lets the planner judge whether the control
      is a fair counterfactual without leaving the plan — the flag informs the call,
      the planner makes it.
    status: grounded
    evidence:
      - kind: implemented
        ref: EV-107

  - id: S14
    claim: >-
      Completing the study is approving the one two-arm plan through its lifecycle
      (draft → in_review → approved); each work area keeps its arm labs-side for
      analysis, but the arm is never shown to the LLO/field or written into the
      Connect-facing case properties, so the design stays blind and balanced through
      execution.
    rationale: >-
      The plan and its labs-side work-area records carry the arm so the planner can
      reason about the design and an analyst can later attribute outcomes, but the
      field-facing export and UI omit it — so the people running the survey never see
      the arm and the study stays blind through execution, even though both arms now
      live in one plan.
    status: grounded
    evidence:
      - kind: implemented
        ref: EV-108

