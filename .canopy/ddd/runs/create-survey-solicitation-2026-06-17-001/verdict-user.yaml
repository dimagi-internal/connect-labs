# DDD user-artifact judge — iteration 5. rubric=user-artifact, audience="feature user",
# overall_rule=lowest (weakest-link across all 5 scenes). Each scene judged by an
# independent canopy:visual-judge sub-agent under artifact_kind=product_walkthrough
# (so product chrome is grounding, not penalized; real org slugs treated as real data).
# iter4 was also 2.0 -> NO movement on the weakest link. Four of five scenes
# (1, 3, 4, 5) tie at the floor of 2.0, every one gated by CLARITY=2 triggered by the
# jargon-visible-to-non-technical-user hard cap (max 2). The product flow is functionally
# completable end-to-end (task_completion never below 3 anywhere) and trust is mostly
# grounded (real maps, real coverage data, no fixture/placeholder artifacts). What blocks
# promotion is non-technical-user CLARITY, not task completion or trust.
#
# Note vs iter4: scene_1 trust improved 2 -> 3 (the empty "Untitled study" placeholder was
# removed this iteration, so the placeholder-data cap no longer fires), and scene_5
# task_completion improved 2 -> 3 (judged as self-resolvable trial-and-error rather than
# requiring a workaround). But scenes 3 and 4 regressed 3 -> 2 on clarity (the
# jargon/label caps now bind there too), so the weakest-link aggregate is unchanged at 2.0.
#
# dimensions block reflects the WEAKEST scene (scene_1, overall 2, gated by clarity —
# the canonical portfolio scene and the most structural clarity failure of the four ties).
dimensions:
  task_completion:
    score: 3
    weight: 0.40
    justification: >
      Scene 1 (portfolio). The target study's "Create solicitation" primary button works and
      is marked by the green READY-TO-SOLICIT chip + border, but Maya reaches it only by
      scrolling past a grid of 9 Draft plan cards that each offer an identical "Create
      solicitation" button with no guard telling her those un-reviewed Drafts are the wrong
      target. Completable, but with real trial-and-error about which of ~10 identical CTAs is
      correct. No unlabelled required field and no broken flow, so no hard cap fires.
    fix_recommendation: >
      Stop presenting an identical primary "Create solicitation" on un-reviewed Draft cards.
      Gate the action behind review state (Drafts get "Submit for review" only; "Create
      solicitation" appears solely once a plan is reviewed / bound into a ready study) or
      demote it to a secondary affordance on Drafts. Promote the READY-TO-SOLICIT study above
      the draft grid (and above the empty "LIVE / none" band) so the one correct next action
      is the first thing Maya sees.
    fix_kind: CODE
  clarity:
    score: 2
    weight: 0.35
    justification: >
      Scene 1. Multiple elements confuse a non-technical user: "R6 — Attakar × Gura" is
      listed three times (Draft plan card, study title, study member row) in contradictory
      states (Draft / Submit-for-review vs READY TO SOLICIT / reviewed / Approved); "areas N"
      vs "wards" are two unexplained units; and the lifecycle vocabulary (Draft / Approved /
      Submit / Deploy / In review) has no plain-language key. The jargon-visible-to-non-
      technical-user deduction binds (max 2) and the 5-second test produced a wrong read
      (eye lands on a grid of near-identical Drafts, not the one ready study).
    fix_recommendation: >
      Disambiguate the duplicated R6 and the parallel vocabularies. (1) Do not render the same
      plan as both a standalone Draft card AND a study member with full independent action
      sets — when a plan is bound into a study, show it once (or visibly link the two and
      suppress the Draft card's contradictory "Submit for review"). (2) Give "areas N" a
      plain-language label ("N survey areas") and reconcile it with the study's "wards"
      vocabulary. (3) Collapse Draft/Approved/Submit/Deploy/In-review into a single visible
      lifecycle legend so a non-technical user can read the state machine.
    fix_kind: CODE
  trust:
    score: 3
    weight: 0.25
    justification: >
      Scene 1. Reads as real production data in a live product (real region names
      Riyom > Plateau > Nigeria, varied area counts, genuine lifecycle states) — no
      test-user / Untitled / lorem placeholder artifacts (the empty "Untitled study"
      placeholder was removed this iteration), so no placeholder-data cap. But the
      triple-listed R6 with contradictory states reads as a data-model inconsistency, and
      there is no freshness/recency signal — "reasonable trust, may wonder," the default.
    fix_recommendation: >
      Resolve the same-entity-two-states inconsistency (see clarity fix) so a careful viewer
      does not read it as a data-model bug, and add a freshness/recency signal
      (e.g. "reviewed <date>") on the study card.
    fix_kind: CODE

