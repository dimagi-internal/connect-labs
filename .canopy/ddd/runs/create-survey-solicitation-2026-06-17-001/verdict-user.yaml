summary: >-
  The create-survey-solicitation flow holds together end-to-end as a real, shipping
  product: a microplan owner can go from a finished study (scene 1) to a coverage-attached
  solicitation (scene 2) to a firm's map-driven response (scene 3) to a coherent responses
  list (scene 4) and a clean, honest award confirmation (scene 5). Trust is a genuine
  strength — every scene shows real named admin boundaries, real org/contact data, a
  correctly formatted ₦500,000 budget, and a precise notification timestamp, with the
  award page's "Next step — not yet built" panel notably increasing honesty rather than
  overclaiming. The weakest link, and the reason for an overall weakest-link score of 3
  (fail), is clarity on the responses list (scene 4): duplicate STATUS and RECOMMENDATION
  columns both reading "Awarded", an ACTIONS "Awarded" entry that looks clickable but
  isn't, and a solicitation badge still reading "Active" after award. These are
  consistency/labelling fixes (options-class), not a broken flow. Secondary, lower-cost
  items: add recency/score provenance stamps (scenes 1 and 4) and align "Survey call" with
  "solicitation" vocabulary (scene 5).
