# Every finding <= 3 (scene, dimension, score, fix_recommendation, fix_kind)
findings:
  - scene: 1
    dimension: task_completion
    score: 3
    fix_recommendation: >
      Gate/demote "Create solicitation" on un-reviewed Draft cards and promote the
      READY-TO-SOLICIT study above the draft grid + empty "LIVE / none" band, so the one
      correct next action is the first thing Maya sees instead of one of ~10 identical CTAs.
    fix_kind: CODE
  - scene: 1
    dimension: clarity
    score: 2
    fix_recommendation: >
      Disambiguate the triple-listed "R6 — Attakar × Gura" (don't render the same plan as
      both a Draft card and a study member with contradictory states), give "areas N" a
      plain-language label and reconcile it with "wards", and provide a single lifecycle
      legend for Draft/Approved/Submit/Deploy/In-review.
    fix_kind: CODE
  - scene: 1
    dimension: trust
    score: 3
    fix_recommendation: >
      Resolve the same-entity-two-states inconsistency so it doesn't read as a data bug, and
      add a freshness signal (e.g. "reviewed <date>") on the study card.
    fix_kind: CODE
  - scene: 2
    dimension: task_completion
    score: 3
    fix_recommendation: >
      Make "pre-filled" actually true (populate Title/Description/Scope/Deadline from the R6
      plan instead of gray placeholders), seed Application Questions and Evaluation Criteria
      with 2-3 sensible defaults so neither ships empty, and add required-field markers +
      inline validation so Maya is not completing by trial-and-error against validation.
    fix_kind: SPEC
  - scene: 2
    dimension: clarity
    score: 3
    fix_recommendation: >
      Clarify "Estimated Scale" units (e.g. "Estimated Scale (households)") and the
      relationship between the editable "Scope of Work" text and the separate snapshotted
      "Coverage areas" attachment, and add an on-map legend keying green->Attakar /
      blue->Gura.
    fix_kind: CODE
  - scene: 3
    dimension: task_completion
    score: 3
    fix_recommendation: >
      Split the single combined "R6 — Attakar × Gura" checklist row into one row per
      coverage area (Attakar; Gura), each bound to its own polygon, so a firm that can cover
      only one area can honestly say so — delivering the promised "select one or more".
    fix_kind: CODE
  - scene: 3
    dimension: clarity
    score: 2
    fix_recommendation: >
      Relabel the selectable items in plain language matching the map ("Attakar", "Gura")
      instead of the coded "R6 — Attakar × Gura"; move the round identifier into the
      title/breadcrumb. Add a color legend (green=Attakar, blue=Gura) and a visible
      selected-state highlight on a polygon when its row is ticked.
    fix_kind: CODE
  - scene: 3
    dimension: trust
    score: 3
    fix_recommendation: >
      Add lightweight quantitative grounding per area (household count or approximate size)
      and a map scale bar so Amina can judge the size of the coverage commitment she accepts.
    fix_kind: DATA
  - scene: 4
    dimension: clarity
    score: 2
    fix_recommendation: >
      Expand or tooltip the "EOI" badge to "Expression of Interest (EOI)", and replace the
      bare Score "-" and gray "Not reviewed" with an explicit "Review pending" state pill +
