overall_score: 2.0
verdict: fail
# DDD user-artifact judge — this iteration. rubric=user-artifact, audience="feature user",
# overall_rule=lowest (weakest-link across all 5 scenes). Each scene judged under
# canopy:visual-judge methodology with artifact_kind=product_walkthrough.
# Prior iteration scored user-artifact 2/5. This iteration's 3 shipped changes
# (real award flow, de-jargon labels, decluttered portfolio) lifted scenes 4 and 5,
# but scenes 1 and 2 still leak acronyms (LLO, EOI/RFP) that cap clarity at 2, so the
# weakest-link overall stays at 2.0.
schema_version: 1
rubric_name: user-artifact
audience:
  name: feature user
  decision: deciding whether this feature solves their day-to-day problem
domain: create-survey-solicitation
artifact_kind: product_walkthrough
overall_rule: lowest

scenes:
  - scene: 1
    overall_score: 2.0
    summary: >
      Decluttered portfolio leads with the finished "R6 — Attakar × Gura"
      study and a prominent "Create solicitation" CTA; draft grid collapsed
      to "Candidate plans in progress (9)". Task is easy to start, but the
      explainer leaks the unexplained acronym "LLO" and the term "bundle",
      and the inner row's "Draft" badge contradicts the study's "reviewed"
      status.
    dimensions:
      task_completion:
        score: 4
        weight: 0.40
        justification: >
          The finished study leads the page and its "Create solicitation"
          CTA is right on the lead card — the target task starts first try
          with no hunting. Not a 5 because the duplicated "R6 — Attakar ×
          Gura" rows and the Draft-vs-reviewed mixed signal make a user
          pause to confirm they are acting on the right thing.
      clarity:
        score: 2
        weight: 0.35
        justification: >
          The explainer shows "A bundle offers a chosen LLO a read-only set"
          — "LLO" is an unexplained acronym a non-technical survey-program
          user cannot parse, and the inner "Draft" badge under a study
          marked "reviewed" is a contradictory state signal (jargon
          deduction).
        fix_recommendation: >
          Expand "LLO" to "survey firm" (or "delivery organization (LLO)")
          in the studies/bundles explainer, and reconcile the inner row
          badge so a "reviewed" study does not also show "Draft" — show the
          plan's arm role (e.g. "Intervention"/"Comparison") instead of a
          conflicting lifecycle badge.
        fix_kind: options
      trust:
        score: 3
        weight: 0.25
        justification: >
          Real program id (#10008), real study name, and a "reviewed"
          status read as genuine with no placeholder/test data; held at the
          default because the Draft-vs-reviewed mismatch leaves a user
          unsure which state is current.
        fix_recommendation: >
          Make the study card state unambiguous — a single authoritative
          status chip per study, with the inner plan rows labelled by arm
          role rather than a second lifecycle badge.
        fix_kind: mechanical

  - scene: 2
    overall_score: 2.0
    summary: >
      Create-solicitation form with the coverage map pre-seeded (two arms,
      Comparison + Intervention, 2 wards / 840 work areas). The pre-seeded
      map is a strong grounding detail, but the Type dropdown still exposes
      the raw acronyms "Expression of Interest (EOI)" and "Request for
      Proposal (RFP)", and required fields (deadline, dates, contact) are
      unmarked and empty.
    dimensions:
      task_completion:
        score: 3
        weight: 0.40
        justification: >
          The form is completable and the coverage map is already attached,
          but required fields (Application Deadline, dates, Contact Email)
          are empty and carry no required-marker, so a user only learns what
          is mandatory by trial-and-error on submit.
        fix_recommendation: >
          Mark required fields with an explicit required indicator (asterisk
          + inline validation) so the user knows before submitting which of
          deadline / dates / contact must be filled.
        fix_kind: mechanical
      clarity:
        score: 2
        weight: 0.35
        justification: >
          The Type dropdown shows "Expression of Interest (EOI)" and
          "Request for Proposal (RFP)" — the same EOI acronym the scene-4
          badge de-jargoned is still raw here, so a non-technical author
          meets unexplained acronyms at the point of choosing a type
          (jargon deduction).
        fix_recommendation: >
          Apply the scene-4 de-jargon to this dropdown too: label the
          options "Expression of Interest" / "Request for Proposal" without
          the bare acronyms, or add a one-line plain-language hint under the
          Type field.
        fix_kind: mechanical
      trust:
        score: 3
        weight: 0.25
        justification: >
          Real plan name, real ward and work-area counts (2 wards, 840 work
          areas) and real study arms with a snapshot-on-creation note read
          as genuine; held at default because the many blank fields give the
          form a half-finished feel.
        fix_recommendation: >
          Pre-fill or show sensible defaults/examples for the empty Dates &
          Details fields, or visually separate "ready" sections from
          "needs input" so the blank state does not read as broken.
        fix_kind: options

  - scene: 3
    overall_score: 4.0
    summary: >
      Public respond form with an interactive Mapbox coverage map (real ward
      geography: Attakar, Gura) plus a tick-the-areas checklist. The cleanest
      scene — "Which areas can you cover?" with "Select one or more —
      required to submit" tells a firm rep exactly what to do.
    dimensions:
      task_completion:
        score: 4
        weight: 0.40
        justification: >
          The instruction "Click the areas on the map, or tick them below.
          Select one or more — required to submit" tells the respondent
          exactly what is required, the checkbox is already actionable, and
          "Submit Response" is the clear primary CTA — completable first
          try. Not a 5 because the single combined checklist row
          ("R6 — Attakar × Gura") does not mirror the two distinct map arms.
      clarity:
        score: 4
        weight: 0.35
        justification: >
          Every label is plain-language and self-explanatory
          ("Which areas can you cover?", "Save Draft", "Submit Response")
          with zero acronyms — a non-technical firm rep reads it and knows
          exactly what to do. Not a 5 because the green/blue map arm colors
          carry no legend and the breadcrumb is truncated.
        fix_recommendation: >
          Add a small legend keying the green/blue arm colors to their
          names so the respondent knows which polygon is which arm.
        fix_kind: mechanical
      trust:
        score: 4
        weight: 0.25
        justification: >
          Real ward names on a real Mapbox basemap with surrounding place
          labels (Manchok, Rim) read as genuine current geography with no
          placeholder or test artifacts.

  - scene: 4
    overall_score: 4.0
    summary: >
      Responses list showing the firm by its human name "Health Bridge
      Nigeria" (not a slug), tied to its coverage via a "SELECTED COVERAGE /
      R6 — Attakar × Gura" chip, with the type badge spelled out as
      "Expression of Interest" (not "EOI"). Both de-jargon changes landed
      here. View / Review / Award actions sit on the row.
    dimensions:
      task_completion:
        score: 4
        weight: 0.40
        justification: >
          The reviewer sees the firm, its coverage chip, status, and the
          Award action all on one row — the award path starts first try with
          no navigation. Not a 5 because the empty "Not reviewed" / "-"
          cells leave the review-before-award step implied rather than
          guided.
      clarity:
        score: 4
        weight: 0.35
        justification: >
          The de-jargon shipped: the org appears as "Health Bridge Nigeria"
          and the type as "Expression of Interest", so a program officer
          reads every column with no acronym lookup. Not a 5 because the
          truncated breadcrumb and the empty Recommendation/Score cells are
          small polish tweaks.
        fix_recommendation: >
          Widen or wrap the breadcrumb so the solicitation title is not
          truncated mid-word, and show a clearer empty-state hint in the
          Recommendation/Score cells (e.g. "Review to score").
        fix_kind: mechanical
      trust:
        score: 4
        weight: 0.25
        justification: >
          A named firm, a named submitter with a matching email domain
          (amina.okafor@healthbridge.ng), a real submit date (Jun 18, 2026),
          and a coverage chip all read as genuine records, not fixtures.

  - scene: 5
    overall_score: 3.0
    summary: >
      Award confirmation: green "Awarded to Health Bridge Nigeria — The
      organization has been notified" banner, an award summary, an
      "Awarded & notified" timestamp line, and an honest "Next step — not yet
      built" panel deferring live-opportunity provisioning. The real award
      flow (records + notifies) is the headline win; the bare unformatted
      "Award budget 500000" is the weak spot.
    dimensions:
      task_completion:
        score: 4
        weight: 0.40
        justification: >
          The confirmation state names the org, confirms the notification
          was sent, and stamps the time — the user knows the award task
          completed, and "Back to responses" / "View response" give clear
          next moves. Not a 5 because the unformatted budget makes a careful
          user double-check the figure.
      clarity:
        score: 4
        weight: 0.35
        justification: >
          The "Next step — not yet built" panel explains in plain English
          exactly what did happen (decision recorded, firm notified) and what
          did not (live opportunity provisioning) — honest deferral that a
          non-technical user understands. Not a 5 because the bare "500000"
          budget reads as raw/unfinished.
        fix_recommendation: >
          Format the budget with a currency symbol and thousands separator
          (e.g. "NGN 500,000" or "$500,000") so it reads as a finished figure
          rather than raw data.
        fix_kind: mechanical
      trust:
        score: 3
        weight: 0.25
        justification: >
          Real org, real contact, a precise "Jun 18, 2026 16:56 —
          notification sent" line, and an honest not-yet-built deferral all
          build trust, but the headline "Award budget 500000" is an
          unformatted integer presented as a figure, which reads like raw
          data and caps trust at the default.
        fix_recommendation: >
          Render the award budget through the same currency formatter used
          elsewhere (symbol + grouping); confirm the unit is explicit so the
          awarded amount is unambiguous.
        fix_kind: mechanical
