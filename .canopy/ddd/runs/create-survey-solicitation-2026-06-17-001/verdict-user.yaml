overall_score: 2.0
verdict: fail
# DDD user-artifact judge — iteration 4. rubric=user-artifact, audience="feature user",
# overall_rule=lowest (weakest-link across all 5 scenes). Each scene judged by an
# independent canopy:visual-judge sub-agent under artifact_kind=product_walkthrough
# (so product chrome is grounding, not penalized; real org slugs treated as real data).
# Two scenes tie at the floor (scene_1 and scene_5, both overall 2.0). The dimensions
# block below is scene_5 — the binding gate — because its weakest dimension is
# task_completion (weight 0.40, the heaviest of the three).
dimensions:
  task_completion:
    score: 2
    weight: 0.40
    justification: >
      Scene 5 (Award page). Completable in principle, but a non-technical program owner
      needs a workaround to finish: the required "Organization ID" field demands a raw
      system slug ("health_bridge_ng") she is unlikely to have memorized, with no picker,
      lookup, or "where to find this" affordance on the page. The required "Award Budget"
      is empty with no in-frame reference value (firm's bid, solicitation ceiling, fund
      balance). The free-text raw-ID-required pattern is the "needs assistance/workaround"
      anchor (2), not self-resolvable trial-and-error.
    fix_recommendation: >
      Replace the free-text "Organization ID" input with a name-first typeahead picker that
      searches grantee organizations by display name ("HealthBridge", "Amina Okafor's firm")
      and resolves to the org ID behind the scenes, defaulting to the org already attached to
      the response being awarded — the owner selects a name and never types a slug.
    fix_kind: mechanical
  clarity:
    score: 2
    weight: 0.35
    justification: >
      Scene 5. An element confuses the target user: "Organization ID" / "the Connect
      organization ID of the awarded grantee" is jargon for a non-technical program owner who
      does not think in org IDs — the "jargon visible to non-technical users: max 2" deduction
      fires. Secondary confusions: the budget field carries no currency unit (₦500,000 vs
      $500,000 differ ~1000x in a Nigeria context), and the banner's "can be updated later"
      mildly contradicts the committing green "Award Grantee" CTA.
    fix_recommendation: >
      Relabel the field to the user's vocabulary ("Awarded organization", showing the firm's
      display name) and demote the raw ID to a small grey confirmation line ("Connect ID:
      health_bridge_ng"). Add a currency prefix/suffix to "Award Budget" plus a one-line
      reference ("Firm's proposed budget: <X>") so the required number has context.
    fix_kind: mechanical
  trust:
    score: 4
    weight: 0.25
    justification: >
      Scene 5. High trust with one provenance signal missing. The pre-filled "health_bridge_ng"
      is a real-looking org slug for a real-looking grantee in a running product (grounding
      under product_walkthrough, not placeholder/test data — so no max-2 cap), and the named
      response ("Amina Okafor", "Household survey firm — Round 6 (Attakar × Gura)") is consistent
      and concrete. The one missing signal: the page never states where the pre-filled org ID
      came from (auto-resolved from the response vs a default the user must overwrite).
