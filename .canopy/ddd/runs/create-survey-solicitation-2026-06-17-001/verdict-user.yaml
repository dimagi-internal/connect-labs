    fix_kind: redesign
  - scene: 2
    dimension: task_completion
    score: 3
    fix_recommendation: >-
      Mark which fields are required to publish (or collapse optional sections)
      so the owner knows the minimum to publish a solicitation seeded from a
      plan, instead of discovering it by trial-and-error.
    fix_kind: mechanical
  - scene: 4
    dimension: trust
    score: 3
    fix_recommendation: >-
      Either populate Recommendation/Score, or hide/label those columns as "not
