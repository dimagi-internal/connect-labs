# Per-scene lowest-of-3, then lowest-across-scenes. Conservative from a 3/5 default.
# Iter-3: two mechanical fixes verified resolved (scene-3 stub gone, scene-4/5 actions in-frame).
# Three known-open items remain by deliberate human direction — scored honestly, not penalized as regressions.
dimensions:
  task_completion:
    score: 4
    weight: 0.40
    justification: >
      The full Maya→Amina→Maya task is completable first-try across all five scenes. Scene 1's
      portfolio gives every plan card AND the R6 — Attakar × Gura study-group card a per-card
      "Create solicitation" button — Maya launches the call directly from her finished
      micro-plan. Scene 2 pre-fills the title ("Solicitation for R6 — Attakar × Gura") and Scope
      of Work, and attaches coverage as a first-class "Attached" card. Scene 3 (now corrected)
      presents the respondent flow cleanly: the required "Which areas can you cover? — Select one
      or more. Required to submit." checkbox, the AI-coach helper, and a working Submit Response
      button — the empty "Application Questions" stub card that previously sat mid-flow is GONE
      (verified resolved this iteration). Scene 4 shows the submitted Health Bridge Nigeria
      response bound to the exact coverage, with the View / Review / Award actions now fully
      in-frame (verified resolved — was clipped in iter-2). Scene 5 reuses scene 4's frame for
      the deferred award→live-opportunity look-ahead and is NOT scored as a broken task. One
      minor friction blocks a 5 (the same deliberately-deferred call from iter-2): scene 1's
      "Plan groups & studies" list and the two unnumbered duplicate "Attakar" planning cards
      add scan noise, so picking the correct populated R6 study card is not instant on first
      glance.
    fix_recommendation: >
      In scene 1, disambiguate the launch target: number or label the two bare "Attakar"
      planning cards, and collapse/quiet the lower "Plan groups & studies" R6 entry (or hide
      empty/near-duplicate study cards behind a toggle) so the named, populated R6 — Attakar ×
      Gura card is the obvious place to click "Create solicitation".
    fix_kind: mechanical
  clarity:
    score: 4
    weight: 0.35
    justification: >
      Labels and CTAs self-explain to a non-technical program owner throughout: "Create
      solicitation", "Submit Response", "Save Draft", "Which areas can you cover?", "SELECTED
      COVERAGE", and the AI-coach copy ("Our AI coach reviews your draft answers against the
      evaluation criteria... Your answers are never changed or submitted") are plain English.
      "EOI" is expanded to "Expression of Interest (EOI)" in scene 2, and coverage provenance
      reads clearly ("Your micro-plan is attached to this call. Respondents select the areas
      they can cover. Snapshotted at creation — later plan edits won't change this
      solicitation."). Scene 3's de-cluttered respondent form is now unambiguous end-to-end.
      One affordance keeps this off a 5: scene 1 still carries internal vocabulary in its
      section/status chrome — "PLANNING · labs — being designed & reviewed with the LLO/funder",
      terse "areas 823" counts, and a "defining" study status — that a first-time non-technical
      user must pause to parse. This is visible chrome only (not in the core task path), so it
      stays a single sharpenable affordance rather than a confusing element; no jargon-deduction
      to 2 is warranted.
    fix_recommendation: >
      Soften scene-1 portfolio chrome for the non-technical reader: drop or tooltip the internal
      "labs" tag, label counts as "823 work areas" rather than "areas 823", and rename the study
      "defining" status to a plainer term (e.g. "Draft — being defined").
    fix_kind: mechanical
  trust:
    score: 4
    weight: 0.25
    justification: >
      Sourcing and recency are clear and consistent on the response frames. The submitter is
      Amina Okafor / amina.okafor@healthbridge.ng under org "Health Bridge Nigeria" (no dev/test
      address remains), the date "Jun 18, 2026" is current, and the response is unambiguously
      bound to the designed coverage via the green "SELECTED COVERAGE — R6 — Attakar × Gura"
      chip. Scene 2 states the snapshot semantics explicitly, so provenance and recency read
      cleanly. No placeholder/test-data tells appear on any in-scope frame. One provenance signal
      blocks a 5 — the known-open, deliberately-deferred ward-count mismatch: scene 1's R6 study
      card reads "1 wards" while scene 2's attached coverage card reads "2 wards / 840 work
      areas". A feature user comparing the two screens cannot tell which ward count is
      authoritative. This is the single residual trust gap; it does not rise to stale/unclear
      sourcing (score 2) because every other number, source, and date is internally consistent
      and current.
    fix_recommendation: >
      Reconcile the R6 — Attakar × Gura ward count so scene 1's study card ("1 wards") and scene
      2's attached coverage card ("2 wards / 840 work areas") report the same figure; align the
      group-card count to the attached-coverage truth (the snapshot the respondent actually
      selects against).
    fix_kind: mechanical
