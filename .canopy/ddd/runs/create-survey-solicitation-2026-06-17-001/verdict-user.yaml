    score: 3
    fix_recommendation: >
      Add a response count ("1 response") and normalize the round label ("Round 6"
      everywhere, not "R6" in the chip); consider a firm-verification mark. Re-capture with
      the cursor off the un-truncated breadcrumb.
    fix_kind: CODE
  - scene: 5
