scene_scores:
  - scene: 1
    url: 'https://labs.connect.dimagi.com/microplans/program/10008/'
    score: 4
    dimensions:
      task_completion:
        score: 4
        justification: >-
          The "Create solicitation" primary CTA is prominent on the green-bordered
          READY TO SOLICIT card and the path to act is obvious first-try; one minor
          friction: the study's "ready" state is asserted three times (READY TO SOLICIT
          badge + "reviewed" + green-check sentence), adding a beat of redundancy before
          the click.
      clarity:
        score: 4
        justification: >-
          Labels self-explain and the card hierarchy is clear; one affordance could be
          sharper: "Compare selected" / "+ Group selected plans" look enabled with no
          selection context, and the intro defines "bundle" terminology that never
          appears on this single-study view.
      trust:
        score: 4
        justification: >-
          Real, coherent data ("2 wards", "reviewed", real program scope); one
          data-provenance signal missing — there is no last-reviewed / last-edited
          timestamp, so the owner cannot confirm recency of the "finished" study.
        fix_recommendation: >-
          Add a "reviewed <date>" recency stamp to the study card so the owner can see
          how fresh the finished state is before soliciting.
        fix_kind: mechanical

  - scene: 2
    url: 'https://labs.connect.dimagi.com/solicitations/create/'
    score: 4
    dimensions:
      task_completion:
        score: 4
        justification: >-
          The form is completable first-try with an auto-filled title/scope and the
          micro-plan coverage pre-attached (green "Attached" badge + map); one friction:
          it is a long single-page form and required-vs-optional fields (e.g. Contact
          Email) are not marked, so the user guesses what is mandatory before the bottom
          "Create Solicitation".
      clarity:
        score: 4
        justification: >-
          Sections (Basic Information, Dates & Details, Coverage areas, Evaluation
          Criteria) are well labelled and the coverage explanation is plain; one sharper
          label: "Expression of Interest / Request for Proposal" is procurement jargon
          shown without a one-line plain-language read.
      trust:
        score: 5
        justification: >-
          The coverage map shows real named admin wards (Attakar green / Gura blue),
          exact counts ("2 wards · 840 work areas"), study arms, and an explicit
          snapshot-provenance note ("Snapshotted at creation — later plan edits won't
          change this solicitation") — sources, scope, and immutability are all
          unambiguous.

  - scene: 3
    url: 'https://labs.connect.dimagi.com/solicitations/4495/respond/'
    score: 4
    dimensions:
      task_completion:
        score: 4
        justification: >-
          A firm can complete the response first-try — tick the coverage area, "Submit
          Response" enables; one friction: the selected checkbox row has only a faint
          blue highlight and there is no "1 selected" summary, so the respondent gets
          weak confirmation their pick registered before committing.
      clarity:
        score: 4
        justification: >-
          The "Which areas can you cover?" prompt and instructions are plain-language and
          the Mapbox map is self-explanatory; one sharper affordance: ticking the
          checkbox does not visibly light up the corresponding map polygon, so the
          tick-to-map link is not reinforced.
      trust:
        score: 5
        justification: >-
          Real Mapbox basemap with real named admin boundaries (Attakar, Gura) and
          surrounding towns (Manchok, Rim) plus visible Mapbox attribution — the
          respondent sees exactly the real geography they are committing to, with
          unambiguous sourcing.

  - scene: 4
    url: 'https://labs.connect.dimagi.com/solicitations/4495/responses/'
    score: 3
    dimensions:
      task_completion:
        score: 4
        justification: >-
          The owner can review and confirm the award first-try (View to inspect, award
          state clear); one friction: "Awarded" sitting in the ACTIONS column looks like
          a button but is a non-actionable status label, a momentary "what does this do?"
          pause.
      clarity:
        score: 3
        justification: >-
          Understandable with a moment of thought, but two elements confuse the target
          user: the STATUS column ("Awarded") and the RECOMMENDATION column ("Awarded")
          are identical adjacent columns with no explained distinction, and the
          solicitation badge top-right still reads "Active" despite the only response
          being awarded.
        fix_recommendation: >-
          Collapse STATUS and RECOMMENDATION into a single source-of-truth column (or
          label them so the distinction is explicit), make the ACTIONS "Awarded" entry a
          real action or remove it, and flip the solicitation badge to "Awarded"/"Closed"
          once a response is awarded so the page state is internally consistent.
        fix_kind: options
      trust:
        score: 4
        justification: >-
          Real org (Health Bridge Nigeria), real contact (amina.okafor@healthbridge.ng),
          real coverage pill (R6 — Attakar × Gura) and date all cohere; one provenance
          gap: the SCORE column is blank ("–") with no indication whether scoring was
          skipped or is pending, leaving the reviewer to wonder.
        fix_recommendation: >-
          Show "Not scored" (or "N/A for Expression of Interest") instead of a bare "–"
          in the SCORE column so the reviewer knows scoring was intentionally skipped,
          not missing.
        fix_kind: mechanical

  - scene: 5
    url: 'https://labs.connect.dimagi.com/solicitations/response/4496/award/'
    score: 4
    dimensions:
      task_completion:
        score: 5
        justification: >-
          The award reaches an unambiguous terminal confirmation first-try: green success
          hero with check icon, every detail present (org, contact, budget, coverage,
          notified timestamp), and the "Next step — not yet built" panel honestly states
          exactly what is and isn't automated — nothing to retry or work around.
      clarity:
        score: 4
        justification: >-
          Labels and the success state self-explain and the green hero is unmistakable;
          one sharper-label opportunity: "Survey call" drifts from the "solicitation"
          vocabulary used on the prior screens, a small inconsistency.
      trust:
        score: 5
        justification: >-
          Provenance is unambiguous: ₦500,000 correctly formatted with the naira symbol
          and thousands separator, a precise "Jun 18, 2026 16:56 — notification sent"
          recency stamp, a real contact email, and an explicit honest statement of what
          the system did versus did not do.

