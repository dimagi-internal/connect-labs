    fix_kind: mechanical

notes:
  - 'Judged as product_walkthrough: product chrome (nav, breadcrumbs, Select
    Context, account menu) is grounding, not penalized.'
  - 'Overall is weakest-link: the lowest scene weighted_score (scene 2 = 3.25).'
  - Scene 5 is the strongest trust scene - the honest "Next step - not yet
    built" panel scopes the deferred live-opp provisioning rather than implying
    it happened.
