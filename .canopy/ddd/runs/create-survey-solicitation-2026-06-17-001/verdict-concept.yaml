  hits four gating dimensions:

  [CONCEPT/RESEARCH] Scene 1 — the "FINISHED micro-plan" precondition is contradicted
  by the capture (why_groundedness 2, claim_reality 2): every plan card reads "Draft"
  and the R6 study reads "defining * 1 wards". Capture this scene with the R6 study in
