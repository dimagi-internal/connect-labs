fix_recommendation: |
  Iteration 2 fixed the mechanical re-pointing (scenes now hit the right routes and
  the coverage panel / selected-coverage pill / realistic submitter all render), but
  three PRODUCT-side gaps drive the weakest-link to 2/5 and must be addressed before
  promotion:

  [PRODUCT] Responses table overflow (scenes 4 & 5, visual_polish/design_soundness):
  the ACTIONS column (View / Review / Award) is clipped at the right viewport edge —
  Award, the load-bearing action for the final beat, is cut off. Wrap the table in an
  overflow-x container or pin the ACTIONS column sticky-right / reduce column widths so
  all three actions render fully in a normal viewport. Mechanical.

  [PRODUCT] Scene 5 is identical to scene 4 (concept_clarity/motion_friction): the
  honesty/look-ahead beat reuses the responses frame with no distinct on-screen state,
  so it reads as a repeated screen. Either re-point scene 5 to a genuinely distinct
  capture (e.g. the Award control focused/hovered with its aspirational treatment
  visible) or give the final beat a distinct on-screen affordance. Options — surface to
  the user, do not auto-apply.

  [PRODUCT] Scene 3 respond form (design_soundness): the "Select one or more" coverage
  selector shows a single degenerate checkbox and the "Application Questions" card is an
  empty stub. Render the solicitation's actual questions (or an explicit "No additional
  questions" empty-state), and label the single-area case honestly. Mechanical.

  [PRODUCT] Scene 1 portfolio (visual_polish): suppress/collapse the repeated "Untitled
  study" / 0-ward / out-of-program placeholder study cards (seed-data noise), de-dupe the
  two "Attakar" plan cards, and promote "Create solicitation" to a single primary button
  so the hero R6 path is findable. Seed-data + template fix.

  [DEFER] claim_reality_coherence gaps (scenes 3 & 5) are advisory only: the blocked-
  submit error and the Award-as-next-step cue aren't visible in their stills. The honest
  deferral of opportunity-provisioning (G1) is correct and was not penalized.
