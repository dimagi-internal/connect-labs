  intervention+control definition) so the "launch from a finished plan" claim is
  visible, not just the Create-solicitation button. Mechanical (re-seed/re-capture).

  [PRODUCT] Scene 1 portfolio (visual_polish 2, design_soundness 2, concept_clarity 2):
  suppress/de-dupe the duplicate "Attakar / Attakar" and seed-noise cards, fix the
  "1 wards" pluralization, lead with the one finished R6 study in a distinct
  "ready-to-solicit" lane, and promote "Create solicitation" to a single primary
  button (demote Archive/Submit/Delete into an overflow) so the hero path is findable
