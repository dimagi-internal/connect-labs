dimensions:
  concept_clarity:
    score: 3
    weight: 0.20
    justification: >-
      Across scenes the concept is legible to someone familiar with the space but
      a cold outsider needs a question answered. Scene 1's hero study card carries
      a "reviewed" badge while its plan row reads "Draft" (mixed finished/draft
      signal), and the helper text mentions an orphan term ("bundle") with no
      matching affordance; scene 3's checklist offers a single bundled
      "Attakar x Gura" row while the map shows two distinctly colored wards, so an
      outsider asks "can I pick one arm or only the combined block?". Scenes 4-5
      read cleanly (full firm name, full "Expression of Interest" phrase).
  design_soundness:
    score: 3
    weight: 0.20
    justification: >-
      The recruit-review-award interaction model holds together end to end with
      no dead ends. The weakest links: scene 1 surfaces "Compare selected" /
      "+ Group selected plans" as actionable with no visible selection mechanism,
      and de-emphasizes the concept's own "Create solicitation" action below the
      filled "Open study" button; scene 3's promised two-way map<->checklist sync
      is not observable (ticking the area produces no selected-state on the map),
      so the core map affordance is hand-waved in the captured frame.
  visual_polish:
    score: 2
    weight: 0.15
    justification: >-
      Weakest link is scene 1 (2/5): the study name is duplicated as both the card
      title and its single plan row (render-bug smell), status is treated
      inconsistently within one card ("STUDY"/"Draft" are pills but "reviewed" is
      plain grey text), and the hero card is stranded above ~250px of dead
      whitespace, so the "decluttered hero" reads as sparse. Other scenes sit at 3
