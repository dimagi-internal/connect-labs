# Per-scene dimension scores (5 scenes; weakest-link aggregation across the five
# GATING dimensions only — claim_reality_coherence is advisory and excluded).
#
# scene_scores:
#   dim                      S1  S2  S3  S4  S5
#   concept_clarity           4   4   4   4   2
#   design_soundness          4   4   4   2   2
#   visual_polish             3   4   4   3   4
#   why_groundedness          4   5   4   4   3
#   claim_reality_coherence   4   4   3   2   2   (advisory; excluded from overall)
#   motion_friction           4   4   4   3   2

dimensions:
  concept_clarity:
    score: 2
    weight: 0.20
    justification: >-
      Scenes 1-3 are clear (4): the opening establishes the problem and names the
      program-owner role, the create form and respond page read in five seconds.
      Scene 5 collapses to 2 — its closing beat is the planning-vs-execution
      boundary, but nothing in the frame signals "next step / not yet built"; the
      5-second read is "firm awarded," a wrong read for the beat. The concept lives
      only in narration. Weakest-link = 2.
  design_soundness:
    score: 2
    weight: 0.20
    justification: >-
      Scenes 1-3 are interaction-coherent (4). Scenes 4 and 5 drop to 2: the
      response row shows STATUS "Awarded" while RECOMMENDATION reads "Not reviewed"
      and a live "Review" action is still offered — an awarded-yet-unreviewed item
      that still invites review is a self-contradicting state. "Awarded" is also
      mixed into the View/Review action strip as if it were a verb. Weakest-link = 2.
  visual_polish:
    score: 3
    weight: 0.15
    justification: >-
      Type, color, pill/chip styling and alignment are clean throughout; the real
      Mapbox renders (scenes 2,3) and the green SELECTED COVERAGE chip ground the
      product. Held to 3 by scene 1 (three restatements of "ready to recruit a
      survey firm" plus a ~50% empty lower frame reads functional-not-polished) and
      scene 4 (single-row 7-column table leaves SCORE/RECOMMENDATION visibly empty;
      a captured cursor occludes the breadcrumb). No scene is unshippable.
  why_groundedness:
    score: 3
    weight: 0.20
    justification: >-
      Every scene's concept_claim traces to a grounded why_brief spine item
      (S3-S7). Scene 2 is exemplary (5) — the "Coverage areas (from micro-plan)"
      panel and "Snapshotted at creation" microcopy realize S4 verbatim. Held to 3
      by scene 5, which traces to S7 but omits S7's whole second half (the
      not-yet-built provisioning tail) from the frame, so the grounding is only
      half-present on screen.
  claim_reality_coherence:
    score: 2
    weight: 0.10
    blocking: false
    justification: >-
      ADVISORY (excluded from overall). Scene 3 (3): the asserted submit-blocked
      message "Select at least one coverage area to submit." is not visible in the
      still. Scenes 4 and 5 (2): the response is shown already "Awarded" with
      RECOMMENDATION "Not reviewed," ahead of and internally contradicting the
      narrated fresh-review moment; scene 5's "next step, not yet built" boundary is
      asserted only in narration while the frame shows a completed award.
  motion_friction:
    score: 2
    weight: 0.15
    justification: >-
      Scenes 1-3 flow cleanly (4) — real maps fully rendered, correct order, no
      spinners. Scene 5 drops to 2: it is byte-identical to scene 4 (same md5), so
      the closing beat shows zero visual progression — the viewer gets no signal a
      new beat occurred. Scene 4 (3) has latent friction (a live "Review" action on
      an awarded row leads to a confusing state).

overall_score: 2
overall_rule: lowest

verdict: fail
blocking_reason: null

fix_recommendation: |
  The concept is sound and the first three scenes land — the regression is
  concentrated in the two response-page scenes (4 and 5), both captured in an
  already-AWARDED state that fights their own narratives.

  [PRODUCT] Re-capture scenes 4 and 5 with the response in a PRE-AWARD state
  (status "Submitted"/"Under review", a live Review action, no Awarded pill, a
  resolved-not-"Not reviewed" recommendation). The narrative for both scenes is
  the review/compare moment and the look-ahead — neither should show the award
  already taken.

  [PRODUCT] Make response status the single source of truth: once a response is
  Awarded, suppress/disable the "Review" action and stop showing "Not reviewed";
  move "Awarded" out of the View/Review action strip into the STATUS cell so the
  ACTIONS column holds only verbs. (Fixes design_soundness 2 in scenes 4 & 5.)

  [PRODUCT] Give scene 5 a DISTINCT frame from scene 4 and let the UI carry the
  "next step, not yet built" boundary instead of leaving it to narration — e.g. a
  disabled "Provision Connect opportunity (coming soon)" affordance or a post-award
  callout. (Fixes concept_clarity 2 and motion_friction 2 in scene 5, and lifts
  why_groundedness by surfacing S7's second half on screen.)

  [PRODUCT] Scene 1: collapse the three restatements of "ready to recruit a survey
  firm" into one and tighten the ~50%-empty lower frame (surface the candidate
  plans or a next-step hint). Scene 4: add explicit empty-states for the
  SCORE/RECOMMENDATION columns and re-capture without the cursor occluding the
  breadcrumb. (Lifts visual_polish toward 4.)

  [DEFER] (advisory, non-blocking) Scene 3: add a frame or state showing the
  blocked submit with the exact "Select at least one coverage area to submit."
  message so the gating claim is demonstrated, not just asserted.
