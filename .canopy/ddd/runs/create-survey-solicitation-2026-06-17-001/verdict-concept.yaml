fix_recommendation: |
  Verdict is WARN (weakest-link = 3). The concept itself is well-grounded
  (why_groundedness 4 across all scenes) — the remaining gaps are presentation
  and one interaction-affordance, not the idea. The previous pass's fail-driver
  (scene 3 clipped arm legend colliding with the Mapbox attribution) is now FIXED
  and confirmed clean — do not re-touch it. Highest-leverage product fixes:

  [PRODUCT] Scene 2 (visual_polish): give the two study arms saturated, clearly
  distinct fills (a true green for Intervention, a true blue for Comparison) with
  on-polygon labels, so the DiD arm assignment — the whole point of the coverage
  panel — is legible at the real viewport. Currently both polygons read as a
  similar muted teal.

  [PRODUCT] Scene 4 (design_soundness + visual_polish): suppress the empty
  RECOMMENDATION/SCORE columns (or render an explicit "Not scored" state),
  replace the redundant ACTIONS "Awarded" with a single canonical status badge or
  a real next action, and fix the clipped/overlapped breadcrumb plus the dead
  lower canvas.

  [PRODUCT] Scene 3 (design_soundness): make the map<->checklist a clean 1:1
  affordance — render one checklist row per selectable area, or clearly label the
  single row as "whole study = both arms" — and surface an explicit "1 area
  selected — ready to submit" state tied to the Submit button so the "blocked
  until >=1" rule is visible. (Legend regression is FIXED; this is the interaction
  affordance, not the legend.)

  [CONCEPT] Scene 1 (concept_clarity): drop or reframe the "before any opportunity
  is live" subtitle hedge and remove the "bundle" sentence from the intro (no
  bundle is shown on this surface), so a cold viewer reads "turn a finished study
  into a call for a firm right here" without an unexplained concept.

  [PRODUCT] Scene 5 (visual_polish): recede the "Next step — not yet built" panel
  (lighter ground, smaller type, more separation from the "Awarded & notified"
  timeline row) and balance the two-column field block. (The honest disclosure
  itself is GROUNDING per gap G1 — keep it; only its visual weight needs work.)

  [DEFER] Scene 4 (claim_reality_coherence, advisory): the responses row shows
  STATUS "Awarded" while the scene narrates the review moment — note for spec/
  capture triage; non-blocking.

  Note: motion_friction sits at the static-frame floor of 3 for all five scenes;
  it cannot rise from a still capture and is not a product-readiness signal here.
