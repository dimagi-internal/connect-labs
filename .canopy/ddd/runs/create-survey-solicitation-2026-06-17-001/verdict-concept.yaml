      cramped small-type pill with no on-map color->ward legend; scene 4 is a
      single-row table with two hollow placeholder columns; scene 5 renders the
      load-bearing award budget as a bare unformatted "500000" with no currency or
      separators plus an asymmetric detail grid. Host-product chrome was treated as
      grounding, not deducted.
  why_groundedness:
    score: 4
    weight: 0.20
    justification: >-
      Every scene's concept_claim traces cleanly to its named why_brief spine item
