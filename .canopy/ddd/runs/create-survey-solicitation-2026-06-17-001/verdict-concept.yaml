fix_recommendation: |
  Weakest link is visual_polish on scene 1 (2/5), which drags the whole run to
  fail under lowest-rule scoring. Fix the scene-1 portfolio hero card first:

  [PRODUCT] Scene 1 — De-duplicate the study identity: the card currently prints
  "R6 — Attakar × Gura" as both the card title AND its single plan row. Show the
  study title once; if the plan row must appear, label it distinctly (e.g. the
  plan name vs. the study name) so it doesn't read as a duplicate render.

  [PRODUCT] Scene 1 — Resolve the "reviewed" vs "Draft" contradiction. The card
  header badges the study "reviewed" while the inner row reads "Draft", so the
  single "ready to solicit" signal is ambiguous. Render one unambiguous status and
  present "reviewed" as a semantic status pill consistent with the other badges.
  This also lifts concept_clarity and claim_reality_coherence, which inherit the
  same wrinkle.

  [PRODUCT] Scene 1 — The decluttered hero card is stranded above ~250px of dead
  whitespace. Let the candidate-plans section (or a compact study gallery) fill the
  canvas so the finished study reads as the focused hero, not a lonely card.

  [PRODUCT] Scene 1 — Promote "Create solicitation" to the primary visual action
  on a finished study (currently the outline/secondary button under the filled
  "Open study"); the scene's whole concept is launching the call.

  [PRODUCT] Scene 3 — Drive a visible selected-state on the map polygon(s) when the
  checklist row is ticked, so the promised two-way map<->checklist sync is
  observable (lifts design_soundness + concept_clarity + claim_reality).

  [PRODUCT] Scene 2 — Give the load-bearing coverage summary a larger, structured
  presentation (Attakar=green / Gura=blue chips as an on-map legend, work-area
  count as a stat) so the frozen coverage reads at a glance.

  [PRODUCT] Scene 5 — Format the award budget as currency with separators
  (e.g. ₦500,000) instead of the bare "500000".
