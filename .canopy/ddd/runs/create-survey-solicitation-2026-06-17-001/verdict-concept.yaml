fix_recommendation: |
  Verdict is WARN, driven by design_soundness (3) and visual_polish (3). The
  concept is sound and well-grounded (concept_clarity 4, why_groundedness 4), and
  the previously-flagged scene 4 / scene 5 regressions are RESOLVED — scene 4's
  awarded row is coherent (View + Awarded only, no contradictory Review action),
  and scene 5 is a distinct, honestly-bounded award-confirmation page. The
  remaining warn is concentrated in scenes 1 and 2.

  Highest-leverage fixes (all PRODUCT, none camera-side):

  [PRODUCT] Scene 2 (create form) — the load-bearing fix. The two ward polygons
  (Attakar / Gura) render in near-identical low-contrast pastels with no
  per-polygon labels or legend, so the owner cannot confirm WHICH polygon is
  which ward — the exact "confirm the coverage the firm will bid on" job of the
  scene. Raise fill contrast to saturated green vs saturated blue and add on-map
  labels + a color legend swatch in the panel header. Lifts scene 2
  design_soundness AND visual_polish AND advisory claim_reality_coherence
  together. (mechanical)

  [PRODUCT] Scene 2 — pre-fill the title/description/dates with the R6 example so
  the scene shows a real solicitation being created, not a blank shell whose
  empty Questions/Criteria stubs leave large dead regions. (mechanical)

  [PRODUCT] Scene 1 (portfolio) — add helper text/tooltips on the disabled
  "Compare selected" / "Group selected plans" actions ("select plans first"),
  and collapse the redundant "done" signals (STUDY pill + READY TO SOLICIT pill +
  "reviewed" + the finished-study line) into one badge; optionally surface the
  collapsed "Candidate plans in progress (9)" inline to fill the empty viewport.
  (options)

  [PRODUCT] Scene 4 (responses) — the token "Awarded" prints three times on one
  row (STATUS / RECOMMENDATION / ACTIONS); differentiate the ACTIONS lockup to a
  checkmark-only indicator and fix the breadcrumb ellipsis so the captured cursor
  doesn't collide with clipped crumb text. (mechanical)

  [DEFER] claim_reality_coherence (advisory, non-blocking): scene 2's narrated
  per-ward color identity is resolved by the scene-2 legend/contrast fix above;
  scene 5's "notified" lacks a visible delivery channel in the hero. Note for
  later triage; does not gate.
