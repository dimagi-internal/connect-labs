# Aggregate (weakest-link across all scenes; claim_reality_coherence advisory, EXCLUDED from overall_score)
dimensions:
  concept_clarity:
    score: 3
    weight: 0.20
    justification: "Weakest at scene 1 (3): the portfolio opening hedges with 'before any opportunity is live' and references a 'bundle' concept absent from the frame, so a cold outsider gets what-but-not-why-now; scenes 2-5 are clearer (4) with concrete roles (solicitation author / responding firm / reviewing owner) and tasks legible in-frame."
  design_soundness:
    score: 3
    weight: 0.20
    justification: "Weakest at scenes 3 and 4 (3). Scene 3: the response form's checklist collapses a visibly two-arm map (Attakar/Gura) into one combined row and gives no explicit Submit-gating signal, so 'click an area on the map OR tick it; >=1 required' doesn't read as a clean 1:1 affordance. Scene 4: STATUS 'Awarded' is double-stamped in the ACTIONS column and the RECOMMENDATION/SCORE columns ship empty, leaving a dead action slot. Scenes 2 and 5 are coherent (4)."
  visual_polish:
    score: 3
    weight: 0.15
    justification: "Weakest at scenes 1, 2, 4, 5 (3). Scene 3 RECOVERED to 4 — the arm legend now reads clean top-left with BOTH rows (Intervention green / Comparison blue) visible and the Mapbox logo/attribution unobstructed at bottom-left; no occlusion. Remaining 3s: scene 2's green/blue arm fills are too similar to read the DiD assignment; scene 4 has a clipped/overlapped breadcrumb, inconsistent empty-state glyphs ('—' vs '-'), and a dead lower canvas; scene 5's 'not yet built' panel sits too close to the timeline row with an unbalanced right column; scene 1 stacks redundant 'ready' signals and strands one card in mostly-empty space."
  why_groundedness:
    score: 4
    weight: 0.20
    justification: "Strongest dimension and consistent across all five scenes. Every concept_claim traces cleanly to its grounded+implemented why_brief spine item (S3-S7) and is realized on-screen (the Create-solicitation button on a READY-TO-SOLICIT card; the snapshotted Coverage-areas panel; the 'Which areas can you cover?' selector; the resolved SELECTED COVERAGE pill; the honest 'not yet built' award disclosure matching gap G1). Held from 5 because the snapshot's 'frozen at creation' has no visible ID/timestamp to verify in-frame (scene 2)."
  claim_reality_coherence:
    score: 3
    weight: 0.10
    blocking: false
    justification: "Advisory, non-blocking, EXCLUDED from overall_score. Mostly demonstrated (4-5) except scene 4 (3): the responses row STATUS reads 'Awarded' while the scene narrates Maya REVIEWING a fresh application tied to its coverage — the frame shows the post-award end-state, not the review moment. Surfaced for spec/capture triage; does not gate. Scene 1 is a clean 5 (every narrated element present)."
  motion_friction:
    score: 3
    weight: 0.15
    justification: 'Every scene is a single static frame with no spinner, 404, or dead-end, so all five judges held the rubric default of 3 (no positive motion evidence is observable from a still). This is a capture-shape floor common to all scenes, not a product-friction finding — it does not by itself indicate a usability problem.'

overall_score: 3
