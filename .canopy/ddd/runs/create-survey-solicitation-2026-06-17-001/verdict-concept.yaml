fix_recommendation: |
  Overall is dragged to fail (2) by a SINGLE, mechanical visual_polish defect — fix it and
  the run lifts to warn (3) with no concept change required.

  [PRODUCT] Scene 3 (respond form) — the arm legend's 'Comparison' (blue) row is clipped at
  the legend box's bottom edge and overlaps the Mapbox attribution wordmark, so the color key
  that decodes intervention vs comparison is half-unreadable. Give the legend control enough
  height to show BOTH rows fully and offset it off the attribution logo (move the legend to a
  top corner, or push attribution to the opposite corner). This is the weakest-link driver.

  [PRODUCT] Scene 2 (create form) — the same legend-vs-attribution collision recurs; apply the
  same legend reposition. Also color-key the footer arm chip ('Comparison | Intervention') to the
  green/blue map fills and reconcile the arm ordering between legend and chip.

  [PRODUCT] Scene 4 (responses) — unify the empty-state glyph: use '—' for BOTH RECOMMENDATION and
  SCORE (currently '—' vs '-'), and give the muted 'Awarded' ACTIONS status a non-color affordance
  cue so it is unmistakably non-clickable. (Core interaction coherence is already sound — the prior
  duplication/contradiction is gone.)

  [PRODUCT] Scenes 1 & 4 — re-capture without the stray mouse cursor sitting over the heading /
  breadcrumb; tighten the portfolio surface (scene 1) so the lone finished-study card isn't
  stranded in ~55% dead whitespace (preview the in-progress plans inline or use a denser grid).

  [CONCEPT-lite] Lift concept_clarity off the default 3: surface an explicit named actor/role on
  the award + responses surfaces (e.g. 'Awarded by Maya, Program Owner') and add a one-line plain
  summary under the 'R6 — Attakar x Gura' shorthand so a cold outsider needs no question answered.

  [DEFER] claim_reality_coherence (advisory): scene 1's 'bundle / draft-plan' helper text and
  'carries that plan as the source' are narrated but not shown; scene 4 narration references
  View/Review/Award actions as 'ready' though the response is already awarded in-frame. Triage
  the narration-vs-frame wording later; non-blocking.
