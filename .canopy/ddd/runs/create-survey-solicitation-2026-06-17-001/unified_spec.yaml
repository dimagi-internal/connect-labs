auth:
  type: session
base_url: https://labs.connect.dimagi.com
name: create-survey-solicitation
narrative:
  Maya has just finished designing her Round 6 study — the two-arm Attakar-versus-Gura
  household survey that her Vitamin-A programme will use to check whether its visits
  are actually changing coverage. She has the plan; what she does not yet have is
  the independent survey firm to run it. So from the plan she just built, Maya clicks
  "Create solicitation" and lets the plan itself become the call for a firm. On the
  create form the R6 plan is already waiting as the coverage area, so Maya only sets
  the survey scope and publishes the open call. Across the country, Amina — who runs
  an independent survey firm — opens the public solicitation, reads the coverage on
  offer, ticks the Attakar-and-Gura area as the work her enumerators can staff, and
  submits her firm's application. Back in her workspace, Maya opens the responses
  and sees Amina's firm tied to the exact coverage area she designed — the loop from
  a study plan to a real applicant closed. Awarding that firm and standing up the
  live Connect opportunity her enumerators would actually run is the step Maya is
  reaching for next; today she has recruited and can compare applicants against the
  real coverage.
narrative_locked: true
narrative_locked_at: '2026-06-18T12:12:32.891224+00:00'
narrative_synced_at: '2026-06-18T16:51:38.224974+00:00'
