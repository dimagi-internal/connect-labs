narrative_synced_version: 4
personas:
  amina:
    color: '#059669'
    intro:
      Amina runs an independent household-survey firm and is looking for survey
      work she can staff; she answers public solicitations with the coverage her enumerators
      can commit to.
    name: Amina Okafor
    role: Director, independent survey firm (Health Bridge Nigeria)
  maya:
    color: '#7C3AED'
    intro:
      Maya designed the Round 6 two-arm Attakar-versus-Gura study for her Vitamin-A
      programme and now needs to recruit the independent firm that will run the household
      survey on it.
    name: Maya
    role: Program study planner
review_mode: autonomous
scenes:
  - concept_claim:
      A program owner launches a solicitation directly from a finished
      micro-plan via a Create solicitation button that carries that plan as the source,
      without leaving the planning workspace.
    design_intent:
      'Bet: recruiting a firm is a continuation of designing the study,
      so the call starts from the plan the owner just built — not from a blank solicitation
      form.'
    features:
      - description:
          The program workspace (portfolio) renders a "Create solicitation"
          link on every plan card and study-group card, to /solicitations/create/?source_program_id=<pid>&source_group_id=<gid>
        id: create-solicitation-from-portfolio
        verify:
          'Playwright: on /microplans/program/10008/, assert the R6 — Attakar ×
          Gura study-group card reads as finished (a "ready to solicit" cue, "2 wards",
          reviewed) and renders a primary "Create solicitation" anchor whose href contains
          source_group_id=4492'
    narrative:
      Maya stands in her programme portfolio, where the Round 6 study she just
      finished — Attakar as the intervention arm, Gura as the comparison, both approved
      — sits as a reviewed study group flagged ready to solicit; instead of hunting
      for a survey firm in a separate tool, she clicks "Create solicitation" right on
      that R6 group card to turn it into an open call.
    persona: maya
    provenance: S3
    show:
      On the program portfolio Maya finds her finished R6 — Attakar × Gura study
      group card — reviewed, 2 wards, flagged "ready to solicit" with Create solicitation
      as its primary action — and clicks it; the app carries that group's approved plan
      straight into a new solicitation.
    actions:
      - kind: wait_for
        target: css:a.primary-dark:has-text("Create solicitation")
        note: the finished R6 study-group card's primary "Create solicitation" CTA paints
      - kind: hold
        seconds: 1.0
        note: let the ready-to-solicit study card settle as the page hero
      - kind: hover
        target: css:a.primary-dark:has-text("Create solicitation")
        seconds: 1.5
        note:
          glide the cursor to the R6 group's primary "Create solicitation" CTA — the
          next step is clicking it; we hover (not click) so the capture stays on the
          portfolio that scene 1 is about
    title: Maya turns her finished study into a call for a firm
    url: /microplans/program/10008/
  - concept_claim:
      The create form pre-seeds the source plan into a Coverage areas panel
      snapshotted at creation, so the owner publishes the exact coverage the firm will
      bid on.
    design_intent:
      'Bet: the owner should confirm the coverage the firm will see, frozen
      at creation, so later plan edits never silently change a published solicitation.'
    features:
      - description:
          The create form renders a Coverage-areas panel populated from the
          snapshotted plans (source_plan_ids=[4494]), drawing the wards as a real map
          — Attakar (intervention, green) and Gura (comparison, blue) polygons fit to
          bounds
        id: coverage-panel-from-snapshot
        verify:
          'Playwright: on the create form with source_group_id=4492, assert a "#sol-coverage-map"
          element renders a mapbox canvas and that the page text includes "Attakar" and
          "Gura"'
    narrative:
      On the create form Maya sees her R6 plan already sitting in a Coverage-areas
      panel that draws the two wards as a map — Attakar in green, Gura in blue — so
      she confirms the exact coverage at a glance and only writes the survey scope rather
      than re-describing the area she just designed.
    persona: maya
    provenance: S4
    show:
      Maya reads the pre-seeded title and the Coverage-areas panel, which shows
      the R6 — Attakar x Gura coverage as a map (Attakar green / Gura blue ward polygons,
      not just names); she confirms the survey scope and the form is ready to publish
      with that plan attached.
    actions:
      - kind: wait_for
        target: css:#sol-coverage-map canvas.mapboxgl-canvas
        note: the pre-seeded Coverage-areas map paints the Attakar/Gura ward polygons
      - kind: hover
        target: css:#sol-coverage-map
        seconds: 1.5
        note:
          glide the cursor over the snapshotted Coverage-areas panel — Maya confirms
          the exact coverage the firm will bid on
      - kind: scroll_to
        target: css:button[type=submit]:has-text("Create Solicitation")
        note: bring the publish button into frame
      - kind: hover
        target: css:button[type=submit]:has-text("Create Solicitation")
        seconds: 1.5
        note: 'rest the cursor on the publish button — NON-DESTRUCTIVE, we do NOT click; clicking would create a duplicate of solicitation #4495, so the hover just shows the form is ready to publish with the plan attached'
    title: Maya finds the plan already waiting as the coverage area
    url: /solicitations/create/?source_program_id=10008&source_group_id=4492
  - concept_claim:
      A survey firm reads the public solicitation and applies by selecting
      a specific coverage area from a checklist, and submission is blocked until one
      area is chosen.
    design_intent:
      'Bet: an application should commit to a concrete coverage area, not
      a free-text claim, so the owner compares applicants on the real area they will
      work.'
    features:
      - description:
          The public response form draws the coverage as an interactive map
          — clicking a ward boundary toggles its whole parent plan, synced two-way with
          the "Which areas can you cover?" checklist; submit is blocked until at least
          one area is selected
        id: respondent-coverage-selector
        verify:
          'Playwright: on /solicitations/4495/respond/, assert a "#sol-respond-map"
          mapbox canvas renders the Attakar/Gura wards and a "#sol-plan-checklist" checkbox
          for the R6 plan; ticking the R6 area enables Submit (≥1 required to submit)'
    narrative:
      Amina opens the public solicitation, sees the Attakar-and-Gura household
      survey drawn as a map, and clicks the coverage area on the map — synced to the
      checklist — to commit the work her enumerators can staff before submitting her
      firm's application.
    persona: amina
    provenance: S5
    show:
      On the application form Amina sees the R6 — Attakar x Gura coverage drawn
      as an interactive map (Attakar green / Gura blue); she selects the coverage by
      clicking the boundary on the map, which ticks the matching checklist entry, and
      only then is the submit enabled (at least one area is required to submit).
    actions:
      - kind: wait_for
        target: css:#sol-respond-map canvas.mapboxgl-canvas
        note: the coverage map paints the Attakar (green) + Gura (blue) ward polygons
      - kind: hold
        seconds: 1.5
        note: let the map settle and fit to the two wards
      - kind: click
        target: css:#sol-plan-checklist label:has-text("R6 — Attakar") input[type=checkbox]
        note:
          select the coverage area — synced two-way with the map; this enables Submit
          (≥1 required)
      - kind: hold
        seconds: 1.0
        note: the R6 area is now selected and Submit is enabled
    title: Amina reads the open call and ticks the area she can staff
    url: /solicitations/4495/respond/?program_id=10008
  - concept_claim:
      The owner reviewing responses sees each firm's selected coverage
      area resolved from the authoritative snapshot, tying every application to a concrete
      designed coverage.
    design_intent:
      'Bet: the reviewer should compare applicants against the designed
      coverage, so the selected area the firm committed to is shown directly on the
      response.'
    features:
      - description:
          The responses list shows each response's selected_plan_names resolved
          against the solicitation snapshot
        id: reviewer-sees-selected-coverage
        verify:
          'Playwright: on /solicitations/4495/responses/, assert the submitted response
          row shows "R6 — Attakar" as its selected coverage area'
    narrative:
      Back in her workspace Maya opens the responses and reads, on the one
      application, the exact coverage area she designed — R6 Attakar x Gura — so she
      is comparing a real firm against the real survey, the loop from study plan to
      applicant closed.
    persona: maya
    provenance: S6
    show:
      On the responses page Maya sees the submitted application showing the selected
      coverage "R6 — Attakar x Gura", with View, Review, and Award actions ready.
    actions:
      - kind: wait_for
        target: css:span:has-text("R6 — Attakar")
        note: the response row's "Selected coverage" chip resolves to R6 — Attakar × Gura
      - kind: hover
        target: css:span:has-text("R6 — Attakar")
        seconds: 1.5
        note:
          glide the cursor onto the firm's selected-coverage chip — every application
          tied to a concrete designed coverage area; NON-DESTRUCTIVE (read-only hover)
      - kind: hover
        target: css:a:has-text("Award")
        seconds: 1.5
        note:
          move to the Award action Maya is reaching for next — hover only, the award
          itself happens in scene 5; reading the row does not mutate state
    title: Maya sees the firm tied to the coverage she designed
    url: /solicitations/4495/responses/?program_id=10008
  - concept_claim:
      Awarding the chosen firm records the decision and notifies the organization,
      while standing up the live Connect opportunity that firm would run is the next
      step, not yet built.
    design_intent:
      'Bet: the demo must be honest about the planning-versus-execution
      boundary — awarding a firm is a real, shipped end-state, and field execution (provisioning
      the live opportunity) is the aspirational next step, not a shipped mechanism dressed
      up as done.'
    features:
      - description:
          The award screen summarizes the firm by NAME (Health Bridge Nigeria)
          with its selected coverage, and on award records the decision and confirms the
          organization was notified ("Awarded to <org> — the organization has been notified");
          it does NOT, on award, provision a Connect opportunity or push the plan's work
          areas into one — that downstream step is deferred (G1)
        id: award-records-and-notifies-provision-deferred
        verify:
          'Playwright: on /solicitations/response/4496/award/, after award assert
          a confirmation reading "Awarded to Health Bridge Nigeria" and "has been notified",
          plus a "Next step — not yet built" panel; grep: no create_opportunity/WorkArea-provision
          call in commcare_connect/solicitations/'
    narrative:
      With a firm tied to her coverage, Maya awards Amina's firm — the screen
      records the decision and confirms Health Bridge Nigeria has been notified, so
      the recruit-review-award loop is real and shipped end-to-end. The screen stays
      honest about what comes next — standing up the live Connect opportunity her enumerators
      would actually run is the work ahead, explicitly framed as not-yet-built.
    persona: maya
    provenance: S7
    actions:
      - kind: wait_for
        target: css:input[name=reward_budget]
        note: the award form with the firm summary (org name + coverage) has loaded
      - kind: hold
        seconds: 1.0
        note: let Maya read the "You're awarding" summary before she commits
      - kind: fill
        target: css:input[name=reward_budget]
        value: '500000'
        note: optional budget for the awarded firm
      - kind: click
        target: css:button[type=submit]:has-text("Award")
        note: award the firm — records the decision and notifies the organization
      - kind: wait_for
        target: text:has been notified
        note:
          the in-place confirmation "Awarded to Health Bridge Nigeria — the organization
          has been notified" renders
      - kind: hold
        seconds: 1.5
        note: settle on the confirmation + the "Next step — not yet built" panel
    show:
      Maya awards Amina Okafor's firm and lands on the confirmation — "Awarded to
      Health Bridge Nigeria — the organization has been notified" — with the award summary
      (org name, coverage) and a dashed "Next step — not yet built" panel that keeps
      provisioning the live Connect opportunity (G1) honestly framed as the deferred
      next step, not done for her today.
    title: Maya awards the firm and sees it was notified
    url: /solicitations/response/4496/award/?program_id=10008
setup:
  command: python scripts/walkthroughs/create-survey-solicitation/reset_award.py
  rerun: per_render
  timeout_seconds: 600
