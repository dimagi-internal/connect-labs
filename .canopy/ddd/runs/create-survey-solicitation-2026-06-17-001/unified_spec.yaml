auth:
  type: session
base_url: https://labs.connect.dimagi.com
name: create-survey-solicitation
narrative:
  Maya has just finished designing her Round 6 study — the two-arm Attakar-versus-Gura
  household survey that her Vitamin-A programme will use to check whether its visits
  are actually changing coverage. She has the plan; what she does not yet have is
  the independent survey firm to run it. So from the plan she just built, Maya clicks
  "Create solicitation" and lets the plan itself become the call for a firm. On the
  create form the R6 plan is already waiting as the coverage area, so Maya only sets
  the survey scope, marks the call active, and publishes it — minting a brand-new
  solicitation live, on camera, no fixed record reused. A survey firm then opens that
  exact public solicitation, reads the coverage on offer, ticks the Attakar-and-Gura
  area as the work its enumerators can staff, and submits its application. Back in
  her workspace, Maya opens the responses for the call she just published and sees
  the applying firm tied to the exact coverage area she designed — the loop from a
  study plan to a real applicant closed, minted fresh each render. Awarding that firm
  and standing up the live Connect opportunity her enumerators would actually run
  is the step Maya is reaching for next; today she has recruited and can compare applicants
  against the real coverage.
narrative_locked: true
narrative_locked_at: '2026-06-18T12:12:32.891224+00:00'
personas:
  firm:
    color: '#059669'
    intro:
      The logged-in survey firm runs independent household surveys and is looking
      for survey work it can staff; it answers public solicitations with the coverage
      its enumerators can commit to. (The on-camera response is submitted by the real
      session's own organization — there is no scripted firm identity.)
    name: The logged-in survey firm
    role: Independent survey firm (the session's own organization)
  maya:
    color: '#7C3AED'
    intro:
      Maya designed the Round 6 two-arm Attakar-versus-Gura study for her Vitamin-A
      programme and now needs to recruit the independent firm that will run the household
      survey on it.
    name: Maya
    role: Program study planner
review_mode: autonomous
scenes:
  - concept_claim:
      A program owner can launch a call for a firm directly from a finished
      micro-plan, because the study-group card carries a button that opens the solicitation
      form with that plan already attached as the source.
    design_intent:
      'Bet: recruiting a firm is a continuation of designing the study,
      so the call starts from the plan the owner just built — not from a blank solicitation
      form.'
    features:
      - description:
          The program workspace (portfolio) renders a "Create solicitation"
          link on every plan card and study-group card, to /solicitations/create/?source_program_id=<pid>&source_group_id=<gid>
        id: create-solicitation-from-portfolio
        verify:
          'Playwright: on /microplans/program/10008/, assert the R6 — Attakar ×
          Gura study-group card reads as finished (a "ready to solicit" cue, "2 wards",
          reviewed) and renders a primary "Create solicitation" anchor whose href contains
          source_group_id=4492'
    narrative:
      Maya stands in her programme portfolio, where the Round 6 study she just
      finished — Attakar as the intervention arm, Gura as the comparison, both approved
      — sits as a reviewed study group flagged ready to solicit; instead of hunting
      for a survey firm in a separate tool, the R6 group card offers a call-for-a-firm
      button right on it as the way to turn that finished plan into an open call.
    persona: maya
    provenance: S3
    show:
      On the program portfolio Maya finds her finished R6 — Attakar × Gura study
      group card — reviewed, 2 wards, flagged "ready to solicit" with Create solicitation
      as its primary action; that button carries the group's approved plan straight
      into a new solicitation.
    actions:
      - kind: wait_for
        target: css:a.primary-dark:has-text("Create solicitation")
        note: the finished R6 study-group card's primary "Create solicitation" CTA paints
      - kind: hold
        seconds: 1.0
        note: let the ready-to-solicit study card settle as the page hero
      - kind: hover
        target: css:a.primary-dark:has-text("Create solicitation")
        seconds: 1.5
        note:
          glide the cursor to the R6 group's primary "Create solicitation" CTA — the
          next scene navigates to it; we hover (not click) here so this capture stays
          on the portfolio that scene 1 is about
    title: Maya turns her finished study into a call for a firm
    url: /microplans/program/10008/
  - concept_claim:
      The create form pre-seeds the source plan into a Coverage areas panel
      snapshotted at creation, and on submit mints a brand-new active solicitation whose
      id is read off the resulting responses page.
    design_intent:
      'Bet: the owner should confirm the coverage the firm will see, frozen
      at creation, so later plan edits never silently change a published solicitation;
      and the call is minted live each render rather than reusing a fixed record.'
    features:
      - description:
          The create form renders a Coverage-areas panel populated from the
          snapshotted plans (source_plan_ids=[4494]), drawing the wards as a real map
          — Attakar (intervention, green) and Gura (comparison, blue) polygons fit to
          bounds
        id: coverage-panel-from-snapshot
        verify:
          'Playwright: on the create form with source_group_id=4492, assert a "#sol-coverage-map"
          element renders a mapbox canvas and that the page text includes "Attakar" and
          "Gura"'
      - description:
          Submitting the create form with status=active mints a new type=solicitation
          record on program 10008 and redirects to /solicitations/<new-id>/responses/
          ("Review and manage responses"), from which the new solicitation_id is captured
          on camera
        id: create-mints-active-solicitation
        verify:
          'Playwright: after clicking "Create Solicitation" with status set to Active,
          assert the URL matches /solicitations/(\d+)/responses/ and the page reads "Review
          and manage responses"'
    narrative:
      On the create form Maya sees her R6 plan already sitting in a Coverage-areas
      panel that draws the two wards as a map — Attakar in green, Gura in blue — so
      she confirms the exact coverage at a glance; she writes the survey scope into
      the description, marks the call Active so firms can apply, and clicks Create Solicitation
      to mint the open call and land on its responses page.
    persona: maya
    provenance: S4
    show:
      Maya reads the pre-seeded title and the Coverage-areas panel, which shows
      the R6 — Attakar × Gura coverage as a map (Attakar green / Gura blue ward polygons,
      not just names); she fills the Description, sets Status to Active, scrolls to
      the publish button, and clicks "Create Solicitation" — minting a fresh call and
      landing on its "Review and manage responses" page.
    actions:
      - kind: wait_for
        target: css:#sol-coverage-map canvas.mapboxgl-canvas
        note: the pre-seeded Coverage-areas map paints the Attakar/Gura ward polygons
      - kind: hover
        target: css:#sol-coverage-map
        seconds: 1.0
        note:
          glide the cursor over the snapshotted Coverage-areas panel — Maya confirms
          the exact coverage the firm will bid on
      - kind: scroll_to
        target: css:#id_description
        note:
          scroll down to the Description field — REQUIRED to publish; the pre-seed
          fills the title and scope from the plan but leaves Description for Maya to write
      - kind: fill
        target: css:#id_description
        value:
          Independent household survey to verify Vitamin-A program coverage across
          the Round 6 Attakar × Gura two-arm study — rooftop visits, GPS-stamped, ~285
          treatment / 263 comparison surveys per round.
        note: Maya writes the survey scope into the required Description field
      - kind: select
        target: css:#id_status
        value: active
        note:
          set Status to Active — the form defaults to Draft, and can_accept_responses()
          requires status=='active', so without this scene 3's respond form would be blocked
          (a draft call accepts no responses)
      - kind: hold
        seconds: 1.0
        note:
          let the filled Description + Active status settle so the capture shows the
          completed form
      - kind: scroll_to
        target: css:button[type=submit]:has-text("Create Solicitation")
        note: bring the publish button into frame
      - kind: click
        target: css:button[type=submit]:has-text("Create Solicitation")
        must_succeed: true
        note:
          Maya clicks Create Solicitation — the REAL publish. This mints a brand-new
          active solicitation on program 10008 (source_group_id=4492) live, on camera;
          the create view redirects to /solicitations/<new-id>/responses/, where the next
          action captures the fresh id. No fixed record is reused; ensure_demo.py sweeps
          every render's call before the next render.
      - kind: wait_for
        target: text:Review and manage responses
        note:
          the post-create redirect lands on the new call's responses page ("Review
          and manage responses") — the open call is now published and live
      - kind: capture
        var: solicitation_id
        source: url
        pattern: /solicitations/(\d+)/
        must_succeed: true
        note:
          read the brand-new solicitation's id off the responses-page URL the create
          redirect produced; scenes 3/4/5 thread this fresh id forward via ${solicitation_id}
      - kind: hold
        seconds: 1.5
        note: settle on the responses page for the just-minted call
    title: Maya mints the call live and lands on its responses page
    url: /solicitations/create/?program_id=10008&source_program_id=10008&source_group_id=4492
  - concept_claim:
      A survey firm reads the public solicitation and applies by selecting
      a specific coverage area from a checklist, and submission is blocked until one
      area is chosen.
    design_intent:
      'Bet: an application should commit to a concrete coverage area, not
      a free-text claim, so the owner compares applicants on the real area they will
      work.'
    features:
      - description:
          The public response form draws the coverage as an interactive map
          — clicking a ward boundary toggles its whole parent plan, synced two-way with
          the "Which areas can you cover?" checklist; submit is blocked until at least
          one area is selected
        id: respondent-coverage-selector
        verify:
          'Playwright: on /solicitations/${solicitation_id}/respond/, assert a "#sol-respond-map"
          mapbox canvas renders the Attakar/Gura wards and a "#sol-plan-checklist" checkbox
          for the R6 plan; ticking the R6 area enables Submit (≥1 required to submit)'
      - description:
          Submitting the response redirects to the solicitation's public detail
          page (/solicitations/${solicitation_id}/) which shows the "Coverage areas" the
          firm committed to
        id: respond-submit-lands-on-public-detail
        verify:
          'Playwright: after clicking "Submit Response", assert the URL is /solicitations/${solicitation_id}/
          and the page text includes "Coverage areas"'
    narrative:
      The logged-in survey firm opens the public solicitation Maya just published,
      sees the Attakar-and-Gura household survey drawn as a map, ticks the coverage
      area on the checklist to commit the work its enumerators can staff, and submits
      its application against the call she minted moments ago.
    persona: firm
    provenance: S5
    show:
      On the application form the firm sees the R6 — Attakar × Gura coverage drawn
      as an interactive map (Attakar green / Gura blue); it selects the coverage by
      ticking the checklist entry, which enables the submit (at least one area is required),
      then submits — landing on the call's public detail page with its committed coverage.
    actions:
      - kind: wait_for
        target: css:#sol-plan-checklist input[type=checkbox]
        note:
          gate on the coverage CHECKLIST checkbox — the load-bearing, always-present
          DOM element that proves the respond page (for the just-minted call) has loaded.
          This is the navigation gate; we do NOT gate on the Mapbox canvas here because
          the WebGL canvas paints later/asynchronously and a slow canvas must not block
          the (reliable) checklist click.
      - kind: wait_for
        target: css:#sol-respond-map canvas.mapboxgl-canvas
        seconds: 5
        note:
          best-effort wait (≤5s) for the coverage map to paint the Attakar (green) +
          Gura (blue) ward polygons — NON-blocking; if the WebGL canvas is slow this logs
          a timeout and we proceed, since the checklist (already present) is what the click
          needs. Capped at 5s so a slow canvas adds at most 5s of dead air, not 12s.
      - kind: hold
        seconds: 1.5
        note: let the map settle and fit to the two wards
      - kind: click
        target: css:#sol-plan-checklist input[type=checkbox]
        must_succeed: true
        note:
          tick the coverage area — synced two-way with the map; this enables Submit
          (≥1 required). The created call has exactly one plan (R6 — Attakar × Gura),
          so the first checkbox is that area.
      - kind: hold
        seconds: 1.0
        note: the R6 area is now selected and Submit is enabled
      - kind: scroll_to
        target: css:button[type=submit]:has-text("Submit Response")
        note: bring the Submit Response button into frame
      - kind: click
        target: css:button[type=submit]:has-text("Submit Response")
        must_succeed: true
        note:
          submit the firm's application — the REAL submit; redirects to the call's
          public detail page
      - kind: wait_for
        target: text:Coverage areas
        note:
          the post-submit redirect lands on the solicitation's public detail page,
          which shows the "Coverage areas" the firm committed to
      - kind: hold
        seconds: 1.0
        note: settle on the public detail page confirming the submitted application
    title: A survey firm reads the open call and ticks the area it can staff
    url: /solicitations/${solicitation_id}/respond/?program_id=10008
  - concept_claim:
      The owner reviewing responses sees each firm's committed coverage
      area resolved from the authoritative snapshot, tying every application to a concrete
      designed coverage.
    design_intent:
      'Bet: the reviewer should compare applicants against the designed
      coverage, so the area the firm committed to is shown directly on the response.'
    features:
      - description:
          The responses list shows each response's selected_plan_names resolved
          against the solicitation snapshot, and renders an Award action linking to /solicitations/response/<response-id>/award/
        id: reviewer-sees-selected-coverage
        verify:
          'Playwright: on /solicitations/${solicitation_id}/responses/, assert the
          submitted response row shows "R6 — Attakar" as its selected coverage area and
          an "Award" link whose href contains response/<id>/award'
    narrative:
      Back in her workspace Maya opens the responses for the call she minted
      a moment ago and reads, on the application that arrived, the exact coverage area
      she designed — R6 Attakar × Gura — so she is comparing a real firm against the
      real survey, the loop from study plan to applicant closed.
    persona: maya
    provenance: S6
    show:
      On the responses page Maya sees the submitted application showing the selected
      coverage "R6 — Attakar × Gura", with View, Review, and Award actions ready; the
      Award link carries the response's id forward to the award screen.
    actions:
      - kind: wait_for
        target: css:span:has-text("R6 — Attakar")
        note: the response row's "Selected coverage" chip resolves to R6 — Attakar × Gura
      - kind: hover
        target: css:span:has-text("R6 — Attakar")
        seconds: 1.5
        note:
          glide the cursor onto the firm's selected-coverage chip — every application
          tied to a concrete designed coverage area; NON-DESTRUCTIVE (read-only hover)
      - kind: hover
        target: css:a:has-text("Award")
        seconds: 1.5
        note:
          move to the Award action Maya is reaching for next — hover only, the award
          itself happens in scene 5; reading the row does not mutate state
      - kind: capture
        var: response_id
        source: element
        target: css:a:has-text("Award")
        attr: href
        pattern: response/(\d+)/
        must_succeed: true
        note:
          read the fresh response's id off the Award link's href (/solicitations/response/<id>/award/);
          scene 5 navigates to that award screen via ${response_id}
    title: Maya sees the firm tied to the coverage she designed
    url: /solicitations/${solicitation_id}/responses/?program_id=10008
  - concept_claim:
      Awarding the chosen firm records the decision and notifies the organization,
      while standing up the live Connect opportunity that firm would run is the next
      step, not yet built.
    design_intent:
      'Bet: the demo must be honest about the planning-versus-execution
      boundary — awarding a firm is a real, shipped end-state, and field execution (provisioning
      the live opportunity) is the aspirational next step, not a shipped mechanism dressed
      up as done.'
    features:
      - description:
          The award screen summarizes the applying firm (the session's own
          organization) with its selected coverage, and on award records the decision
          and confirms the organization was notified ("Awarded to <org> — the organization
          has been notified"); it does NOT, on award, provision a Connect opportunity
          or push the plan's work areas into one — that downstream step is deferred (G1)
        id: award-records-and-notifies-provision-deferred
        verify:
          'Playwright: on /solicitations/response/${response_id}/award/, after award
          assert a confirmation reading "Awarded to" and "has been notified", plus a "Next
          step — not yet built" panel; grep: no create_opportunity/WorkArea-provision
          call in commcare_connect/solicitations/'
    narrative:
      With a firm tied to her coverage, Maya awards the applying firm — the
      screen records the decision and confirms the organization has been notified, so
      the recruit-review-award loop is real and shipped end-to-end. The screen stays
      honest about what comes next — standing up the live Connect opportunity her enumerators
      would actually run is the work ahead, explicitly framed as not-yet-built.
    persona: maya
    provenance: S7
    show:
      Maya awards the applying firm and lands on the confirmation — "Awarded to
      <the session's organization> — the organization has been notified" — with the
      award summary (org name, coverage) and a dashed "Next step — not yet built" panel
      that keeps provisioning the live Connect opportunity (G1) honestly framed as the
      deferred next step, not done for her today.
    actions:
      - kind: wait_for
        target: css:input[name=reward_budget]
        note: the award form with the firm summary (org name + coverage) has loaded
      - kind: hold
        seconds: 1.0
        note: let Maya read the "You're awarding" summary before she commits
      - kind: fill
        target: css:input[name=reward_budget]
        value: '500000'
        note: optional budget for the awarded firm
      - kind: click
        target: css:button[type=submit]:has-text("Award")
        must_succeed: true
        note: award the firm — records the decision and notifies the organization
      - kind: wait_for
        target: text:has been notified
        note:
          the in-place confirmation "Awarded to <org> — the organization has been
          notified" renders
      - kind: hold
        seconds: 1.5
        note: settle on the confirmation + the "Next step — not yet built" panel
    title: Maya awards the firm and sees it was notified
    url: /solicitations/response/${response_id}/award/?program_id=10008
setup:
  command: python scripts/walkthroughs/create-survey-solicitation/ensure_demo.py
  rerun: per_render
  timeout_seconds: 900
