findings:
  - detail:
      The arm legend's second row ('Comparison', blue swatch) is CLIPPED at the
      legend box's bottom edge and overlaps the Mapbox attribution wordmark, so the
      blue swatch + label are cut off / hard to read. The color key that decodes the
      two study arms — the load-bearing visual on this interactive coverage map — is
      broken on screen. Distinct saturated green/blue ward polygons and clean buttons
      keep it from a 1, but a clipped legend on the central control is a real, pointable
      defect (max 2). This is the weakest-link driver for the whole run.
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      "Give the legend control enough height to show BOTH rows (Intervention
      green / Comparison blue) fully, and offset it vertically off the Mapbox attribution
      logo (move the legend to a top corner, or push attribution to the opposite corner).
      Secondary: add a text halo to the 'Attakar'/'Gura' map labels for projector
      legibility and reflow the helper text so 'required to submit' does not strand
      on its own line."
    route: PRODUCT
    scene: 3 — Amina reads the open call and ticks the area she can staff
    severity: medium
  - detail:
      An outsider can state what+why in one sentence and a concrete role (study
      planner) is named, but the 'Snapshotted' framing needs the helper text to parse
      — clear to the familiar, not self-evident to a cold outsider. Held at the default
      3.
    dimension: concept_clarity
    fix_kind: mechanical
    fix_recommendation:
      Add a one-line plain-language gloss for 'Snapshotted at creation'
      (e.g. 'frozen copy — later plan edits won't change this call') inline next to
      the Attached pill so the freeze concept lands without reading the full helper
      paragraph.
    route: CONCEPT
