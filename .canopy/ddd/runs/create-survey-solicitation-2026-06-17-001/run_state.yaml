findings:
- detail: 'The identical ''Create solicitation'' button appears on all eight Draft
    (not-ready) plan cards in the PLANNING grid, as well as on the finished R6 study
    card. This is a contradictory affordance: it implies you can launch a solicitation
    from an unfinished/unapproved plan, which undercuts the scene''s concept that
    the call starts from a FINISHED plan. No dead end or error, so capped at 3 rather
    than 2.'
  dimension: design_soundness
  fix_kind: options
  fix_recommendation: 'Suppress or disable the ''Create solicitation'' affordance
    on Draft (not-approved) plan cards so it only appears where the concept holds
    — on approved plans/studies. Alternative: keep it visible but disabled with a
    tooltip (''approve this plan to solicit''). Needs a product pick between hide-entirely
    / disable-with-tooltip / only-on-approved.'
  route: PRODUCT
  scene: Scene 1 — Maya turns her finished study into a call for a firm
  severity: low
- detail: 'Up from iter4''s 2: the empty ''Untitled study · 0 wards'' placeholder
    card is gone and the finished R6 study card is clean. But it is held at 3 — the
    load-bearing finished ''R6 — Attakar × Gura'' study card is small and sits at
    the very bottom under a dense 8-card Draft ''PLANNING'' grid that dominates the
    viewport. Visual hierarchy fights the narrative: a viewer scanning top-down hits
    the muted Draft cards first and the finished study card last. Host chrome is grounding,
    not counted.'
  dimension: visual_polish
  fix_kind: redesign
  fix_recommendation: 'Make the finished R6 study card the focal point of the page:
    either move the ''Plan groups & studies'' section above the PLANNING grid, or
    give the finished study a hero treatment (larger card, top placement) so the READY-TO-SOLICIT
    card leads rather than the draft inventory. Product hierarchy change — not a capture
    crop.'
  route: PRODUCT
  scene: Scene 1 — Maya turns her finished study into a call for a firm
  severity: low
- detail: No concrete user/role is named on screen (only the abstract 'LLO/funder');
    the problem framing ('before any opportunity is live') lands but a true outsider
    must infer the actor. Per the deduction rule (no concrete user/role named), capped
    at 3.
  dimension: concept_clarity
  fix_kind: mechanical
  fix_recommendation: Name the actor on the page — a 'Maya / Program owner' context
    label or a one-line intro ('recruiting a survey firm from your finished study')
    in the header — so a cold viewer gets the role without narration.
  route: CONCEPT
  scene: Scene 1 — Maya turns her finished study into a call for a firm
  severity: low
- detail: The real two-ward map (Attakar green / Gura blue polygons) renders correctly
    and the 'Coverage areas (from micro-plan)' panel with 'Snapshotted at creation'
    is present and legible. Held at 3 because, in the tall full-page create-form strip,
    the load-bearing coverage panel (the one thing this scene must prove) sits small
    and low under several mostly-empty form fields competing for the eye. Capture-strip
    caveat noted (do not deduct the product for the full-page-strip artifact itself),
    but the product would benefit from presenting the coverage panel more prominently
    in a normal viewport.
  dimension: visual_polish
  fix_kind: options
  fix_recommendation: Present the rendered coverage map + '2 wards / 840 work areas'
    provenance prominently in the create form — a focused/expanded coverage section,
    or progressive disclosure that surfaces the attached-coverage proof above the
    long form body. This is a PRODUCT presentation change; do NOT 'fix' it with a
    camera zoom/crop/anchor or full_page:false.
  route: PRODUCT
  scene: Scene 2 — Maya finds the plan already waiting as the coverage area
  severity: low
- detail: The Award screen names the grantee (Amina Okafor) and the R6 survey and
    makes the award action clear, so the role/action half of the concept is present.
    But the load-bearing second half of the concept_claim — that provisioning a live
    Connect opportunity is the DEFERRED next step (not done today) — is entirely absent
    from the UI; it lives only in the narration. A one-sentence on-screen read gets
    'award a firm', not 'award is shipped, live-opp is next'. Held at 3.
  dimension: concept_clarity
  fix_kind: options
  fix_recommendation: 'Surface the planning-vs-execution boundary in the award UI:
    a muted helper line (''Awarding records this firm; standing up their live Connect
    opportunity is a separate next step, not yet built''), or a small disabled ''Provision
    opportunity (coming soon)'' chip. Needs a product pick between a helper line /
    disabled chip / a two-step indicator.'
  route: CONCEPT
  scene: Scene 5 — Maya looks ahead to standing up the real opportunity
