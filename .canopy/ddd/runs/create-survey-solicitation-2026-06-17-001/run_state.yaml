  - detail:
      "Score 3. The map<->checklist affordance is not a clean 1:1: the map exposes
      two visibly distinct arms (Attakar/Gura) but the checklist collapses them into
      a single 'R6 — Attakar × Gura' row, so 'click an area on the map OR tick it
      below' does not read as a coherent mapping, and the 'blocked until >=1 selected'
