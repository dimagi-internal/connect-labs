findings:
  - detail:
      "The load-bearing READY TO SOLICIT R6 study card does not pop: it sits at
      equal visual weight beside an 'Untitled study — 0 wards' placeholder card, beneath
      a dense grid of near-identical pale Draft cards, and the most strongly colored
      CTA in the frame ('Deploy →', blue) is not the scene's intended action. These
      are product-presentation problems a careful viewer catches in the UI itself; host
      chrome is grounding and not counted."
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      In the product, make the finished/ready study the visual hero
      of its row — a stronger card treatment and a high-contrast primary 'Create solicitation'
      button — and suppress or de-emphasize empty placeholder cards ('Untitled study
      — 0 wards') so the actionable study stands out from the draft grid. Fix the product's
      hierarchy; do not crop the capture.
    route: PRODUCT
    scene: Scene 1 — Maya turns her finished study into a call for a firm
    severity: medium
  - detail:
      A viewer familiar with M&E sampling can read that finished plans turn into
      solicitations, and concrete objects (plans, studies, 'Create solicitation') are
      on screen, but the five-second read lands on the wall of Draft cards rather than
      the one finished study the scene is about, and 'round/study/solicitation' go unexplained
      for a true outsider. Wrong-read sanity floor caps this at 3.
    dimension: concept_clarity
    fix_kind: mechanical
    fix_recommendation:
      Give the portfolio a clear 'Ready to solicit' grouping or filter
      so a cold planner's eye lands on the finished R6 study first, and add a one-line
      plain-language header explaining that approved plans become solicitations.
    route: CONCEPT
    scene: Scene 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      "Clean typography and consistent table styling, and the host chrome is grounding
      (not a flaw). But the load-bearing 'SELECTED COVERAGE: R6 — Attakar × Gura'
      badge is small and quiet relative to its importance, and the single-row table
      leaves the lower ~60% of the frame empty so the page reads sparse rather than
      intentionally minimal — a designer would have notes here."
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      Make the selected-coverage tie more prominent in the product
      — promote it to a dedicated 'COMMITTED COVERAGE' column with a 'matches your design'
      marker — and tighten the page's vertical rhythm so a one-row result reads as an
      intentional focused view rather than a half-empty table.
    route: PRODUCT
    scene: Scene 4 — Maya sees the firm tied to the coverage she designed
    severity: low
