findings:
  - detail:
      The scene's captured AFTER-frame is the public call-to-apply detail page
      (still showing 'Respond to this Solicitation'), not the post-submission result.
      The action_trace genuinely ticked the checkbox and clicked a must_succeed Submit
      that succeeded, but the viewer lands on a page that reads as 'a call you could
      apply to' rather than 'a firm just applied'. The BEFORE-frame is the responses-management
      inbox, not the respond form with the checklist.
    dimension: concept_clarity
    fix_kind: mechanical
    fix_recommendation:
      Re-script scene 3 so the AFTER-frame is the post-submit confirmation/submitted
      state (or the respond form mid-flow with the coverage checkbox visibly CHECKED
      + an active Submit), and use the actual respond form (checklist + empty selection)
      as the BEFORE-frame, so the before->after delta reads 'unticked -> ticked -> submitted'.
      This is a scene-scripting (spec actions) change, not a product change.
    route: PRODUCT
    scene: 3 — A survey firm reads the open call and ticks the area it can staff
    severity: low
  - detail:
      The single response row renders the applicant org as 'Unknown Organization'
      and SUBMITTED BY is the reviewer's own account (jonathan / jjackson@dimagi.com).
      For a scene whose job is tying a REAL FIRM to a coverage area, an anonymous firm
      submitted by the author's email undercuts the 'real firm vs real survey' narrative.
      (Stems from the deliberate decision to use the real logged-in session as the applicant
      — which is honest, but reads thin on the responses list.)
    dimension: visual_polish
    fix_kind: options
    fix_recommendation:
      Either (a) accept the real-session identity but have the product
      render a clear fallback display name when org_name is empty (e.g. the contact's
      name or 'Your organization') rather than the bare 'Unknown Organization' string;
      or (b) seed a named respondent org/persona for the demo. Needs a user pick between
      authenticity (a) and a scripted firm (b).
    route: PRODUCT
    scene: 4 — Maya sees the firm tied to the coverage she designed
    severity: medium
  - detail:
      On the freshly-minted call's responses landing, the load-bearing 'Active'
      status and the new solicitation id are under-surfaced (id only in the cropped
      URL) while a bare 'No responses yet' empty state dominates the body — softening
      the 'I just minted a live call' beat.
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      Add a one-time create-success affordance on landing ('Solicitation
      created — now Active') + render the id as a chip near the title, and raise the
      'Active' status's visual weight above the empty inbox.
    route: PRODUCT
    scene: 2 — Maya mints the call live and lands on its responses page
    severity: low
  - detail:
      "The R6 study card under-presents its load-bearing facts: the intervention/comparison
      composition and the '2 wards' count are buried as throwaway secondary text,
      three near-identical greens do overlapping emphasis work, and ~55% of the viewport
      is empty."
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      "Render 'Intervention: Attakar · Comparison: Gura · 2 wards'
      as a legible key-value block on the card, collapse the redundant readiness signaling
      to one canonical state chip, and optionally surface the first row of in-progress
      plans so the portfolio reads as a portfolio."
    route: PRODUCT
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      ADVISORY (non-blocking). Narration claims the firm ticks the area and submits,
      but the captured after-frame is the pre-application public page with no submitted/confirmation
      state, and 'submission blocked until one chosen' is shown nowhere. Two load-bearing
      claims rest on the trace, not the frame.
    dimension: claim_reality_coherence
    fix_kind: mechanical
    fix_recommendation:
      Same as the scene-3 concept_clarity finding — landing the after-frame
      on the submitted state resolves this too. Advisory; logged for later triage.
    route: DEFER
