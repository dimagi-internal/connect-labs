findings:
  - detail:
      Score 3. The portfolio opening hedges with a subtitle 'before any opportunity
      is live' that signals this is pre-operational, and the intro paragraph describes
      a 'bundle' concept ('A bundle offers a survey firm a read-only set of existing
      plans — tick draft plans below, then group them') for which no element exists
      on this surface. A cold outsider gets what-but-not-why-now and asks 'where is
      the bundle?'. Clear to someone familiar with the M&E survey-recruitment space;
      default 3 holds.
    dimension: concept_clarity
    fix_kind: mechanical
    fix_recommendation:
      Drop or reframe the 'before any opportunity is live' subtitle
      hedge, and remove the 'bundle' sentence from the intro paragraph since no bundle
      is shown — describe only what is on screen, so a cold viewer reads 'turn a finished
      study into a call for a firm right here' without an unexplained concept.
    route: CONCEPT
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      Score 3. The core input->output chain is coherent (finished study -> 'Create
      solicitation' carries the plan), but a dead-weight 'Open study' sibling action
      sits next to the primary CTA with no affordance disambiguating them, five competing
      top controls ('Compare selected', '+ Bulk paste list', '+ New plan', '+ New study',
      '+ Group selected plans') crowd one card, and the intro references a 'Group selected
      plans'/bundle affordance with no tickable draft plans visible to act on.
    dimension: design_soundness
    fix_kind: mechanical
    fix_recommendation:
      Demote 'Open study' to a text link so 'Create solicitation'
      is the single clear primary action, and hide the 'Group selected plans'/bundle
      language until at least one draft plan is actually tickable on this surface.
    route: PRODUCT
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      Score 3. Functional and clean with consistent buttons and a well-aimed green
      card highlight, but the card stacks four redundant 'ready' signals (STUDY tag,
      READY TO SOLICIT pill, 'reviewed' label, green-check 'Finished study' sentence),
      disabled buttons ('Compare selected', 'Group selected plans') are not visually
      distinguished from active ones, and the lone finished-study card is stranded with
      the 'Candidate plans in progress (9)' list collapsed, leaving most of the viewport
      empty.
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      Collapse the four redundant per-card status signals into one
      clear 'READY TO SOLICIT' badge, give disabled buttons a clearly muted style, and
      surface the collapsed 9 candidate plans (inline preview or denser grid) so the
      portfolio is not mostly blank below the one card.
    route: PRODUCT
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      Score 3 — static-frame floor. No spinner, 404, or dead-end is visible; the
      judge held the rubric default of 3 because a single still offers no positive motion
      evidence. This is a capture-shape floor shared by all five scenes, not a product-friction
      defect.
    dimension: motion_friction
    fix_kind: mechanical
    fix_recommendation:
      No product change required for friction per se; if a richer
      signal is wanted, capture a short transition (card click -> create form) so the
      one-click plan->solicitation flow is shown in motion rather than inferred from
      a still.
    route: PRODUCT
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      Score 3. The Coverage-areas panel renders a REAL map with two ward polygons
      (not labels-only), a top-left legend, zoom control, basemap attribution, and the
      R6 data row — but the green(Intervention)/blue(Comparison) arm fills read as a
      similar muted teal at this scale, so the arm assignment the legend promises (the
      whole point of a DiD coverage panel) is not legibly delivered. A duplicate 'Study
      arms' chip row also lists the arms in the opposite order from the legend. Full-page
      strip flagged once as a capture artifact, not deducted.
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      Give the two arms saturated, clearly distinct fills (a true
      green for Intervention, a true blue for Comparison) with on-polygon labels so
      the arm assignment is legible at the real viewport, and remove the duplicate 'Study
      arms' chip row or align its order to the legend (Intervention -> Comparison).
