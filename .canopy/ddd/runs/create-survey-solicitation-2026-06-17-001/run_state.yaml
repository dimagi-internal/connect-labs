findings:
  - detail:
      The hero study card prints 'R6 — Attakar × Gura' twice (as the card title
      AND its single plan row, a render-bug smell); status is treated inconsistently
      within one card ('STUDY'/'Draft' are pills but 'reviewed' is plain grey text);
      and the card is stranded above ~250px of dead whitespace so the 'decluttered hero'
      reads as sparse rather than focused.
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      De-duplicate the study identity (show the study title once;
      label any plan row distinctly), render 'reviewed' as a semantic status pill consistent
      with the other badges, and let the candidate-plans section or a compact study
      gallery fill the canvas so the finished study reads as the focused hero. Product
      change, not a capture crop.
    route: PRODUCT
    scene: Scene 1 — Maya turns her finished study into a call for a firm
    severity: medium
