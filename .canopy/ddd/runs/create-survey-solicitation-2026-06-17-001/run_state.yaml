    line. Per the low-contrast deduction rule, capped at 3. Layout, type hierarchy,
    and control consistency are otherwise good.
  dimension: visual_polish
  fix_kind: mechanical
  fix_recommendation: Darken the callout body text (a darker amber / near-black) to
    meet WCAG AA contrast against the yellow background. One concrete CSS/token change.
