findings:
  - detail:
      Status redundancy (READY TO SOLICIT badge + 'reviewed' label + a third restated
      sentence 'Finished study — ready to recruit a survey firm against this coverage')
      plus a lower frame that is ~50% empty leave the opener functional-not-polished
      — nothing embarrassing, nothing delightful.
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      Collapse the three restatements of 'ready to recruit a survey
      firm' into one, and tighten the empty lower frame (surface the candidate-plans
      list or a next-step hint).
    route: PRODUCT
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      ADVISORY. The concept_claim asserts submission is blocked until an area
      is chosen with the message 'Select at least one coverage area to submit,' but
      that error/blocked state is NOT visible in this frame — nothing is ticked, Submit
      appears active, no error string shown. The static helper line 'Select one or more
      — required to submit' is present and consistent, so it is not self-contradicting,
      but the asserted blocked behavior is unverifiable from this still.
    dimension: claim_reality_coherence
    fix_kind: mechanical
    fix_recommendation:
      Add a scene/frame showing the blocked submit with the exact
      'Select at least one coverage area to submit.' message so the gating half of S5
      is demonstrated, not just asserted.
    route: DEFER
    scene: 3 — Amina reads the open call and ticks the area she can staff
    severity: medium
  - detail:
      "Incoherent state combo: STATUS shows a green 'Awarded' pill while RECOMMENDATION
      reads 'Not reviewed' AND a live 'Review' action is still offered — an already-awarded
      item cannot simultaneously be un-reviewed and still invite review (you review
      before you award). The ACTIONS strip also mixes verbs with a state label ('View
      / Review / Awarded'), so 'Awarded' masquerades as a sibling action."
    dimension: design_soundness
    fix_kind: mechanical
    fix_recommendation:
      "Make status the single source of truth: when a response is
      Awarded, suppress/disable the 'Review' action, resolve RECOMMENDATION to the
      actual decision (or hide it), and move 'Awarded' out of the action strip into
      the STATUS cell only so ACTIONS holds exclusively verbs."
    route: PRODUCT
    scene: 4 — Maya sees the firm tied to the coverage she designed
    severity: medium
  - detail:
      The single-row 7-column table leaves SCORE ('-') and RECOMMENDATION columns
      visibly empty (~30% blank), the EOI/Active header pills float far right of the
      title across dead whitespace, and the captured mouse cursor overlaps and occludes
      the breadcrumb text.
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      Add explicit em-dash empty-states for the SCORE/RECOMMENDATION
      columns, pull the EOI/Active pills closer to the title, and re-capture without
      the cursor occluding the breadcrumb.
    route: PRODUCT
    scene: 4 — Maya sees the firm tied to the coverage she designed
    severity: low
  - detail:
      ADVISORY. The narrative frames this as a FRESH application Maya is reviewing/comparing
      ('the loop from a study plan to a real applicant closed'), but the row is already
      'Awarded' with RECOMMENDATION 'Not reviewed' — the captured state is ahead of
      the narrated review moment and internally contradicts itself (awarded yet not
      reviewed). The screenshot depicts a post-decision state, not the live review-and-compare
      moment the scene narrates.
    dimension: claim_reality_coherence
    fix_kind: mechanical
    fix_recommendation:
      Re-capture this scene with the response in a pre-award state
      (status 'Submitted' or 'Under review', Review action live, no Awarded pill) to
      match the narrated reviewing/comparing moment.
    route: DEFER
    scene: 4 — Maya sees the firm tied to the coverage she designed
    severity: medium
  - detail:
      Static frame is clean and loaded (no spinners/error), but the contradictory
      live 'Review' action on an already-awarded row implies a click path that leads
      to a confusing state — latent interaction friction.
    dimension: motion_friction
    fix_kind: mechanical
    fix_recommendation:
      Ensure awarded rows present a single coherent next action (e.g.
      'View award') so a click never lands the owner in a review flow for an already-decided
      response.
    route: PRODUCT
    scene: 4 — Maya sees the firm tied to the coverage she designed
    severity: low
  - detail:
      The closing beat is the planning-vs-execution boundary, but nothing in the
      frame signals 'next step' or 'not yet built' — the 5-second read is 'firm awarded,'
      a wrong read for this beat. The concept lives only in narration.
    dimension: concept_clarity
    fix_kind: mechanical
    fix_recommendation:
      Add a visible forward affordance — a disabled 'Provision Connect
      opportunity (coming soon)' control or a post-award callout — so the UI itself
      carries the not-yet-built next step instead of leaving it to narration.
    route: CONCEPT
    scene: 5 — Maya looks ahead to standing up the real opportunity
    severity: medium
  - detail:
      "Same incoherent state combo as scene 4: an 'Awarded' row still offers
      a 'Review' action and shows RECOMMENDATION 'Not reviewed'; STATUS 'Awarded'
      is duplicated by the green Awarded pill in ACTIONS; SCORE is empty."
    dimension: design_soundness
    fix_kind: mechanical
    fix_recommendation:
      On award, suppress/disable the Review action, resolve 'Not reviewed'
      to the actual review state, and collapse the duplicate Awarded status/action so
      the row is internally consistent.
    route: PRODUCT
    scene: 5 — Maya looks ahead to standing up the real opportunity
    severity: medium
  - detail:
      Traces to spine S7 (recruiting/reviewing a firm is the shipped step; the
