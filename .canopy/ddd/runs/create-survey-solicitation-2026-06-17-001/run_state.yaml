      but unremarkable. Full-page strip flagged as a capture artifact, not deducted.
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      Lift the map legend clear of the Mapbox attribution wordmark
      (top-corner overlay or pad above attribution), color-key the footer arm chip to
      the green/blue map fills, and reconcile arm ordering between legend (Intervention->Comparison)
      and chip ('Comparison | Intervention').
    route: PRODUCT
    scene: 2 — Maya finds the plan already waiting as the coverage area
    severity: low
