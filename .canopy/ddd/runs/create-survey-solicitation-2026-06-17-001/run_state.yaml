findings:
  - detail:
      The 5-second read is 'a long, repetitive list of Untitled draft studies'
      — the hero R6 study is the 9th plan card and is not findable amid the clutter,
      and the 'why' (finished plan -> recruit a firm) is not established on-screen because
      nothing reads as finished (every plan 'Draft', every study 'defining').
    dimension: concept_clarity
    fix_kind: redesign
    fix_recommendation:
      Add a status filter/sort or a 'Ready to solicit' section that
      floats the one finished/approved plan to the top, with a clear ready-vs-draft
      cue, so an outsider sees the finished->solicit path instead of an undifferentiated
      draft list.
    route: CONCEPT
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      "'Create solicitation' sits as one of four equally-weighted buttons (Archive
      / Submit for review / Create solicitation / Delete) with no primacy next to Delete,
      so the one-click launch claim is not emphasized; the post-click solicitation-with-source-attached
      is never shown in this frame."
    dimension: design_soundness
    fix_kind: mechanical
    fix_recommendation:
      Promote 'Create solicitation' to a single primary (filled) button
      per card with Archive/Submit/Delete collapsed into an overflow menu, so the launch
      affordance is unambiguously the primary action.
    route: PRODUCT
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      "Multiple visible issues in one frame: a column of 7+ identical 'Untitled
      study' cards (placeholder/fixture data signalling an unfinished build), three
      '0 wards / (plans not in this program)' cross-scope rows, two duplicate 'Attakar'
      plan cards, the logo mark overlapping the 'Microplan portfolio' H1, and a flat
      type hierarchy where titles/badges/counts are similarly weighted."
    dimension: visual_polish
    fix_kind: redesign
    fix_recommendation:
      Suppress or collapse Untitled/0-ward/out-of-program studies
      (rename-on-create or hide until named), de-duplicate the Attakar cards, fix the
      header logo/H1 overlap, and introduce a clear type scale so study titles anchor
      each card. PRODUCT/seed-data fix — never crop the capture.
    route: PRODUCT
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: medium
  - detail:
      The concept_claim traces to spine S3 and the 'Create solicitation' button
      is genuinely present on every card, but the 'from a FINISHED micro-plan' half
      of the claim is asserted, not evidenced — every plan reads 'Draft' and every study
      'defining', so the finished-state precondition the why depends on is not visible.
    dimension: why_groundedness
    fix_kind: options
    fix_recommendation:
      Surface an approved/finished state on the R6 plan and study
      (e.g. a 'Reviewed'/'Ready' badge replacing 'Draft'/'defining') so the 'launch
      from a finished plan' provenance is demonstrated on-screen, not assumed. Alternatively
      soften the narration to 'a draft plan'.
    route: CONCEPT
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      ADVISORY. The 'Create solicitation' button is genuinely present, but 'her
      finished study' is not demonstrated (R6 study reads 'defining', '1 wards') and
      the one-click result (solicitation carrying the plan as source) is off-frame,
      so a viewer must trust the narrator that the click finishes the path.
    dimension: claim_reality_coherence
    fix_kind: options
    fix_recommendation:
      Capture the R6 study in a finished/approved state and show the
      immediate post-click state (solicitation draft with the plan pre-attached) so
      the narration's 'finished study -> call for a firm' is visibly demonstrated.
    route: DEFER
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      No spinner/error/dead-end in the still, but the lower half is dominated
      by a repetitive near-empty list of Untitled/0-ward cards that reads as seed noise
      rather than a curated flow — a visible rough edge in the frame itself.
    dimension: motion_friction
    fix_kind: mechanical
    fix_recommendation:
      Trim the placeholder study cards so the portfolio shows curated,
      named studies; a clean list removes the 'is this half-built?' friction a viewer
      feels on first scroll.
    route: PRODUCT
    scene: 1 — Maya turns her finished study into a call for a firm
    severity: low
  - detail:
      "The pre-seed is coherent (title/scope arrive filled, the coverage panel
      renders attached and snapshotted), but the audience's decision is 'set scope
      and publish' and the form as shown is not publishable: Description, all three
      dates, Estimated Scale, Contact Email, Application Questions, and Evaluation Criteria
      are empty with no visible required-field validation, so the path to 'publish'
      has unexplained gaps."
    dimension: design_soundness
    fix_kind: mechanical
    fix_recommendation:
      Mark required fields and show inline validation state so the
      owner sees exactly what remains before Create Solicitation is enabled; consider
      pre-seeding a default deadline/scale from the plan group to reinforce the 'already
      waiting' promise.
    route: PRODUCT
    scene: 2 — Maya finds the plan already waiting as the coverage area
    severity: low
  - detail:
      Clean, consistent card system, but the load-bearing coverage detail (2 wards
      / 840 work areas / study arms) is rendered in small muted-gray text that sits
      quieter than the empty form scaffolding above it, so the hierarchy under-weights
      the one panel the scene exists to sell.
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      Increase size/weight and contrast of the coverage card's stat
      line (wards / work areas / study arms) and give the card a stronger container
      so the attached plan reads as the focal point of the page.
    route: PRODUCT
    scene: 2 — Maya finds the plan already waiting as the coverage area
    severity: low
  - detail:
      "The core interaction has a visible incoherence: 'Which areas can you cover?
      / Select one or more' presents exactly ONE checkbox (a degenerate choice with
      nothing to select between), and the 'Application Questions' card is EMPTY (header
      + divider, no fields), reading as a stubbed/unfinished section."
    dimension: design_soundness
    fix_kind: mechanical
    fix_recommendation:
      Render the Application Questions the solicitation actually defines
      inside that card (or replace the empty card with an explicit 'No additional questions
      for this solicitation' state); and when only one coverage area exists, label it
      honestly ('This solicitation covers one area — confirm you can staff it') rather
      than 'Select one or more'.
    route: PRODUCT
    scene: 3 — Amina reads the open call and ticks the area she can staff
    severity: medium
  - detail:
      'Functional and clean, but hierarchy is flat where it matters: the load-bearing
      required checkbox is the smallest, least prominent element while the secondary
      AI-coach card is the visual heavyweight of the page, and the empty Application
      Questions card is a large block of dead space mid-frame.'
    dimension: visual_polish
    fix_kind: mechanical
    fix_recommendation:
      Elevate the coverage selector (card it, add a required asterisk/colored
      marker, give the checkbox more weight) so the must-do field outranks the optional
      AI-coach helper, and eliminate the empty-card dead space.
    route: PRODUCT
    scene: 3 — Amina reads the open call and ticks the area she can staff
    severity: low
  - detail:
      "ADVISORY. The concept_claim's second clause — 'submission is blocked
      until one area is chosen' — is NOT demonstrated: the blocked-submit error string
      is absent and Submit Response is not visibly disabled in the still. Secondary
      mismatch: the AI-coach card claims it 'reviews your draft answers' but there
      are no answer fields (empty Questions card)."
    dimension: claim_reality_coherence
    fix_kind: mechanical
    fix_recommendation:
      Capture the scene at the moment Submit is attempted with nothing
      ticked (showing the disabled state or the 'Select at least one coverage area to
