      state, no enabled/disabled cue on Submit). (The arm legend itself is correct —
      see visual_polish, score 4, the prior-pass clip regression is resolved.)"
    dimension: design_soundness
    fix_kind: options
    fix_recommendation:
      Make the map<->checklist a clean 1:1 affordance — either render
      one checklist row per selectable area, OR clearly label the single row as 'whole
      study = both arms' — and surface an explicit 'N area(s) selected — ready to submit'
      state tied to the Submit button so the >=1-required gating is visible. (Two paths;
      needs a product pick.)
