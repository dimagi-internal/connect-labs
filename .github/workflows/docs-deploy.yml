name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'user_docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-automation
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --site-dir site

      - name: Deploy to gh-pages /docs/ subdirectory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          # Remove only the docs/ subdirectory, preserving slide decks at root
          git rm -rf --ignore-unmatch docs/
          cp -r site/ docs/
          git add docs/
          git diff --cached --quiet || git commit -m "Deploy MkDocs to /docs/ [skip ci]"
          git push origin gh-pages
