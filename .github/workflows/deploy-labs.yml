name: Deploy to AWS Labs

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run database migrations before deployment'
        type: boolean
        required: true
        default: false

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: labs-jj-cluster
  ECS_WEB_SERVICE: labs-jj-web
  ECS_WORKER_SERVICE: labs-jj-worker
  ECR_REPOSITORY: labs-jj-commcare-connect
  ECR_REGISTRY: 858923557655.dkr.ecr.us-east-1.amazonaws.com

jobs:
  guard:
    # Hard gate: this workflow only deploys from main. If somebody (human or
    # agent) triggers it on any other branch it fails fast, before pushing an
    # image. The previous behavior — workflow_dispatch on any ref — was easy
    # to misuse: a branch deploy can land code that hasn't been reviewed AND
    # it makes "what is prod running?" ambiguous. main is the canonical
    # source of truth; deploys come from there or not at all.
    #
    # (Legacy note: this repo used to be a fork off commcare-connect, and its
    # canonical deploy branch was 'labs-main'. That label is dead — this is
    # its own repo now and 'main' is the default branch.)
    name: Guard — branch must be main
    runs-on: ubuntu-latest
    steps:
      - name: Refuse deploys from non-main refs
        run: |
          ref="${GITHUB_REF:-}"
          echo "triggered on ref=$ref"
          if [ "$ref" != "refs/heads/main" ]; then
            echo "::error::Deploys are only allowed from main. Got: $ref"
            echo "::error::Land your changes on main first (PR + merge), then re-run this workflow."
            exit 1
          fi
          echo "ref OK — proceeding to deploy"

  deploy:
    name: Deploy to Fargate
    needs: guard
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Wait for base image build if running
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if a "Build Base Image" workflow is currently running
          RUNNING=$(gh run list \
            --workflow="Build Base Image" \
            --status=in_progress \
            --json databaseId \
            --jq '.[0].databaseId' 2>/dev/null || true)
          if [ -n "$RUNNING" ]; then
            echo "Base image build in progress (run $RUNNING), waiting for it to complete..."
            gh run watch "$RUNNING" --exit-status
            echo "Base image build completed."
          fi
          # Also check queued runs
          QUEUED=$(gh run list \
            --workflow="Build Base Image" \
            --status=queued \
            --json databaseId \
            --jq '.[0].databaseId' 2>/dev/null || true)
          if [ -n "$QUEUED" ]; then
            echo "Base image build queued (run $QUEUED), waiting for it to complete..."
            gh run watch "$QUEUED" --exit-status
            echo "Base image build completed."
          fi

      - name: Wait for node image build if running
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Mirror the base-image wait above. Without this, a deploy that
          # runs concurrently with (or shortly after) a frontend-changing
          # merge to main races against the Build Node Image workflow:
          # the Node tag node-latest still points at the OLD image when
          # this deploy queries ECR, so the deploy ships stale JS.
          # See incident: PR #97 (workflow-framework auth gate) merged but
          # the framework code never made it into the deployed bundle.
          RUNNING=$(gh run list \
            --workflow="Build Node Image" \
            --status=in_progress \
            --json databaseId \
            --jq '.[0].databaseId' 2>/dev/null || true)
          if [ -n "$RUNNING" ]; then
            echo "Node image build in progress (run $RUNNING), waiting for it to complete..."
            gh run watch "$RUNNING" --exit-status
            echo "Node image build completed."
          fi
          QUEUED=$(gh run list \
            --workflow="Build Node Image" \
            --status=queued \
            --json databaseId \
            --jq '.[0].databaseId' 2>/dev/null || true)
          if [ -n "$QUEUED" ]; then
            echo "Node image build queued (run $QUEUED), waiting for it to complete..."
            gh run watch "$QUEUED" --exit-status
            echo "Node image build completed."
          fi

      - name: Check base image exists
        id: base-check
        run: |
          BASE_TAG="base-latest"
          BASE_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${BASE_TAG}"
          TAG_EXISTS=$(aws ecr list-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --query "imageIds[?imageTag=='${BASE_TAG}'].imageTag" \
            --output text 2>&1) || true
          if [ -n "$TAG_EXISTS" ] && [ "$TAG_EXISTS" != "None" ]; then
            echo "base_image=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"
            echo "Base image found: ${BASE_IMAGE}"
          else
            echo "::warning::Base image not found in ECR. Build will fall back to installing deps from scratch. Run the 'Build Base Image' workflow first."
            echo "base_image=python:3.11-slim-bookworm" >> "$GITHUB_OUTPUT"
          fi

      - name: Check node image exists
        id: node-check
        run: |
          NODE_TAG="node-latest"
          NODE_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${NODE_TAG}"
          TAG_EXISTS=$(aws ecr list-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --query "imageIds[?imageTag=='${NODE_TAG}'].imageTag" \
            --output text 2>&1) || true
          if [ -n "$TAG_EXISTS" ] && [ "$TAG_EXISTS" != "None" ]; then
            echo "node_image=${NODE_IMAGE}" >> "$GITHUB_OUTPUT"
            echo "Node image found: ${NODE_IMAGE} (webpack build will be skipped)"
          else
            echo "::warning::Node image not found in ECR. Webpack will build from source. Run the 'Build Node Image' workflow first."
            echo "node_image=node:18-bullseye" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ steps.base-check.outputs.base_image }}
            NODE_IMAGE=${{ steps.node-check.outputs.node_image }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:buildcache,mode=max

      - name: Run database migrations
        if: ${{ github.event.inputs.run_migrations == 'true' }}
        run: |
          TASK_DEF_ARN=$(aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_WEB_SERVICE }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition $TASK_DEF_ARN \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-06646effb09be2f42],securityGroups=[sg-0666a5ed512c97d9d],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"web","command":["python","manage.py","migrate_multi","--noinput","--skip-checks"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks $TASK_ARN

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" == "0" ]; then
            echo "Migrations completed successfully"
          else
            echo "Migrations failed with exit code: $EXIT_CODE"
            echo "Check CloudWatch Logs: https://console.aws.amazon.com/cloudwatch/home?region=${{ env.AWS_REGION }}#logsV2:log-groups/log-group/%2Fecs%2F${{ env.ECS_WEB_SERVICE }}"
            exit 1
          fi

      - name: Register task definitions from repo
        id: taskdefs
        run: |
          # The web/worker task definitions are version-controlled in
          # deploy/task-definitions/. Registering them from the repo on every deploy
          # makes the repo the single source of truth: the container command, CPU,
          # env, and roles can no longer silently drift in the AWS console — which is
          # exactly how the MCP broke (docker/start moved to ASGI but the registered
          # command stayed WSGI, and the deploy only reused the in-AWS task def).
          # Secrets stay as Secrets Manager ARN references in the JSON, never values.
          WEB_TD=$(aws ecs register-task-definition \
            --cli-input-json file://deploy/task-definitions/web.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          WORKER_TD=$(aws ecs register-task-definition \
            --cli-input-json file://deploy/task-definitions/worker.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered web:    $WEB_TD"
          echo "Registered worker: $WORKER_TD"
          echo "web_td=$WEB_TD" >> "$GITHUB_OUTPUT"
          echo "worker_td=$WORKER_TD" >> "$GITHUB_OUTPUT"

      - name: Deploy services (hard cutover)
        run: |
          # Stop existing tasks first for instant cutover (no rolling deploy)
          # This causes ~10s downtime but avoids waiting for graceful rolling update
          echo "Stopping old tasks..."
          for SERVICE in ${{ env.ECS_WEB_SERVICE }} ${{ env.ECS_WORKER_SERVICE }}; do
            TASK_ARNS=$(aws ecs list-tasks \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service-name $SERVICE \
              --query 'taskArns[]' \
              --output text 2>/dev/null) || true
            if [ -n "$TASK_ARNS" ] && [ "$TASK_ARNS" != "None" ]; then
              for TASK in $TASK_ARNS; do
                aws ecs stop-task --cluster ${{ env.ECS_CLUSTER }} --task $TASK --output text > /dev/null 2>&1 || true
              done
            fi
          done

          echo "Forcing new deployment onto the repo-defined task definitions..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_WEB_SERVICE }} \
            --task-definition ${{ steps.taskdefs.outputs.web_td }} \
            --force-new-deployment \
            --output text > /dev/null

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_WORKER_SERVICE }} \
            --task-definition ${{ steps.taskdefs.outputs.worker_td }} \
            --force-new-deployment \
            --output text > /dev/null

          echo "Deploy triggered. New tasks starting (~30s to healthy)."
