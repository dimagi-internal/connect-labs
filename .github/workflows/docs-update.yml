name: Update Docs on Merge

on:
  push:
    branches: [main]
    paths-ignore:
      - 'user_docs/**'  # don't retrigger when we commit updated docs
      - 'mkdocs.yml'

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install script dependencies
        run: pip install anthropic requests

      - name: Get merged PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR that produced this merge commit
          PR_DATA=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0] // empty' 2>/dev/null || echo "")

          if [ -z "$PR_DATA" ]; then
            echo "No PR found for this commit — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$PR_DATA" > /tmp/pr_data.json
          PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT

          # Get list of changed files
          gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/files" \
            --jq '.[].filename' > /tmp/changed_files.txt

          # Get truncated diff (60KB max — same cap as ai-review.yml)
          gh pr diff "${PR_NUM}" --repo "${{ github.repository }}" | \
            head -c 61440 > /tmp/pr_diff.txt

      - name: Update documentation
        if: steps.pr-info.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_DATA_FILE: /tmp/pr_data.json
          CHANGED_FILES_FILE: /tmp/changed_files.txt
          DIFF_FILE: /tmp/pr_diff.txt
        run: python automation/update_docs.py

      - name: Commit updated markdown files
        if: steps.pr-info.outputs.skip != 'true'
        run: |
          git config user.name "connect-wiki-bot"
          git config user.email "connect-wiki-bot@dimagi.com"
          git add user_docs/
          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No doc changes to commit"
          else
            git commit -m "docs: auto-update for PR #${{ steps.pr-info.outputs.pr_number }} [skip ci]"
            git push
          fi
