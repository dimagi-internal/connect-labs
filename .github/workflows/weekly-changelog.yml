name: Weekly Changelog

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays at 09:00 UTC
  workflow_dispatch: # Manual trigger: Actions → Weekly Changelog → Run workflow

jobs:
  weekly-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: pip install anthropic requests

      - name: Fetch merged PRs (last 7 days)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Calculate the ISO timestamp for 7 days ago (works on both Linux and macOS)
          SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || \
                  date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)

          # Fetch closed PRs merged to main in the last 7 days
          gh api "repos/${{ github.repository }}/pulls?state=closed&base=main&per_page=100" \
            | jq --arg since "$SINCE" '[.[] | select(.merged_at != null and .merged_at >= $since)]' \
            > /tmp/merged_prs.json

          COUNT=$(jq length /tmp/merged_prs.json)
          echo "Found $COUNT merged PRs in the last 7 days"

      - name: Generate and publish changelog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python automation/weekly_changelog.py --prs-file /tmp/merged_prs.json

      - name: Print summary
        if: always()
        run: |
          echo "### Weekly Changelog Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Confluence: https://dimagi.atlassian.net/wiki/spaces/connect/pages/3918528513" >> $GITHUB_STEP_SUMMARY
          echo "- Slack: #connect-labs" >> $GITHUB_STEP_SUMMARY
