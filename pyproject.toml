# ==== pytest ====
[tool.pytest.ini_options]
minversion = "6.0"
addopts = "--ds=config.settings.test --reuse-db --ignore=connect_labs/workflow/tests/e2e --ignore=connect_labs/labs/tests/e2e --ignore=connect_labs/solicitations/tests/e2e --ignore=connect_labs/funder_dashboard/tests/e2e --ignore=connect_labs/campaign/tests/e2e --ignore=connect_labs/audit/management/commands/test_search_readers.py"
norecursedirs = ["management"]
python_files = [
    "tests.py",
    "test_*.py",
]
markers = [
    "e2e: End-to-end browser tests (require real OAuth token and runserver)",
    "contract: Cross-boundary contract tests (e.g. server↔frontend matrix/field-name agreement)",
    "stub: Marks a simulated integration seam (KYC/payment/CommCare) — no external system is wired",
]

# ==== Coverage ====
[tool.coverage.run]
include = ["connect_labs/**"]
omit = ["*/migrations/*", "*/tests/*"]
plugins = ["django_coverage_plugin"]


# ==== black ====
[tool.black]
line-length = 119
target-version = ['py311']


# ==== isort ====
[tool.isort]
profile = "black"
line_length = 119
known_first_party = [
    "connect_labs",
    "config",
]
skip = ["venv/"]
skip_glob = ["**/migrations/*.py"]


# ==== PyLint ====
[tool.pylint.MASTER]
load-plugins = [
    "pylint_django",
    "pylint_celery",
]
django-settings-module = "config.settings.local"

[tool.pylint.FORMAT]
max-line-length = 119

[tool.pylint."MESSAGES CONTROL"]
disable = [
    "missing-docstring",
    "invalid-name",
]

[tool.pylint.DESIGN]
max-parents = 13

[tool.pylint.TYPECHECK]
generated-members = [
    "REQUEST",
    "acl_users",
    "aq_parent",
    "[a-zA-Z]+_set{1,2}",
    "save",
    "delete",
]
