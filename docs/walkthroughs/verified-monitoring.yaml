  david:
    color: '#4F46E5'
    intro: 'David manages a Connect program delivering vitamin-A home visits. His
      frontline workers log every visit through Connect and the coverage figure looks
      good — but David wants independent, drillable proof his program is actually
      reaching households and changing outcomes, not merely that visits were logged.
      He wants to see the verification machinery itself: the survey''s own per-surveyor
      quality and a back-check David can read row by row, including whether any one
      surveyor''s data can be trusted.'
    name: David Mensah
    role: Program Manager, Connect Program
