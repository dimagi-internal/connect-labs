  concept_claim: An independent re-survey by a different enumerator disagrees with
    this surveyor's originals on identity, location, and outcome — the strongest evidence
    their data needs review — and the method is traceable to its source.
  design_intent: Descriptive section headers (Identity / Location / Outcome, with
    the J-PAL "Type 1/2/3" jargon behind an info popup), two rows per household (Original
    / Backcheck) with discordances in rose; a stratified sample (back-checking is
    a sampling method) while the agreement %s are computed over all of the surveyor's
    back-checks.
  features:
  - description: The flagged surveyor's back-check — Identity (sex / age / present
      / roof), Location (re-survey distance), Outcome (vitamin-A) agreement %s; two-row
      original-vs-re-survey rows; an info popup citing J-PAL/IPA + World Bank DIME.
    id: backcheck-sections
    verify: Assert the back-check renders for the flagged surveyor with Identity /
      Location / Outcome agreement %s; Identity includes a Roof column; the info popup
      cites dimewiki.worldbank.org/Back_Checks.
  full_page: false
  narrative: To confirm the Distributions flag with an independent field visit, David
    opens that surveyor's back-check, where a different enumerator re-visited a sample
    of the same households. David reads each household as the original over the re-survey
    — sex, age, the household's roof, the location, the vitamin-A result — with whatever
    changed marked in red, and taps the info button to confirm it follows the standard
    J-PAL/IPA method. By the time David closes the page, nothing has told David what
    to conclude — David has decided for himself whether his program is having an impact.
  persona: david
  provenance: S2
  show: The independent back-check for the flagged surveyor — Identity (incl. roof)
    / Location / Outcome, original over re-survey, the method behind an info button.
  title: The independent back-check confirms it
  vo: "An independent re-survey by a different enumerator disagrees on identity, location, and outcome — the strongest evidence yet that this surveyor's data needs review."
