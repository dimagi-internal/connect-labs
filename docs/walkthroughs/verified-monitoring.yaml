name: verified-monitoring
narrative: 'David, the funder of a child-health program, opens the monitoring dashboard on the most recent
  bi-monthly survey: a KPI tile shows Kaura — the treatment ward — at 68.1% independently verified vitamin-A
  coverage among reached under-5 children, up 3.2 points on the prior round, beside the adjacent control
  ward of Gedawa at 8.9%, a +59.2 percentage-point gap. He pulls up the trend and sees that gap has held
  across all six bi-monthly rounds — each round''s value jitters within a normal survey band, but treatment
  sits far above control every time, so this is no one-off snapshot. A verification strip shows the survey
  held both wards to the same field discipline round after round — within-15m GPS at 95.8%, complete photo-and-timestamp
  evidence at 97.1%, back-checks at 95.2%. The map then carries the punchline: Kaura''s service-delivery
  layer fills with 2,300 program-logged vitamin-A visits this period and stops cleanly at the shared boundary,
  while Gedawa''s is empty — and the independent survey pins, drawn on top in both wards, prove the survey
  covered both regardless of program presence. He closes on the trust-but-verify panel: the implementer''s
  own logs claim 88.0% in Kaura, the independent survey confirms 68.1%, and near-equal cross-ward reach
  licenses the comparison as honest.'
base_url: https://labs.connect.dimagi.com
auth:
  type: session
why_brief: ../../.canopy/ddd/runs/did-monitoring-2026-06-01-001/why_brief_verified_monitoring.yaml
personas:
  david:
    name: David Mensah
    role: Program Officer, Funder
    color: '#7C3AED'
    intro: David funds the child-health program and wants independent proof the vitamin-A home visits
      reached households — not the implementer's self-report — judged against a control ward and tracked
      over time.
scenes:
- persona: david
  title: The most recent survey, front and center
  show: 'On the live verified-monitoring dashboard (/labs/workflow/3699/run/?opportunity_id=10008&run_id=3705),
    the section showing: The most recent bi-monthly survey shows treatment-ward coverage above control-ward
    coverage cross-sectionally.'
  actions:
  - kind: goto
    target: /labs/workflow/3699/run/?opportunity_id=10008&run_id=3705
  - kind: wait_for
    target: Verified vitamin-A coverage
  - kind: scroll_to
    target: Verified vitamin-A coverage
  - kind: hold
    seconds: 2
  concept_claim: The most recent bi-monthly survey shows treatment-ward coverage above control-ward coverage
    cross-sectionally.
  provenance: S1
  design_intent: Bet that a financial-dashboard KPI tile — big monospace numeral, inline sparkline, delta-vs-previous-round
    chip — makes the latest verified number feel current and authoritative. Dense, gridded, high-contrast.
  features:
  - id: kpi-tiles-with-sparkline
    description: Per-ward KPI tiles showing the latest-round verified coverage (monospace), a 6-round
      sparkline of prior values, and a delta-vs-previous-round chip; plus a gap tile with its 95% CI.
    verify: Render the template against the synthetic fixture; assert the Kaura tile reads 68.1% (194/285)
      with a +3.2 pp delta vs the prior round and a 6-point sparkline
  - id: snapshot-caveat-banner
    description: 'An always-visible caveat: a repeated spatial snapshot of treatment vs control over rounds,
      not a difference-in-differences estimate.'
    verify: Assert the caveat string is present in the rendered DOM and not inside a collapsed or hidden
      element
- persona: david
  title: The gap has held across six rounds
  show: 'On the live verified-monitoring dashboard (/labs/workflow/3699/run/?opportunity_id=10008&run_id=3705),
    the section showing: The treatment-minus-control coverage gap persists across all six bi-monthly survey
    rounds.'
  actions:
  - kind: goto
    target: /labs/workflow/3699/run/?opportunity_id=10008&run_id=3705
  - kind: wait_for
    target: Verified vitamin-A coverage
  - kind: scroll_to
    target: Coverage across
  - kind: hold
    seconds: 2
  concept_claim: The treatment-minus-control coverage gap persists across all six bi-monthly survey rounds.
  provenance: S6
  design_intent: Bet that a crisp financial-terminal line chart showing the gap reproduce across six rounds
    is what upgrades the headline from a number to a monitorable signal — the wave-to-wave jitter only
    makes the persistence more convincing.
  features:
  - id: wave-trend-chart
    description: A dual-line treatment-vs-control trend chart over the six bi-monthly rounds with a shaded
      gap band and an emphasized latest point.
    verify: Assert the chart plots 6 points per ward matching the fixture series and the treatment value
      exceeds the control value at every round
  - id: bimonthly-wave-model
    description: 'A bi-monthly wave dimension on the fixture and rollups: six rounds per ward, each verified
      value within +/-20% of the ward''s trend mean, the latest round equal to the hero numbers.'
    verify: 'pytest: assert the fixture has 6 bi-monthly rounds per ward, each value within +/-20% of
      that ward''s mean, and the last round equals 68.1% (treatment) and 8.9% (control)'
- persona: david
  title: Proving the ruler is the same on both sides
  show: 'On the live verified-monitoring dashboard (/labs/workflow/3699/run/?opportunity_id=10008&run_id=3705),
    the section showing: The survey applied balanced quality gates across both adjacent wards, ruling
    out a biased instrument.'
  actions:
  - kind: goto
    target: /labs/workflow/3699/run/?opportunity_id=10008&run_id=3705
  - kind: wait_for
    target: Verified vitamin-A coverage
  - kind: scroll_to
    target: GPS within 15m
  - kind: hold
    seconds: 2
  concept_claim: The survey applied balanced quality gates across both adjacent wards, ruling out a biased
    instrument.
  provenance: S2
  design_intent: Bet that per-metric sparklines showing stable quality across rounds, plus per-ward parity,
    forecloses the objection that the gap is a measurement artefact.
  features:
  - id: verification-strip
    description: Chip strip computing GPS-within-15m (801/836), evidence triple (778/801), back-check
      (80/84), and anomaly flags (3/3) from the latest round, each with a per-round sparkline and per-ward
      parity.
    verify: Assert each chip's numerator/denominator matches the fixture and the pooled GPS chip reads
      95.8% (801/836)
  - id: gps-histogram-drillin
    description: A click-through fix-distance histogram (0-5m, 5-10m, 10-15m) split by ward.
    verify: Trigger the drill-in; assert two ward series render and bucket counts sum to attempted visits
      per ward (427 treatment, 409 control)
- persona: david
  title: The map where the program stops at the line
  show: 'On the live verified-monitoring dashboard (/labs/workflow/3699/run/?opportunity_id=10008&run_id=3705),
    the section showing: The program''s own logged service-delivery visits fall only inside the treatment
    ward and stop at the boundary.'
  actions:
  - kind: goto
    target: /labs/workflow/3699/run/?opportunity_id=10008&run_id=3705
  - kind: wait_for
    target: Verified vitamin-A coverage
  - kind: scroll_to
    target: Coverage across
  - kind: hold
    seconds: 2
  concept_claim: The program's own logged service-delivery visits fall only inside the treatment ward
    and stop at the boundary.
  provenance: S3
  design_intent: Bet that the program's logged visits filling one ward and leaving the next empty is the
    most direct proof the gap tracks program presence; build the map layers as a shared module reused
    by microplans.
  features:
  - id: service-delivery-layer
    description: A GeoJSON point layer rendering all 2,300 program-logged vitamin-A visits inside Kaura
      and 0 inside Gedawa for the selected round, plus a ward-boundary line layer — built as a reusable
      map-layer component shared with microplans.
    verify: Fetch the service-delivery GeoJSON for the latest round; assert 2,300 features fall inside
      the Kaura polygon and 0 inside the Gedawa polygon
  - id: shared-map-layer-module
    description: Extract the basemap, ward-boundary, service-delivery, and survey-pin layers into a shared
      map module consumed by BOTH microplans and the monitoring workflow template.
    verify: Grep the workflow template imports; assert the map-layer component is imported from the shared
      module that microplans also imports
  - id: ward-summary-cards
    description: Per-ward cards showing program visits logged, surveyed buildings, and confirmed coverage
      for the selected round, with a round selector.
    verify: Assert the Kaura card reads 2,300 visits and the Gedawa card reads 0 visits for the latest
      round
- persona: david
  title: Independent pins prove the survey covered both wards
  show: 'On the live verified-monitoring dashboard (/labs/workflow/3699/run/?opportunity_id=10008&run_id=3705),
    the section showing: Independent monitoring pins appear in both wards regardless of program presence,
    so the gap is not survey effort.'
  actions:
  - kind: goto
    target: /labs/workflow/3699/run/?opportunity_id=10008&run_id=3705
  - kind: wait_for
    target: Verified vitamin-A coverage
  - kind: scroll_to
    target: Trust, then verify
  - kind: hold
    seconds: 2
  concept_claim: Independent monitoring pins appear in both wards regardless of program presence, so the
    gap is not survey effort.
  provenance: S4
  design_intent: Bet that the pins-over-empty-layer contrast in the control ward is what rules out the
    alternative that no one surveyed the control.
  features:
  - id: monitoring-pins-layer
    description: A top-z-index survey-pin layer colored purple (vitamin-A confirmed) and pink (absent),
      rendered in both wards with a hover-inspect popup, using the shared map-layer module.
    verify: Assert pins render in both ward polygons, Kaura majority purple and Gedawa majority pink,
      and pin counts match reached households (412 treatment, 389 control)
  - id: layer-toggle-zorder
    description: A layer-toggle panel that always draws survey pins above the service-delivery layer;
      unchecking hides a layer instantly.
    verify: Read the layer order; assert the monitoring-pins layer is above the service-delivery layer,
      and toggling off flips its visibility to none
- persona: david
  title: Trust, then verify the implementer's claim
  show: 'On the live verified-monitoring dashboard (/labs/workflow/3699/run/?opportunity_id=10008&run_id=3705),
    the section showing: The independent coverage falls below the implementer''s self-reported coverage
    by a measurable premium.'
  actions:
  - kind: goto
    target: /labs/workflow/3699/run/?opportunity_id=10008&run_id=3705
  - kind: wait_for
    target: Verified vitamin-A coverage
  - kind: scroll_to
    target: Trust, then verify
  - kind: hold
    seconds: 2
  concept_claim: The independent coverage falls below the implementer's self-reported coverage by a measurable
    premium.
  provenance: S5
  design_intent: Bet that closing on the self-report premium, licensed by near-equal cross-ward survey
    reach, makes the value of third-party verification concrete.
  features:
  - id: self-report-vs-independent
    description: A side-by-side of program_va_coverage (88.0%) and verified_va_coverage (68.1%) for the
      treatment ward, computing the premium as 19.9 pp.
    verify: Assert the panel renders 88.0% and 68.1% and the computed premium equals 19.9 pp from the
      fixture
  - id: parity-table
    description: A cross-ward parity table for survey reach rate and reached-pin disposition with a balanced
      marker when the per-ward delta is within tolerance.
    verify: Assert reach reads 84.3%/80.2% and disposition reads 71.8%/69.4% and the balanced marker fires
      when the delta is below the configured threshold
