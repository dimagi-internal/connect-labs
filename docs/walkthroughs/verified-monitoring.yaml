- actions:
  - kind: scroll_to
    target: Survey-quality scorecard
  - kind: hold
    seconds: 1
  - kind: click
    target: css:[data-cell="T6:evidence"]
  - kind: hold
    seconds: 2
  - kind: click
    target: css:[data-cell="T6:backcheck"]
  - kind: hold
    seconds: 2
  concept_claim: The survey's quality is not asserted in aggregate — it is computed
    per surveyor from each surveyor's own records, so a single under-performing surveyor
    is visible and accountable rather than averaged away. GPS is clean for everyone
    — the app gates submission at 15 m — so the flag rests on the signals that gating
    can't launder — evidence, on-primary fidelity, and back-check agreement.
  design_intent: A dense scorecard, one row per surveyor, green within threshold /
    rose below, with a REVIEW tag where a surveyor's integrity signals fail together;
    the back-check column is cumulative across cycles. The GPS-within-15m column reads
    ~100% for every surveyor — the app blocks any submission beyond 15 m, so it is
    a passing trust signal, not the discriminator. An On-primary column shows the
    share of each surveyor's surveys that landed on the assigned first-choice household
    (vs a substituted alternate) — a sampling-fidelity signal where heavy substitution
    reads rose.
  features:
  - description: A per-surveyor survey-quality scorecard (evidence, GPS, on-primary,
      completeness, duration, consistency, duplicates, back-check) computed per surveyor,
      with rose cells below threshold and a REVIEW tag on the flagged surveyor; the
      GPS column reads ~100% for all (app-gated) so the flag rests on the non-GPS
      signals.
    id: surveyor-scorecard
    verify: Assert the table renders one row per surveyor with computed values, including
      an On-primary column and a ~100% GPS-within-15m column for every surveyor; exactly
      the flagged surveyor (T6) shows a REVIEW tag; its rose cells coincide with sub-threshold
      non-GPS values.
  full_page: false
  narrative: Before David trusts any of the survey, David checks the people who collected
    it. The scorecard gives David one row per surveyor, every figure computed from
    that surveyor's own records. GPS reads clean for everyone — the app won't let
    a survey submit more than 15 m from the assigned household — so David reads the
    signals gating can't launder — the proof photos, how often each reached the household
    they were assigned to try first, and the back-check. One row is flagged for review.
  persona: david
  provenance: S2
  show: The per-surveyor quality scorecard — evidence, a ~100% GPS-within-15m column
    (app-gated), completeness, duration, consistency, duplicates, on-primary, and
    back-check, each computed from that surveyor's own records — with one surveyor
    flagged REVIEW on the non-GPS signals.
  title: The per-surveyor quality scorecard catches a surveyor
  vo: "Quality is computed per surveyor from each surveyor's own records, so one under-performing surveyor is flagged for review rather than averaged away."
- actions:
  - kind: scroll_to
    target: Answer uniformity
  - kind: hold
    seconds: 2
  - kind: click
    target: Surveyor T6
    must_succeed: false
    note: highlight the flagged surveyor's distributions row
  - kind: hold
    seconds: 3
  concept_claim: A fabricator who never leaves the 15 m gate passes GPS, but cannot
    fake the SHAPE of their data — the Distributions screen scores each surveyor against
    their peers on interview speed and answer-uniformity with no second visit, and
    the flagged surveyor reads red on both while everyone else sits normal.
  design_intent: The Layer-3 Distributions card — one row per surveyor, robust median/MAD
    z-scores vs peers on three signals (dose yes-rate, interview speed, and answer
    uniformity — the Herfindahl concentration of roof-type answers), each rendered
    as a compact raw-units lens (a centre line at the team-typical value, a dark notch
    at this surveyor's actual value, and a coloured bar whose width is |z|), plus
    a composite band pill. The flagged surveyor reads RED on speed (curbstoned ~9-min
    interviews) and uniformity (answers collapsed onto one roof type); honest surveyors
    vary naturally and read green — so the fabrication is caught from the data's shape,
    no re-visit required.
  features:
  - description: A per-surveyor Distributions (Layer-3) table — robust z-scores vs
      peers on dose yes-rate, interview speed, and answer-uniformity (roof-mix HHI),
      each as a raw-units lens (notch = value, bar width = |z|), plus a composite
      band — that flags the fabricator on speed + uniformity with no second field
      visit.
    id: distributions-screen
    verify: Assert the Distributions table renders one row per surveyor with z-scores
      on interview speed and answer uniformity; the flagged surveyor (T6) reads a
      red composite band with red speed + uniformity z-scores, while the other surveyors
      read green.
  full_page: false
  narrative: GPS is clean by construction, so a fabricator who stands near a building
    and invents answers sails through it. David scrolls to the Distributions screen,
    which needs no second visit — it compares each surveyor to their peers on how
    fast they interviewed and how varied their answers were. The flagged surveyor's
    interviews run impossibly fast and their roof-type answers collapse onto a single
    value, both lighting up red, while every honest surveyor sits in the normal band.
  persona: david
  provenance: S2
  show: The Distributions screen — per-surveyor z-scores on dose yes-rate, interview
    speed, and answer uniformity, the flagged surveyor red on speed + uniformity and
    a red composite band, every other surveyor green — fabrication caught from the
    data's shape with no re-visit.
  title: GPS is clean — the Distributions screen catches the fabrication
  vo: "GPS is clean for everyone, but a fabricator can't fake the shape of their data — the flagged surveyor's interviews run impossibly fast and their answers collapse onto one value."
- actions:
  - kind: wait_for
    target: Identity match
  - kind: hold
    seconds: 1
  - kind: scroll_to
