  concept_claim: Across six bi-monthly rounds, the program's self-reported delivery stays above what the independent survey confirms each round, while the control arm stays low — the gap holds over time, not in a single snapshot.
  design_intent: Three labelled lines (service-delivery dashed amber, intervention survey indigo, control survey slate) plotted across six bi-monthly rounds left-to-right as a time axis (earliest at left, most recent at right, each round date-stamped), with a shaded service-delivery-minus-survey gap band and per-point hover tooltips, so the gap's persistence over time reads from the chart without a sentence.
  features:
  - description: A six-cycle line chart of the program self-report vs the independent intervention-arm survey vs the control-arm survey, with a shaded gap band and a hover tooltip on every point (series, cycle, value).
    id: trend-hero
    verify: Assert three series render across six cycles; the legend reads service-delivery data / intervention arm survey / control arm survey; hovering a point shows a tooltip with the series, cycle, and value; no interpretive verbs on screen.
  full_page: false
  narrative: David manages a Connect program delivering vitamin-A home visits, and wants to know how independent difference in difference surveys compare to his program's data.  David opens the independent survey's dashboard and sees the six-round trend — the same survey repeated every two months in different intervention and non-intervention geographies.  David sees that the independent survey data is showing a large increase in the Vitamin-A rate, though less than his internal data has reported.
  persona: david
  provenance: S5
  show: 'The six-round trend over time: the program''s service-delivery line above the independent intervention-arm survey at every bi-monthly round, the control-arm survey far below — earliest round at left, most recent at right.'
  title: Six bi-monthly rounds over time — the gap holds
