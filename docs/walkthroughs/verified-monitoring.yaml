  concept_claim: 'Quality is computed per surveyor from each surveyor''s own records, so one under-performing surveyor is visible rather than averaged away — flagged on the signals GPS gating can''t fake: evidence, on-primary fidelity, and back-check agreement.'
  design_intent: A dense scorecard, one row per surveyor, green within threshold / rose below, with a REVIEW tag where a surveyor's integrity signals fail together; the back-check column is cumulative across cycles. The GPS-within-15m column reads ~100% for every surveyor — the app blocks any submission beyond 15 m, so it is a passing trust signal, not the discriminator. An On-primary column shows the share of each surveyor's surveys that landed on the assigned first-choice household (vs a substituted alternate) — a sampling-fidelity signal where heavy substitution reads rose.
  features:
  - description: A per-surveyor survey-quality scorecard (evidence, GPS, on-primary, completeness, duration, consistency, duplicates, back-check) computed per surveyor, with rose cells below threshold and a REVIEW tag on the flagged surveyor; the GPS column reads ~100% for all (app-gated) so the flag rests on the non-GPS signals.
    id: surveyor-scorecard
    verify: Assert the table renders one row per surveyor with computed values, including an On-primary column and a ~100% GPS-within-15m column for every surveyor; exactly the flagged surveyor (T6) shows a REVIEW tag; its rose cells coincide with sub-threshold non-GPS values.
  full_page: false
  narrative: David then explores the quality of the survey data.  The scorecard gives David one row per surveyor with a KPIs, GPS reads clean for everyone — expected as the Connect app won't let a survey submit more than 15 m from the assigned household. David scans the additional KPIs, the proof photos, how often each reached the primary household they were assigned or had to move to a secondary household, and the back-checks performed by a second survey to the same household. One row is flagged for review.
  persona: david
  provenance: S2
  show: The per-surveyor quality scorecard — evidence, a ~100% GPS-within-15m column (app-gated), completeness, duration, consistency, duplicates, on-primary, and back-check, each computed from that surveyor's own records — with one surveyor flagged REVIEW on the non-GPS signals.
  title: The per-surveyor quality scorecard catches a surveyor
- actions:
  - kind: wait_for
    target: Identity match
  - kind: hold
    seconds: 1
  - kind: scroll_to
    target: INDEPENDENT BACK-CHECK
  - kind: hold
    seconds: 4
  concept_claim: An independent re-survey by a different enumerator disagrees with this surveyor's records on identity, location, and outcome — the strongest evidence their data needs review.
  design_intent: Descriptive section headers (Identity / Location / Outcome, with the J-PAL "Type 1/2/3" jargon behind an info popup), two rows per household (Original / Backcheck) with discordances in rose; a stratified sample (back-checking is a sampling method) while the agreement %s are computed over all of the surveyor's back-checks.
  features:
  - description: The flagged surveyor's back-check — Identity (sex / age / present / roof), Location (re-survey distance), Outcome (vitamin-A) agreement %s; two-row original-vs-re-survey rows; an info popup citing J-PAL/IPA + World Bank DIME.
    id: backcheck-sections
    verify: Assert the back-check renders for the flagged surveyor with Identity / Location / Outcome agreement %s; Identity includes a Roof column; the info popup cites dimewiki.worldbank.org/Back_Checks.
  full_page: false
  narrative: David drills into that flagged surveyor's back-check, where an independent enumerator re-visited a sample of the same households. David reads each household as the original over the re-survey — sex, age, the roof, the location, and the vitamin-A result — with whatever the re-visit disagreed on marked in red.
  persona: david
  provenance: S2
  show: The independent back-check for the flagged surveyor — Identity (incl. roof) / Location / Outcome, original over re-survey, the method behind an info button.
  title: The independent back-check confirms it
- actions:
  - kind: scroll_to
    target: Answer uniformity
  - kind: hold
    seconds: 2
  - kind: click
    must_succeed: false
    note: highlight the flagged surveyor's distributions row
    target: Surveyor T6
  - kind: hold
    seconds: 3
  concept_claim: A fabricator who passes the GPS gate still can't fake the shape of their data — the Distributions screen scores each surveyor against their peers on interview speed and answer uniformity, and the flagged surveyor reads red on both.
  design_intent: The Layer-3 Distributions card — one row per surveyor, robust median/MAD z-scores vs peers on three signals (dose yes-rate, interview speed, and answer uniformity — the Herfindahl concentration of roof-type answers), each rendered as a compact raw-units lens (a centre line at the team-typical value, a dark notch at this surveyor's actual value, and a coloured bar whose width is |z|), plus a composite band pill. The flagged surveyor reads RED on speed (curbstoned ~9-min interviews) and uniformity (answers collapsed onto one roof type); honest surveyors vary naturally and read green — so the fabrication is caught from the data's shape, no re-visit required.
  features:
  - description: A per-surveyor Distributions (Layer-3) table — robust z-scores vs peers on dose yes-rate, interview speed, and answer-uniformity (roof-mix HHI), each as a raw-units lens (notch = value, bar width = |z|), plus a composite band — that flags the fabricator on speed + uniformity with no second field visit.
    id: distributions-screen
    verify: Assert the Distributions table renders one row per surveyor with z-scores on interview speed and answer uniformity; the flagged surveyor (T6) reads a red composite band with red speed + uniformity z-scores, while the other surveyors read green.
  full_page: false
  narrative: David then evaluates the Distributions table.  The flagged surveyor's interviews were completed suspiciously fast and their roof-type answers collapse onto a single value, both flags.  All other surveyors have reasonable dsitributions.
  persona: david
  provenance: S2
  show: The Distributions screen — per-surveyor z-scores on dose yes-rate, interview speed, and answer uniformity, the flagged surveyor red on speed + uniformity and a red composite band, every other surveyor green — fabrication caught from the data's shape with no re-visit.
  title: GPS is clean — the Distributions screen catches the fabrication
