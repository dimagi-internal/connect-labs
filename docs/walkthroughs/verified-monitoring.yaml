  concept_claim: Program delivery is concentrated in the intervention ward and absent in the adjacent control ward, while the independent survey covered both — so the coverage gap tracks where the program went, not where the survey looked.
  design_intent: Real labelled admin boundaries (intervention indigo / control slate) on a light Mapbox basemap via the shared ConnectMap module, with the SAME docked Layers panel the plan editor uses — toggles for service delivery, the independent survey, the designed Plan (arm-coloured selected-PSU hulls), the sampled Work areas, and all Building footprints — drawn through the shared PlanLayers component so the monitoring map and the plan editor render the plan identically. Every survey draws (no per-ward cap), each on the real sampled footprint and within the 15 m GPS gate, distinguishing the unit the surveyor was assigned to try first (primary — larger solid dot) from a substituted backup (alternate — smaller hollow ring). The map re-fits on each cycle but NOT on a layer toggle, so toggling keeps the planner's pan/zoom.
  features:
  - description: A full-width two-ward Mapbox map with a docked Layers panel (service delivery, independent survey, Plan · sampled PSUs, Work areas, Building footprints) drawn via the shared PlanLayers component; service-delivery points fill the intervention ward, every survey pin draws in both wards (each on a real sampled footprint, larger solid for the primary unit / smaller hollow ring for an alternate), and the map re-centres on a new real ward pair when the cycle changes.
    id: two-ward-map
    verify: Assert both labelled ward boundaries and the Layers panel (delivery / survey / plan / work areas / building footprints) render; toggling Plan draws arm-coloured PSU hulls and does NOT recentre; clicking R1 then R6 re-centres the map on a different program/comparison ward pair.
  full_page: false
  narrative: 'David explores further in the map: For the round 6 that he is looking at, he can see he''s program''s logged visits in the relevant survey areas - his program only fills the intervention ward.  David can see the survey points for both the intervention and control wards as well. Using different layers, David can turn on and off data points such as the service delivery data or see the PSUs that were used in the household selection.'
  persona: david
  provenance: S3
  show: The full-width map — program service-delivery filling the intervention ward, every independent survey pin in both wards, the designed plan's arm-coloured PSU clusters toggled on from the shared Layers panel — flying to each cycle's two real wards.
  title: Where delivery happened vs where the survey checked (the map moves)
- actions:
  - kind: scroll_to
    target: Survey-quality scorecard
  - kind: hold
