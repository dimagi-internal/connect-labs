name: verified-monitoring
narrative: 'David manages a Connect program delivering vitamin-A home visits across
  rural Kaduna. David''s frontline workers log every visit through Connect, and David
  gets a clean coverage figure back each cycle — but David has never been able to
  tell whether those visits are actually changing anything in the communities his
  program serves. So David stood up an independent rooftop survey that re-measures
  the same households, cycle after cycle, in a ward his program works and in an adjacent
  ward it doesn''t. This morning David opens its dashboard.

  David starts with the six-round trend — the independent survey repeated every two
  months, the earliest round at the left through the most recent at the right. Reading
  left to right across that timeline, David lines up two numbers each round — what
  his program''s delivery data reported, and what the independent survey found — and
  reads the distance between them, hovering a point to pull the exact value; the control
  arm, where his program never went, tracks flat along the bottom the whole way across.
  To see where his program actually reached, David drops to the map: his program''s
  logged visits fill the intervention ward and stop at its boundary, while the survey''s
  pins fall in both wards. David steps through the cycles and watches the map fly
  to each one''s real pair of wards.

  David has been handed clean-looking survey data before that turned out to be invented,
  so before David trusts any of this David checks the people who collected it. The
  scorecard gives David one row per surveyor, every figure computed from that surveyor''s
  own records — and one row is flagged for review. GPS is not the tell: the survey
  app blocks any submission more than fifteen metres from the assigned household,
  so every surveyor''s GPS reads clean by construction. So David looks where fabrication
  actually leaves a fingerprint — the Distributions screen, which compares each surveyor
  against their peers with no second visit: the flagged surveyor''s interviews run
  impossibly fast and their answers collapse onto one value, both lighting up red
  while everyone else sits normal. Then David confirms it with that surveyor''s back-check,
  where a different enumerator independently re-visited a sample of the same households:
  David reads each row as the original over the re-survey — the child''s sex and age,
  the household''s roof, the location, the vitamin-A result — with whatever changed
  marked in red, and taps the info button to confirm it follows the standard J-PAL/IPA
  method. By the time David closes the page, nothing has told David what to conclude;
  David has read his program''s own claim, the independent measure, the map, and the
  one surveyor whose work David will question — and decided for himself whether his
  program is actually having an impact.'
