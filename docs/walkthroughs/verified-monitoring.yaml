name: verified-monitoring
narrative: 'David manages a Connect program delivering vitamin-A home visits, and wants to know how independent difference in difference surveys compare to his program''s data.  David opens the independent survey''s dashboard and sees the six-round trend — the same survey repeated every two months in different intervention and non-intervention geographies.  David sees that the independent survey data is showing a large increase in the Vitamin-A rate, though less than his internal data has reported. David explores further in the map: For the round 6 that he is looking at, he can see he''s program''s logged visits in the relevant survey areas - his program only fills the intervention ward.  David can see the survey points for both the intervention and control wards as well. Using different layers, David can turn on and off data points such as the service delivery data or see the PSUs that were used in the household selection. David then explores the quality of the survey data.  The scorecard gives David one row per surveyor with a KPIs, GPS reads clean for everyone — expected as the Connect app won''t let a survey submit more than 15 m from the assigned household. David scans the additional KPIs, the proof photos, how often each reached the primary household they were assigned or had to move to a secondary household, and the back-checks performed by a second survey to the same household. One row is flagged for review. David then evaluates the Distributions table.  The flagged surveyor''s interviews were completed suspiciously fast and their roof-type answers collapse onto a single value, both flags.  All other surveyors have reasonable dsitributions.'
narrative_locked: false
narrative_synced_at: '2026-06-17T21:56:14.456683+00:00'
narrative_synced_hash: 175a8f13f2d0725e9a2e8c2cd8e1c51710186c76026fc19e226ffe4416a39c26
