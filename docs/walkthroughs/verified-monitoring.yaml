auth:
  type: session
base_url: https://labs.connect.dimagi.com
name: verified-monitoring
narrative: 'David, the funder of a child-health program, opens the monitoring dashboard.
  The program works a different ward each bi-monthly cycle, each verified against
  an adjacent comparison ward, so the dashboard is a time series of independent checks.
  The hero puts two numbers side by side for the latest cycle''s program ward: the
  implementer''s self-report and the independent rooftop survey, with their difference
  and a 95% confidence band on a dumbbell — no prose telling him what to conclude.
  He scans the data-quality strip — evidence capture, GPS-within-15m, field completeness,
  all computed from the survey''s own records — then drills into the back-check: a
  sample re-surveyed by a different surveyor, with the field-by-field comparison table
  laid out so he can read each household''s original over its re-survey answer, the
  one changed value highlighted in red, and the headline stats (outcome agreement,
  identity match, proportion-test p; the subsample rate is not shown as a coverage
  figure). He clicks across the round selector and the whole dashboard re-drives —
  and the map flies to that cycle''s two real wards: program service delivery filling
  the program ward, the independent survey pins covering both. He pulls up the six-cycle
  trend where the self-reported line sits above the independently-verified line every
  cycle, across six different program wards, while the comparison wards stay low.
  Nothing on screen interprets the data for him; the numbers, and the moving map,
  do the work.'
narrative_locked: true
narrative_locked_at: '2026-06-04T22:36:45.051234+00:00'
personas:
  david:
    color: '#4F46E5'
    intro: David funds the child-health program and wants independent, drillable proof
      the vitamin-A home visits reached households — not the implementer's self-report
      — with the survey's own quality and a back-check he can inspect row by row.
    name: David Mensah
    role: Program Officer, Funder
scenes:
- actions:
  - kind: goto
    target: /labs/workflow/3699/run/?opportunity_id=10008&run_id=3712
  - kind: wait_for
    target: Survey round
  - kind: scroll_to
    target: Self-reported vs independently verified
  - kind: hold
    seconds: 2
  concept_claim: The latest independent survey puts verified coverage well below the
    program's self-report, shown as two objective numbers and their difference — the
    viewer draws the conclusion.
  design_intent: Bet that three big monospace numbers (self-reported / independently
    verified / difference) over a dumbbell with a 95% CI band reads as objective measurement,
    not advocacy. No interpretive verbs.
  features:
  - description: Two dots on a zoomed axis — self-reported (amber) and independently
      verified (indigo) — with a shaded 95% CI band on the verified estimate and a
      neutral delta label.
    id: hero-dumbbell
    verify: Assert the hero shows three numbers (self-reported, independently verified,
      and their difference with a 95% CI) plus an "as of <month>" stamp for the selected
      cycle's program ward, and contains no interpretive words (overstate / too high
      / reproduces).
  persona: david
  provenance: S1
  show: 'On the live dashboard (/labs/workflow/3699/run/?opportunity_id=10008&run_id=3712),
    the hero: the program''s self-report and the independent survey for the latest
    round, with their difference.'
  title: Self-reported vs independently verified, side by side
- actions:
  - kind: scroll_to
    target: data quality
  - kind: hold
    seconds: 2
  concept_claim: The independent survey's data quality is high and is computed from
    the row-level records, not asserted.
  design_intent: A row of compact metric chips, green when they clear the published
    threshold, so quality reads at a glance.
  features:
  - description: Layer-1 survey-quality chips from the survey_quality library (evidence,
      GPS, completeness, duration, consistency, duplicates).
    id: qa-strip
    verify: Assert the chips render computed values with pass/fail coloring against
      thresholds.
  persona: david
  provenance: S2
  show: 'The data-quality strip: evidence capture, GPS-within-15m, field completeness,
    duration, consistency, duplicates — each computed from the survey records.'
  title: The survey's own data quality
- actions:
  - kind: scroll_to
    target: Independent back-check
  - kind: hold
    seconds: 1
  - kind: scroll_to
    target: showing
  - kind: hold
    seconds: 2
  concept_claim: A sample is independently re-surveyed by a different enumerator and
    compared field-by-field, so the funder can audit every flagged difference, original
    against re-survey.
  design_intent: A J-PAL-style back-check rendered as an auditable side-by-side table
    (changes first, in red), each cell stacking original over re-survey, plus an objective
    stat row — inspectable, not summarized.
  features:
  - description: Per-household, each cell stacks the original over the re-survey value
      (changes in red) on the re-asked variables (outcome + identity), with sample
      / outcome-agreement / identity-match / proportion-test stats.
    id: backcheck-table
    verify: Assert the table renders rows with a highlighted change and the stat row
      shows outcome agreement, identity match, and the proportion-test p-value — and
      no subsample coverage % that could be mistaken for the ward estimate.
  persona: david
  provenance: S3
  show: 'The back-check drill-down: the headline stats then the field-by-field comparison
    table — original vs re-survey per household, discordances in red.'
  title: Drill into the back-check
- actions:
  - kind: scroll_to
    target: Survey round
  - kind: click
    target: R1
  - kind: hold
    seconds: 1
  - kind: click
    target: R4
  - kind: hold
    seconds: 1
  - kind: click
    target: R6
  - kind: hold
    seconds: 1
  concept_claim: Every KPI is per-cycle and inspectable — selecting a round re-drives
    the hero, quality strip, tiles, back-check, and the map, which flies to that cycle's
    two real wards.
  design_intent: A compact R1-R6 selector so the whole dashboard is a time series
    you can step through — and the map animates between each cycle's program/comparison
    wards.
  features:
  - description: Round chips that set the active round; hero/QA/tiles/back-check/trend-highlight
      AND the map (re-fits to that round's two wards) re-read it.
    id: round-selector
    verify: Assert clicking R1 then R6 changes the hero verified value AND moves the
      map to a different program/comparison ward pair (different ward labels on the
      map).
  persona: david
  provenance: S2
  show: The round selector re-drives every KPI — and the map moves to that cycle's
    program and comparison wards.
  title: Drill across cycles (the map moves)
- actions:
  - kind: scroll_to
    target: bi-monthly rounds
  - kind: hold
    seconds: 2
  concept_claim: Across all six cycles — six different program wards — the self-reported
    line sits above the independently-verified line, while the comparison wards stay
    low.
  design_intent: Three lines plus a shaded self-reported-minus-verified band and a
    highlighted selected-cycle column, so the persistent gap is visible without a
    sentence.
  features:
  - description: Self-reported (dashed amber), independently verified (indigo), comparison
      ward (neutral slate), with the self-reported-minus-verified band and selected-cycle
      marker.
    id: trend-three-line
    verify: Assert three series render across six cycles with the selected-cycle column
      highlighted.
  persona: david
  provenance: S1
  show: The six-cycle trend — self-reported (dashed) above independently-verified
    every cycle, the comparison wards far below.
  title: Self-reported above verified, every cycle
- actions:
  - kind: scroll_to
    target: Program service delivery
  - kind: hold
    seconds: 2
  concept_claim: For the selected cycle, program delivery fills the program ward while
    the independent survey covered both that ward and its adjacent comparison ward
    — shown on real admin boundaries that move cycle to cycle.
  design_intent: Real, labelled admin boundaries (program ward indigo, comparison
    ward neutral slate) on a light Mapbox basemap via the shared ConnectMap module,
    with a legend, service-delivery + survey-pin layers, and a fit that re-centres
    on each cycle's two wards.
  features:
  - description: Real labelled admin boundaries for the cycle's two wards + a legend
      + a service-delivery point layer (program ward) + survey pins (both wards, confirmed/not-confirmed),
      with toggles; the map re-fits when the round changes.
    id: two-ward-map
    verify: Assert the Mapbox canvas renders both labelled ward boundaries with a
      legend, and that changing the round re-centres the map on a different ward pair.
  persona: david
  provenance: S4
  show: The two-ward Mapbox map — program service-delivery points in the program ward,
    independent survey pins in both wards, with layer toggles.
  title: Where delivery happened, where the survey checked
