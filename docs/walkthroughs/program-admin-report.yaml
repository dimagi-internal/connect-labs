auth:
  check: test -f ~/.ace/labs-session.json && echo 'ready'
  inject_url: /labs/
  login: bash ~/.claude/plugins/cache/ace/ace/$(cat ~/.claude/plugins/marketplaces/ace/VERSION)/bin/ace-labs-walkthrough-login
  type: command
base_url: https://labs.connect.dimagi.com
capabilities:
- See every opportunity's weekly review compliance as one grid — opp rows, week columns,
  and a pinned aggregate that calls out SOP MET vs BELOW.
- Click any week cell to see who was flagged that week and what was done about it,
  in an inline panel with no page navigation.
- Drill from a flag to the underlying weekly review, the audit photo session, the
  follow-up task, and the full AI coaching transcript.
- Distinguish resolved weeks from weeks with open audits or tasks at a glance via
  the cell status pills.
getting_started:
- Open your program's Program Admin Report run from the workflow list at /labs/workflow/.
- Set the report window to the weeks you want to review and refresh the rollup.
- Click any week cell to inspect that week's flags, audits, and tasks; use 'Open the
  run' to reach the underlying weekly review.
name: program-admin-report
narrative: Amani runs the Northern Cluster's frontline team, and Monday morning he
  opens this week's nutrition review to find the table has already flagged the one
  worker whose MUAC numbers look too clean to be true. Amani sends that worker's last
  seven days of photos to audit straight from the flagged row. Amani works through
  the audit photo by photo, passing each one and completing the image review. Back
  in the review, Amani turns the flag into a coaching task built from the exact rule
  the worker tripped. Amani hands the coaching to an AI assistant, tweaking its instructions
  before sending it off, and watches the coaching conversation open. Days later Priya,
  who administers the whole program, opens the Program Admin Report and reads both
  clusters' four weeks in one grid of cells. Priya clicks a week where everything
  got resolved and an inline panel names who was flagged and links the audit and task
  that dealt with it. Priya opens the run behind the cell and reads the same per-worker
  table Amani worked from, its action buttons now reporting what was done. Priya opens
  the audit to see the photos the auditor passed with her own eyes. Priya opens the
  closed task and reads the full coaching conversation that settled it. Then Priya
  turns to the harder cell — the amber week where work is still open — and the panel
  shows her exactly which workers are still being investigated. Priya opens the in-review
  audit and sees how far the auditor has gotten. Priya opens the still-open task and
  reads the coaching conversation paused mid-exchange. Priya lands back on the aggregate
  column and decides for herself which network manager needs her this week.
