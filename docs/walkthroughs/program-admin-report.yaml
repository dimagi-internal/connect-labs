  provenance: S3
  show: 'The in-progress weekly review page: per-FLW table with MUAC distribution,
    SAM/MAM rates and gender split per worker. Within seconds of page load, flag pills
    appear on the flagged worker''s row as the review derives and persists its quality
    checks automatically.'
