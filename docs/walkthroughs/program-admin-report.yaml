tagline: One grid that tells a program admin which network managers ran their weekly
  review — and lets her drill from any cell down to the audit photos, the follow-up
  task, and the AI coaching conversation that resolved it.
video_pace: medium
video_viewport_height: 900
video_viewport_width: 1440
why_brief: ../../.canopy/ddd/runs/program-admin-report-2026-06-11-001/why_brief.yaml
why_summary: A program admin overseeing several network managers shouldn't have to
  open eight separate weekly reviews and cross-reference audits and tasks by hand
  to know whether the SOP is being run and flagged workers are being coached. The
  Program Admin Report rolls all of it into one grid, and because every cell links
  to the primary records — photos, tasks, transcripts — the rollup is verifiable,
  not just summarized.
