      fired. Wait instead for ''Workflows'', the visible heading on the workflow-list
      page (absent from the audit page, which only has a singular ''Back to
      Workflow'' link). This confirms the completion POST landed AND the redirect
      navigated. Generous timeout: completeAudit awaits a synchronous S3 upsert +
      run-state POST, then the heavy workflow-list page renders (~5-8s).'
    seconds: 60
    target: text:Workflows
