    seconds: 15
    target: css:button:has-text("Complete Image Review")
  - kind: click
    must_succeed: true
    note: 'click the BUTTON, not the static <h2> header. An unscoped
      text:Complete Image Review resolves to the always-present section heading (a
      non-interactive <h2>), so completeAudit() never fires and the page never
      redirects. Scope to the button so the completion POST + workflow redirect run.'
    target: css:button:has-text("Complete Image Review")
  - kind: wait_for
    must_succeed: true
    note: 'commit signal - on success completeAudit() redirects to the workflow list
      (/labs/workflow/). The recorder has NO url: target prefix (supported prefixes
      are css/text/testid/aria/role), so an old url:**/labs/workflow/** target was
      parsed as an auto/text match for a DOM element literally containing that string
