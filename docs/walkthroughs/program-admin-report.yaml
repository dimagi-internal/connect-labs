  concept_claim: Opening an in-progress weekly review automatically computes and persists
    quality flags for any worker whose submitted data trips a flag-catalog rule, with
    flag pills appearing in the table without any reviewer action.
  design_intent: 'Flag derivation belongs to the review itself, not to a separate
    "run checks" button — the reviewer''s first look at the table is already the triaged
    view. Bet: auto-flags-on-mount makes the SOP self-enforcing.'
  features:
  - description: chc_nutrition render code calls view.ensureAutoFlags on mount, POSTs
      computed flags to /flags/, and merges created flags into local state so pills
      render on first mount without a reload
    id: auto-flags-on-mount
    verify: 'Playwright: load ${wk4_url} on a fresh generation, assert a flag-label
      pill (text matching ''rate <'' or ''Gender split'') appears within 45s with
      no clicks'
  - description: Flag catalog evaluates per-FLW pipeline aggregates (SAM rate < 1%,
      MAM rate < 3%, gender split outside 40-60%) and emits one flag record per tripped
      rule
    id: flag-catalog-rules
    verify: 'pytest commcare_connect/custom_analysis: flagged MUAC archetype distributions
      trip at least one catalog rule (test_flagged_muac_archetypes_actually_trip_a_flag)'
  narrative: Amani opens this week's in-progress nutrition review and, while he reads
    the per-worker table, the review computes its own quality checks and raises a
    flag pill on the one worker whose screening numbers tripped a rule — before Amani
    has clicked anything.
