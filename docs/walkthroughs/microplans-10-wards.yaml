capabilities:
- Bulk-create plans from a pasted list of ward names with one config (boundary, mode, strategy,
  buildings per work area, balance tolerance) — with a name-resolution + confirm step before commit.
- Per-plan KPIs in the workspace and a comparison page that surfaces the outliers
  worth retuning.
- Bundle plans into one group for an LLO with one share link they can open without
  a Dimagi account.
- Per-plan LLO actions the audit captures end-to-end — eliminate work areas with reasons,
  drag work areas between groups, reassign a group to a different user, accept/exclude/in-review per plan.
- Sign off in one click on the audit — Dana accepts the LLO's edits, the batch goes fully Approved,
  Deploy unlocks.
- Push the approved batch to a Connect opportunity with per-group user mapping so labs
  work-area-groups land on FLWs already invited to the opp.
getting_started:
- In labs, open the program workspace for your program — one program per RCT, one
  plan group per LLO/state.
- Paste the LLO's ward list into the bulk-create form, confirm the resolved matches
  (so typo'd ward names are caught before commit), pick the per-batch config (mode +
  strategy + per-area workload + balance tolerance), and hit Create Plans.
- Read the KPIs in the portfolio, jump to the comparison page on the outliers, and
  retune those without rebuilding the rest.
- Bundle the LLO's wards into one group, set the share so anyone with the link can
  open it, send the URL.
- Review the audit when the LLO is done — her work-area eliminations + reasons, group
  moves, user reassignments, accept/exclude calls — Accept-all to sign off, then
  Deploy to a (synthetic, for now) Connect opportunity with per-group user mapping.
name: microplans-10-wards
narrative: 'Dana opens her program''s workspace in labs to start the Madobi LGA arm of
  the CHC implementation RCT — one LGA per LLO, and Madobi (Kano State, Nigeria) is
  the LGA Kim covers, which contains today''s ten wards: Burji, Cinkoso, Galinja,
  Gora, Kafin Agur, Kanwa, Kauran Mata, Kwankwaso, Madobi, and Rikadawa. She opens
  the bulk-create form, pastes the ten ward names, and the system matches them
  against the admin boundaries — seven come back uniquely matched in Madobi LGA
  (LGA + population shown), and three come back nationally ambiguous (Gora, Kanwa,
  and Madobi each share a ward name with one or more other Nigerian LGAs); a Pick
  LGA dropdown beside each ambiguous row lists the candidate LGAs with populations
  so Dana picks Madobi LGA for each, lifting the matched count to ten before any
  plan is created. She confirms the matches, picks the per-batch config (Coverage,
  Walkable clusters, 100 buildings per work area, ±10% balance tolerance), and hits
  Create Plans — the system materializes one plan per ward in a single bulk
  operation against real building footprints, showing per-ward progress since it''s
  long-running. She reads the per-plan KPIs in the workspace, opens the comparison
  page, picks a few plans, sorts on a metric she cares about, and decides whether
  any plan is a true outlier worth retuning. She clicks one of the outliers in
  the sidebar to drill into its map view — per-territory work areas color-coded
  by group, with the per-territory KPIs alongside — confirming her sort-driven
  hunch before bundling. She bundles the ten plans into one group for Kim (the
  Madobi LGA LLO), sets the share so Kim can open it without a Dimagi account,
  and sends one link. Kim opens plan 1 on the map and eliminates
  several work areas on the far east/right — one she marks as a school footprint,
  another as an unsafe stretch — tagging each with its reason. She moves three work
  areas from one group to another to balance workload, and reassigns an entire
  work-area group from one user to another who will actually be available. She
  then approves plan 1 and accepts the remaining plans as-is, leaving them for
  Dana''s sign-off. Dana reviews Kim''s edits on the audit panel and accepts them
  all, advancing the batch to fully Approved. Once the plans are approved, she
  enters a UI to sync a plan to Connect which lets her pick the opp to push the
  plan to, and map the users from the Connect opp to the workareagroups.'
