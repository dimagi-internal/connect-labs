name: microplans-study-groups
narrative: >-
  Maya is designing a controlled rooftop-survey impact study for the Vitamin-A
  programme in Kaura, and she doesn't start from ward names — she starts from where
  the programme actually delivered. On a fresh, empty study she opens "add wards from
  map", turns on the service-delivery layer, and the Kaura CHC delivery project lights
  up: hundreds of visit points blanket the WHOLE of Attakar ward. That saturation is
  the point — because the programme worked across all of Attakar, surveying the entire
  ward is the honest unit, so Attakar is her intervention ward. She clicks it and an
  adjacent, un-served neighbour, Gura, as the comparison — two boundaries straight off
  the map, one action creating a plan for each. Back on the study she marks Attakar the
  intervention and Gura the control — an arm assignment that lives only on the study,
  never on the wards' own plans, so the field file stays blind. Then one bulk action
  samples both wards on a single shared configuration — size-balanced PSU bands and a
  building-footprint-size filter so the only difference between the arms is the ward,
  not the method — and the study fills with sampling sites and work areas. She opens
  each ward on its own map, pulls both arms onto one map coloured by arm, and reads the
  comparability panel as objective data: the structural axis she can't fix after the
  fact comes back within tolerance, the adjustable covariates are flagged to correct
  for at analysis, and she — not the panel — makes the call. Satisfied, she completes a
  blind, balanced two-arm design, each ward ready to export arm-free to its own
  opportunity.
base_url: https://labs.connect.dimagi.com
auth:
  type: session
why_brief: ../../.canopy/ddd/runs/microplans-study-groups-2026-06-05-001/why_brief.yaml
narrative_locked: false
personas:
  maya:
    name: Maya
    role: Program study planner
    color: '#7C3AED'
    intro: Maya designs a controlled rooftop-survey impact study for the Kaura Vitamin-A programme and needs two comparable arms that field surveyors execute completely blind.
scenes:
- persona: maya
  title: Maya starts a study from scratch
  url: /microplans/program/10008/
  show: From the Vitamin-A Kaura programme portfolio — already holding five earlier study rounds — Maya starts a brand-new two-arm study, names it, and lands on an empty study with no wards in it yet.
  concept_claim: Maya creates an empty named study from scratch on the labs-only Kaura programme and lands on its page ready to add wards, before committing any ward names.
  provenance: S12
  design_intent: 'Bet: a study should start as an empty container the planner fills from the map, not a list of names committed up front.'
  actions:
  - kind: wait_for
    target: Plan groups & studies
  - kind: scroll_to
    target: + New study
  - kind: click
    target: + New study
    note: open the inline new-study form
    must_succeed: true
  - kind: fill
    target: css:input[placeholder='Untitled study']
    value: Kaura Vitamin-A rooftop impact study
    note: name the study
  - kind: press
    value: Enter
    note: creating the study navigates to its empty manage page (/group/<new_id>/manage/)
  - kind: wait_for
    target: No plans in this group yet
    seconds: 20
    must_succeed: true
    note: 'terminal state: the empty study page'
  - kind: hold
    seconds: 1.5
  features:
  - id: new-study-create
    description: '''+ New study'' names and creates an empty study (DEFINING, 0 plans) on program 10008 and routes to its manage page'
    verify: 'Playwright: click ''+ New study'', fill name, submit; assert URL is /program/10008/group/<id>/manage/ and the page shows ''No plans in this group yet'''
- persona: maya
  title: Maya sees the programme covered all of Attakar
  full_page: false
  show: On the empty study Maya opens "Add wards from map" and turns on the Kaura CHC service-delivery layer — hundreds of delivery visits blanket the entire Attakar ward, showing the programme worked the whole ward, not a corner of it.
  concept_claim: Maya turns on the Kaura CHC service-delivery opp and its visits saturate the WHOLE of Attakar, showing ward-wide delivery — the reason the entire ward is the honest survey unit.
  provenance: S13
  design_intent: 'Bet: the planner chooses the intervention ward from where the programme actually delivered, and ward-wide saturation is what justifies surveying the whole ward — so the delivery map, not a name list, is where she starts.'
  actions:
  - kind: wait_for
    target: No plans in this group yet
  - kind: click
    target: + Add wards from map
    note: open the study-scoped map bulk-picker
    must_succeed: true
  - kind: wait_for
    target: Back to study
    seconds: 20
    must_succeed: true
  - kind: hold
    seconds: 5
    note: map + Boundaries layer auto-load over the programme footprint; country auto-detects
  - kind: click
    target: aria:toggle Service delivery
    note: open the delivery-points picker
    must_succeed: false
  - kind: hold
    seconds: 1
  - kind: click
    target: Pick opportunities
    note: open the opportunity picker overlay
    must_succeed: false
  - kind: hold
    seconds: 1
  - kind: click
    target: css:[data-testid=sd-opp-10010]
    note: select the Kaura CHC service-delivery opp (opp 10010, under this same programme)
    must_succeed: true
  - kind: click
    target: Done
    note: close the opportunity picker overlay
    must_succeed: false
  - kind: click
    target: css:#sd-picker .sd-show
    note: show its service-delivery points; the map flies to Attakar where the programme worked
    must_succeed: false
  - kind: hold
    seconds: 6
    note: the delivery cloud saturates the whole Attakar ward
  features:
  - id: add-from-map-entry
    description: '''+ Add wards from map'' opens a study-scoped full-page map (service-delivery overlay + admin-boundaries multi-select)'
    verify: 'Playwright: from /group/<id>/manage/ click ''+ Add wards from map''; assert URL is /group/<id>/add-from-map/ and a mapboxgl canvas + Layers panel render'
  - id: service-delivery-ward-wide
    description: The Kaura CHC opp (10010, same programme) renders its delivery visits, which cover the whole Attakar ward
    verify: 'pytest/HTTP: POST preview_service_delivery {opp_ids:[10010]} returns status ok with ~435 points whose bbox falls inside the Attakar polygon'
- persona: maya
  title: Maya picks the covered ward and a fair neighbour
  full_page: false
  show: With the delivery footprint in view, Maya clicks Attakar — the ward the programme covered — and Gura, an adjacent ward it did not, as the study's two wards, each softly highlighting on the map.
  concept_claim: Maya selects two admin boundaries straight off the map — Attakar (covered) and the neighbouring Gura (not covered) — as the study's intervention and comparison wards.
  provenance: S13
  design_intent: 'Bet: the comparison ward should be a real adjacent neighbour chosen on the same map, so the two arms differ by exposure, not by being miles apart.'
  actions:
  - kind: fill
    target: css:.mp-ab-search
    value: Attakar
    note: find the covered ward
    must_succeed: true
  - kind: wait_for
    target: Attakar · Locality / Ward
    seconds: 20
    must_succeed: true
  - kind: click
    target: Attakar · Locality / Ward
    note: select the covered (intervention) ward
    must_succeed: true
  - kind: wait_for
    target: 1 ward selected
    seconds: 10
    must_succeed: true
  - kind: fill
    target: css:.mp-ab-search
    value: Gura
    note: find the adjacent comparison ward
    must_succeed: true
  - kind: wait_for
    target: Gura · Locality / Ward
    seconds: 20
    must_succeed: true
  - kind: click
    target: Gura · Locality / Ward
    note: select the comparison ward
    must_succeed: true
  - kind: wait_for
    target: 2 wards selected
    seconds: 10
    must_succeed: true
  - kind: hold
    seconds: 4
    note: two wards selected on the delivery map; 'Create 2 plans' enabled
  features:
  - id: multi-boundary-select
    description: The map lets the planner select more than one admin boundary; the footer counts 'N wards selected'
    verify: 'Playwright: select two boundaries; assert the footer reads ''2 wards selected'' and the Create button enables'
  - id: enriched-boundaries-source
    description: The admin-boundary picker labels the curated source "Enriched Boundaries" (the corrected per-country set), with Overture as the fallback
    verify: 'Playwright: open the boundary source picker; assert it shows "Enriched Boundaries" (not "Other 3rd Party Sources")'
- persona: maya
  title: Maya creates the plans and lands back on the study
  show: Maya clicks "Create plans" and one action files a plan for each selected ward into the study, dropping her back on the study page with both wards listed — one plan, one opportunity per ward — still awaiting samples.
  concept_claim: One action creates a boundary-only plan per selected ward and returns Maya to the study, now listing Attakar and Gura as members, one plan per ward, still awaiting samples.
  provenance: S3
  design_intent: 'Bet: the executable unit is one ward = one plan = one opportunity, so the map''s multi-selection fans out into one plan per ward, assembled into the study.'
  actions:
  - kind: wait_for
    target: Attakar
    seconds: 20
    must_succeed: true
    note: the study now lists both wards as members
  - kind: scroll_to
    target: Gura
  - kind: hold
    seconds: 1.5
    note: one plan + one opportunity per ward, both still 'boundary' (awaiting samples)
  features:
  - id: bulk-create-into-study
    description: Create plans files one boundary-only plan per selected boundary into the study and returns to the study manage page
    verify: 'pytest: POST group/<id>/bulk_create_from_boundaries with N boundaries creates N boundary-only plans (phase ''boundary'', no work areas, no arm) all in group.plan_ids'
- persona: maya
  title: Maya marks Attakar the intervention
  show: Back on the study, Maya marks Attakar the intervention — the ward she just watched the delivery cloud cover — and Gura the control, using the per-ward arm picker; an assignment she sets by hand that lives only on the study, never on the wards' plans.
  concept_claim: Maya assigns Attakar=intervention and Gura=control by hand on the study, justified by the delivery she saw, and the arm lives only on the study group, never on the ward's plan or work areas.
  provenance: S11
  design_intent: 'Bet: keeping the arm a deliberate planner choice stored only on the group keeps the executable plan blind by construction — there is nothing to strip at export.'
  actions:
  - kind: wait_for
    target: Two-arm controlled study
    seconds: 20
  - kind: scroll_to
    target: Arm
  - kind: select
    target: css:select
    value: intervention
    note: Attakar's arm picker — mark it the intervention (the ward the programme delivered across)
  - kind: hold
    seconds: 1.5
    note: hold on the arm column so the manual assignment reads
  features:
  - id: arm-select-manual
    description: Per-plan arm picker on the study page sets intervention/control, persisted on the group's arms map (labs-side only)
    verify: 'pytest: POST group update with arms={plan_id: ''intervention''} persists on PlanGroupRecord.arms; PlanRecord carries no arm'
  - id: arm-on-group-only
    description: Arm assignment is stored on the group, not on the plan or its work areas
    verify: 'pytest: after assignment, assert PlanRecord and each WorkArea expose no arm field'
- persona: maya
  title: Maya samples both wards on one shared configuration
  show: With both wards in the study, Maya runs one Generate samples action — size-balanced PSU bands and a building-footprint-size filter shared across both arms — and the empty study fills, each ward flipping to sampled with its sampling sites and work areas.
  concept_claim: Maya samples both wards with one action on a single shared configuration (size-balance bands + footprint-size filter), and each ward flips to sampled with its work-area count.
  provenance: S7
  design_intent: 'Bet: comparability starts at sampling — one shared configuration, size-balanced so both arms get a matched cluster-size mix, means differences between the arms reflect the wards, not the method.'
  actions:
  - kind: wait_for
    target: Re-generate samples
    seconds: 20
    must_succeed: false
  - kind: scroll_to
    target: Re-generate samples
  - kind: hover
    target: Re-generate samples
    note: the single action that samples every member ward identically on one shared config
  - kind: scroll_to
    target: Work areas
  - kind: hold
    seconds: 2
    note: both wards read sampled with their work-area counts
  features:
  - id: group-generate-samples
    description: A single 'Generate samples' action samples every boundary-phase member plan using the study's one shared sampling_config
    verify: 'pytest: POST group/<id>/generate flips every boundary-phase member plan to phase ''sampled'' using group.sampling_config'
  - id: shared-size-balanced-config
    description: Both arms sample from one shared sampling_config carrying size_balance_bands and the footprint-size (area_min_m2/area_max_m2) filter
    verify: 'pytest: assert the study sampling_config has size_balance_bands>=2 and area_min_m2/area_max_m2, and both plans were drawn from it'
- persona: maya
  title: Maya studies each ward on its own map
  full_page: false
  show: Maya opens the intervention ward on its own review map to understand its sampled sites and work areas before judging it against the other arm.
  concept_claim: Maya opens a single ward on its own review map to see its sampled sites and work areas in detail.
  provenance: S6
  design_intent: 'Bet: a planner needs to understand each arm on its own before comparing them, so each ward has its own full review map.'
  actions:
  - kind: wait_for
    target: Microplan review
    seconds: 20
    must_succeed: true
  - kind: hold
    seconds: 12
    note: high-zoom satellite tiles are slow to load in headless — give them time before the viewport capture
  features:
  - id: per-plan-review-map
    description: Each ward has its own review page with a map of its sampled work areas plus grouping and worker-assignment controls
    verify: 'Playwright: open a ward''s /plan/<id>/review/; assert a mapboxgl canvas renders and the page reads ''Microplan review'''
- persona: maya
  title: Maya sees both arms together
  full_page: false
  show: Maya pulls both wards onto one read-only map, each coloured by its arm, and opens the Inspect panel to confirm which plan and arm each area belongs to.
  concept_claim: Maya sees both study arms overlaid on one read-only map coloured by arm, and opens an inspector that names each ward's plan and arm.
  provenance: S6
  design_intent: 'Bet: seeing intervention and control side by side in real geography lets a planner sanity-check comparability before completing.'
  actions:
  - kind: wait_for
    target: View-only
    seconds: 20
    must_succeed: true
  - kind: wait_for
    target: intervention
    note: arm legend rendered
  - kind: hold
    seconds: 12
    note: high-zoom satellite tiles + arm layers are slow in headless — give them time before the viewport capture
  - kind: click
    target: INSPECT
    note: open the inspector that names each area's plan and arm
    must_succeed: false
  - kind: hold
    seconds: 2
  features:
  - id: multi-plan-overlay-map
    description: View-only group map overlays every member plan's boundary and work areas on one Mapbox map, coloured by arm
    verify: 'Playwright: open /group/<id>/map/; assert a mapboxgl canvas renders and the legend shows each ward with its arm'
- persona: maya
  title: Maya reads the comparability as objective data
  viewport:
    width: 1440
    height: 900
  show: Back on the study, Maya reads the comparability panel as objective data, not a recommendation — the structural axis she can't fix after the fact comes back within tolerance, the adjustable covariates are flagged to correct for at analysis, and she makes the call.
  concept_claim: Maya's comparability panel reports the arms as objective data — the structural axis within tolerance, the adjustable covariates flagged to correct for at analysis — and leaves the judgement to her, not the panel.
  provenance: S8
  design_intent: 'Bet: classifying each axis by an objective property — structural (can''t adjust) vs adjustable covariate (a DiD corrects for it) — and never issuing a verdict keeps the planner making the call.'
  actions:
  - kind: wait_for
    target: ARM COMPARABILITY
    seconds: 20
    must_succeed: true
  - kind: scroll_to
    target: ARM COMPARABILITY
  - kind: hold
    seconds: 2
    note: structural axis vs adjustable covariates, each labelled by its objective property
  - kind: hold
    seconds: 2
    note: marginal SMDs read amber 'acceptable, marginal', not green — the planner decides
  features:
  - id: arm-comparability-objective
    description: Comparability panel computes standardized mean differences per axis and classifies each by objective property (structural vs adjustable baseline covariate), without issuing a recommendation
    verify: 'pytest: arm_comparability_psu returns per-metric SMD + an objective classification band; no field asserts a use/don''t-use recommendation'
  - id: comparability-not-a-recommendation
    description: The panel presents data + classification, not advice — marginal SMDs (0.1–0.25) show amber 'acceptable, marginal', and sections are labelled by objective property
    verify: 'Playwright: assert the panel labels axes structural vs adjustable and shows no ''matched''/''use this'' verdict language'
- persona: maya
  title: Maya completes the study
  show: Satisfied the two arms are close enough, Maya completes the study — a blind, balanced two-arm design, each ward ready to export arm-free to its own opportunity, with no arm column for the field to bias on.
  concept_claim: Maya completes the comparable study, leaving a blind two-arm design where each ward exports to its own Connect CSV with no arm column.
  provenance: S14
  design_intent: 'Bet: completing the study is the planner''s sign-off, and the export is blind by construction — the arm is shown for planning but never written to the field file.'
  actions:
  - kind: scroll_to
    target: Connect CSV is blind
  - kind: wait_for
    target: arm-free work-area file
  - kind: hover
    target: Connect CSV
    note: 'tooltip: ''one opportunity per plan; arm never included'''
    must_succeed: false
  - kind: hold
    seconds: 2
    note: the planning page shows the arm, but the export is arm-free — blind by construction
  features:
  - id: complete-study-lifecycle
    description: The planner advances the study's plans past draft (draft -> in_review -> approved) once comparability is confirmed
    verify: 'pytest: program_plan_transition moves a plan draft -> in_review -> approved; the study reflects the advanced state'
  - id: blind-claim-observable
    description: The study page states the export is blind and labels each Connect CSV as arm-free
    verify: 'Playwright: assert the page shows ''Connect CSV is blind'' and each ''Connect CSV'' link title contains ''arm never included'''
