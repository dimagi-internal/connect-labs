name: microplans-study-groups
narrative: 'Maya is setting up a controlled rooftop-survey impact study, and she doesn''t
  yet know which wards she''ll use — she knows where the program worked, not the ward
  names a paste-list would want. So she starts an empty study and works off the map:
  she opens the plan editor, turns on the service-delivery layer to see where the
  program actually reached the ground, then picks two neighbouring wards straight
  off the boundaries — tagging the one the program covered as intervention and a comparable
  neighbour as control. She creates the plans and lands back on the study, where one
  bulk action samples both wards together on a single shared configuration and the
  empty study fills with sampling sites and work areas. She opens each ward on its
  own map to understand it, then pulls both arms onto one map to see them side by
  side. Finally she reads the comparability panel, satisfies herself the two arms
  are close enough on the attributes that matter, and completes the study — a blind,
  balanced two-arm design built entirely from the map, each ward ready to export arm-free
  to its own Connect opportunity.'
narrative_locked: true
narrative_locked_at: '2026-06-05T21:49:29.113165+00:00'
