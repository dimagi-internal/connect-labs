name: microplans-study-groups
narrative: Maya is designing a controlled rooftop-survey impact study for the Vitamin-A
  programme in Kaura, and she doesn't start from ward names — she starts from where
  the programme actually delivered. On a fresh, empty study she opens the plan editor
  and turns on the Kaura CHC opportunity's service-delivery layer; hundreds of visit
  points blanket the WHOLE of Attakar ward. That saturation is the point — because
  the programme worked across all of Attakar, surveying the entire ward is the honest
  unit, so she tags Attakar her intervention arm. For the control she does not guess
  a neighbour — she runs the surrounding-ward comparison, which ranks every bordering
  ward by how closely its building-density distribution matches Attakar's. The tightest
  match is Zankan — but the programme worked Zankan the previous cycle, so it cannot be
  a clean control; she rejects it and adds the next-closest un-served neighbour, Gura,
  as her control — both wards in the SAME plan, each tagged with its arm in the left rail. One click of Generate samples both
  arms on identical size-balanced PSU bands and a building-footprint-size filter,
  and the single two-arm plan lands in the study fully drawn. On its review page the
  comparability panel puts the two arms side by side — buildings, area, settlement
  density — and flags whether the control is a fair counterfactual; Maya reads it,
  satisfies herself, and completes the study by approving the plan. The whole study
  is one balanced two-arm plan. Each work area carries its arm labs-side so future
  analysis can tell intervention from control, but the arm is never shown to the LLO
  or field — kept out of the Connect-facing work-area properties — so the people running
  the survey stay blind while the design keeps its arms.
base_url: https://labs.connect.dimagi.com
auth:
  type: session
why_brief: ../../.canopy/ddd/runs/microplans-study-groups-2026-06-05-001/why_brief.yaml
narrative_locked: true
personas:
  maya:
    name: Maya
    role: Program study planner
    color: '#7C3AED'
    intro: Maya designs a controlled rooftop-survey impact study for the Kaura Vitamin-A
      programme and needs two comparable arms that field surveyors execute completely
      blind.
scenes:
- persona: maya
  title: Maya starts a study from scratch
  narrative: Maya wants to start a brand-new two-arm study, so she creates a new study
    on her existing Kaura programme.
  url: /microplans/program/10008/
  show: From the Vitamin-A Kaura programme portfolio — already holding earlier study
    rounds — Maya starts a brand-new two-arm study with one click and lands on its
    empty study page, ready to add a plan.
  concept_claim: Maya creates an empty two-arm study from scratch on the labs-only
    Kaura programme with one click and lands on its manage page, ready to add a plan,
    before any wards are committed.
  provenance: S12
  design_intent: 'Bet: a study should start as an empty container the planner fills
    from the map, not a list of names committed up front — so “+ New study” creates
    it in one click, no name-first form.'
  actions:
  - kind: wait_for
    target: Plan groups & studies
  - kind: scroll_to
    target: css:#new-study
  - kind: click
    target: css:#new-study
    must_succeed: true
    note: one click creates an "Untitled study" and routes to its empty manage page
      — no name dialog
  - kind: wait_for
    target: No plans in this group yet
    seconds: 20
    must_succeed: true
    note: 'terminal state: the empty study page'
  - kind: hold
    seconds: 1.5
  features:
  - id: new-study-create
    description: '''+ New study'' creates an empty study (DEFINING, 0 plans) on program
      10008 and routes to its manage page'
    verify: 'Playwright: click ''+ New study''; assert URL is /program/10008/group/<id>/manage/
      and the page shows ''No plans in this group yet'''
- persona: maya
  title: Maya opens the plan editor on the empty study
  narrative: On the empty study Maya clicks “+ Add a plan in the editor”, and in the
    plan UI she turns on the service-delivery data for the opportunity she's building
    the study around — the existing Kaura CHC opp.
  full_page: false
  show: From the empty study Maya opens the single-plan editor via “+ Add a plan in
    the editor”; it loads scoped to the study (?group=…) and she switches on the Kaura
    CHC opportunity's service-delivery layer.
  concept_claim: From the empty study, “+ Add a plan in the editor” opens the polished
    single-plan editor scoped to the study (?group=<id>), where Maya turns on the
    Kaura CHC opportunity's service-delivery data — one plan, built in the unified
    plan UI.
  provenance: S13
  design_intent: 'Bet: a controlled study is designed in one real plan editor — the
    planner opens it on the study and grounds it in the opportunity''s own delivery
    data, rather than starting from a name list; scoping the editor to the study (?group=)
    files the finished plan back automatically.'
  actions:
  - kind: wait_for
    target: No plans in this group yet
  - kind: click
    target: + Add a plan in the editor
    must_succeed: true
    note: opens the single-plan editor at /program/10008/new/?group=<id>
  - kind: wait_for
    target: Define boundaries
    seconds: 20
    must_succeed: true
    note: the single-plan editor, area-definition section open by default
  - kind: click
    target: aria:toggle Service delivery
    must_succeed: false
    note: turn on the Service-delivery layer in the editor's LAYERS panel
  - kind: hold
    seconds: 3
    note: the plan UI, scoped to this study
  features:
  - id: editor-from-study
    description: “+ Add a plan in the editor” on a study opens the polished single-plan
      editor (review.html) scoped to that study via ?group=<id>
    verify: 'Playwright: from /group/<id>/manage/ click ''+ Add a plan in the editor'';
      assert URL is /program/10008/new/?group=<id> and the ''Define boundaries'' section
      renders open'
  - id: editor-files-into-study
    description: A plan created in the study-scoped editor is filed into the study
      automatically (group_id sent on create)
    verify: 'pytest: POST plan/create with group_id=<id> creates the plan and adds
      it to PlanGroupRecord.plan_ids'
- persona: maya
  title: Maya sees the programme covered all of Attakar
  narrative: In the editor she opens the map's LAYERS, switches on the Service delivery
    layer and points it at the Kaura CHC opportunity — hundreds of delivery visits
    blanket the whole of Attakar, showing the programme worked the entire ward, not
    a corner of it. That saturation is why the whole ward is the honest survey unit.
  full_page: false
  show: In the single-plan editor Maya picks the Kaura CHC opportunity for the Service
    delivery layer; its visits saturate the entire Attakar ward on the map.
  concept_claim: Inside the plan editor, the Kaura CHC opp's service-delivery visits
    saturate the WHOLE of Attakar — ward-wide delivery is why the entire ward is the
    honest survey unit.
  provenance: S13
  design_intent: 'Bet: the planner chooses the intervention ward from where the programme
    actually delivered, and ward-wide saturation is what justifies surveying the whole
    ward — so the delivery map, opened right inside the plan editor, is where she
    starts.'
  actions:
  - kind: wait_for
    target: Define boundaries
  - kind: click
    target: Pick opportunities
    must_succeed: false
    note: open the opportunity picker
  - kind: wait_for
    target: css:[data-testid=sd-opp-10010]
    seconds: 10
    must_succeed: false
    note: wait for the Alpine opp list to render before clicking the row
  - kind: click
    target: css:[data-testid=sd-opp-10010]
    must_succeed: false
    note: select the Kaura CHC service-delivery opp (10010, same programme)
  - kind: click
    target: Done
    must_succeed: false
    note: close the opportunity picker
  - kind: click
    target: testid:sd-show
    must_succeed: false
    note: Show service delivery points; the map flies to Attakar where the programme
      worked
  - kind: hold
    seconds: 6
    note: the delivery cloud saturates the whole Attakar ward
  features:
  - id: service-delivery-layer-in-editor
    description: The single-plan editor's map exposes a Service-delivery layer that
      renders a chosen opportunity's delivery visits
    verify: 'Playwright: in /new/ open LAYERS, toggle ''Service delivery'', pick the
      Kaura CHC opp, click ''Show service delivery points''; assert delivery points
      render on the map'
  - id: service-delivery-ward-wide
    description: The Kaura CHC opp (10010, same programme) renders delivery visits
      that cover the whole Attakar ward
    verify: 'pytest/HTTP: POST preview_service_delivery {opp_ids:[10010]} returns
      status ok with ~435 points whose bbox falls inside the Attakar polygon'
- persona: maya
  title: Maya compares the surrounding wards to find a control
  narrative: With Attakar tagged the intervention arm, Maya does not just eyeball a
    neighbour for the control. She switches the plan to sampling mode and clicks
    "Compare surrounding boundaries". The tool finds every ward that shares a border
    with Attakar, measures each one's local building-density distribution, and ranks
    them by how closely that distribution overlaps Attakar's - filling each candidate's
    boundary on the map in its own colour so she can see which ward is which.
  full_page: false
  show: In sampling mode Maya clicks "Compare surrounding boundaries"; a ranked table
    fills in below the map - each bordering ward with its density-overlap percentage,
    a shared-axis distribution chart, and a colour-matched fill on the map.
  concept_claim: With Attakar tagged intervention, "Compare surrounding boundaries"
    ranks every bordering ward by how much its building-density distribution overlaps
    Attakar's (best match first) and fills each candidate on the map in its row colour,
    so the control is chosen from evidence rather than picked by name.
  provenance: S13
  design_intent: 'Bet: a fair control is found by comparing the surrounding wards''
    settlement-density distributions against the intervention''s - surfaced as a ranked,
    on-map comparison - instead of picking an adjacent ward by name.'
  actions:
  - kind: click
    target: css:#btn-area-admin
    must_succeed: false
    note: Boundaries tab
  - kind: fill
    target: css:.mp-ab-search
    value: Attakar
    must_succeed: false
    note: the covered ward
  - kind: wait_for
    target: css:.mp-ab-results button
    seconds: 10
    must_succeed: false
    note: the debounced ward search returns a result button before we can click it
  - kind: click
    target: css:.mp-ab-results button
    must_succeed: false
    note: select Attakar - appears in the left rail tagged intervention
  - kind: click
    target: css:#btn-mode-sampling
    must_succeed: false
    note: sampling mode - arm pills and the Compare button appear
  - kind: wait_for
    target: css:.mp-ab-compare
    seconds: 8
    must_succeed: false
    note: the Compare button only un-hides once an intervention ward is selected in
      sampling mode
  - kind: click
    target: css:.mp-ab-compare
    must_succeed: false
    note: Compare surrounding boundaries - rank the neighbours by density overlap
  - kind: wait_for
    target: best match first
    seconds: 150
    must_succeed: false
    note: wait for the ranking to finish — the header flips from "Processing N…" to
      "best match first" only when every neighbour has been scored
  - kind: hold
    seconds: 4
    note: neighbours ranked best-match-first, each coloured on the map
  features:
  - id: compare-surrounding-boundaries
    description: In sampling mode, with an intervention ward selected, "Compare surrounding
      boundaries" ranks every same-level ward that borders it by the overlap of their
      per-building (k-NN) density distributions, streaming a best-match-first table below
      the map and colour-filling each candidate's boundary to match its row
    verify: 'Playwright: in /new/ sampling mode select Attakar then click .mp-ab-compare;
      assert a ranked table appears with an overlap percentage per neighbour and each
      candidate boundary is filled on the map in its row colour'
- persona: maya
  title: Maya rejects the closest match and adds the right control
  narrative: The tightest density match is Zankan - but Maya knows the programme worked
    Zankan the previous cycle, so it cannot serve as a clean, un-treated control. She
    passes over it and takes Gura, the next-closest neighbour the programme never
    touched. One click of "Add boundary" on Gura's row drops it into the plan as the
    control arm. Both wards now sit in the one plan, each carrying its arm.
  full_page: false
  show: Maya reads the ranked table, skips the top row (Zankan - already the programme's
    ward) and clicks "Add boundary" on Gura; Gura joins the left rail as the control arm
    beside Attakar, each with its Interv / Control pill.
  concept_claim: The comparison ranks Zankan tightest, but Maya rejects it because the
    programme already ran there - a clean control must be un-treated - and clicks "Add
    boundary" on Gura, the closest un-served neighbour, which joins the same plan tagged
    control. One plan now carries both study arms.
  provenance: S13
  design_intent: 'Bet: the tool ranks comparability, but the planner applies the constraint
    it cannot know - a control must be a ward the programme did not treat - and one click
    on the chosen row adds that ward as the control arm.'
  actions:
  - kind: hold
    seconds: 2
    note: Zankan tops the table but it was last cycle's intervention ward - not a clean control
  - kind: wait_for
    target: 'css:.mp-ab-addbnd[data-name="Gura"]'
    seconds: 8
    must_succeed: false
    note: Gura's row carries an Add-boundary button once the ranking is scored
  - kind: click
    target: 'css:.mp-ab-addbnd[data-name="Gura"]'
    must_succeed: false
    note: Add boundary on Gura - the closest un-served neighbour - as the control arm
  - kind: hold
    seconds: 3
    note: Attakar (intervention) and Gura (control) both in one plan, each with its arm pill
  features:
  - id: add-control-from-comparison
    description: Each row in the surrounding-ward comparison has an "Add boundary" button
      that adds that ward to the plan as the control (comparison) arm, reflecting the live
      selection (it shows "added" only while the ward is actually in the plan)
    verify: 'Playwright: click .mp-ab-addbnd for Gura in the comparison table; assert Gura
      appears in the left-rail selected list tagged comparison and its row flips to the
      "added" state'
  - id: two-arm-boundaries-one-plan
    description: Boundaries mode lets the planner hold multiple admin boundaries in ONE
      plan and tag each with its study arm via an Interv / Control pill in the left rail
    verify: 'Playwright: in /new/ with Attakar (intervention) and Gura (control) selected,
      assert both appear in the left-rail selected list each with an Interv/Control arm
      pill and #stat-areas-drawn reads 2'
  - id: arm-tag-per-boundary
    description: Each selected boundary carries its own arm (intervention/comparison) set
      in the left rail; the arm flows onto that ward's work areas labs-side so future
      analysis can tell the arms apart, but is kept out of the FLW-facing case properties
      so the LLO/field never see it
    verify: 'pytest: collectArmAreas tags Attakar=intervention, Gura=comparison on one
      plan; each work area stores its arm labs-side while case_properties (and the
      displayed CSV) carry no arm column'
- persona: maya
  title: Maya generates the two-arm plan in place
  narrative: 'She sets the sampling methodology — size-balanced PSU bands and a building-footprint-size
    filter — and clicks Generate plan. In one action the editor draws the sample for
    both arms and creates the plan in place: no reload, the page becomes the plan''s
    own review map, work areas and KPIs and all, already filed into the study.'
  show: In Sampling mode Maya clicks ‘Generate plan’; the editor samples both arms
    and creates the single plan in place — the page becomes the plan's review map
    with work areas and KPIs, filed into the study.
  concept_claim: With the methodology set (size-balance bands + footprint-size filter),
    ‘Generate plan’ samples both arms in one action and creates the single two-arm
    plan in place (no reload) — the editor becomes the plan's review map, work areas
    and KPIs shown, the plan already in the study.
  provenance: S7
  design_intent: 'Bet: a two-arm plan should be selected, sampled, and reviewed in
    one continuous editor — ‘Generate plan’ draws both arms from one shared methodology
    and creates the plan in place (create-in-place) so the planner never loses context
    and the arms are comparable by construction.'
  actions:
  - kind: click
    target: css:#btn-mode-sampling
    must_succeed: false
    note: a sampling study, not coverage
  - kind: scroll_to
    target: css:#sampling-config
  - kind: hold
    seconds: 1
    note: PSUs + building-footprint-size filter — one methodology for both arms
  - kind: click
    target: css:#btn-generate-sample
    must_succeed: true
    note: ‘Generate plan’ — samples both arms and creates the plan in place
  - kind: wait_for
    target: Regenerate plan
    seconds: 150
    must_succeed: true
    note: 'create-in-place: sampling BOTH arms (two Overture fetches + PPS) creates the
      plan and flips the button Generate → Regenerate; that label is the visible
      terminal signal (the page <title> "Microplan review" is not body text)'
  - kind: wait_for
    target: Work areas
    seconds: 20
  - kind: hold
    seconds: 6
    note: both arms' sampled work areas + KPIs on one map, filed into the study
  features:
  - id: generate-plan-in-place
    description: '''Generate plan'' samples both arms and creates the single plan
      via POST /plan/create/ with group_id, hydrating the plan''s review page in place
      (create-in-place, no reload)'
    verify: 'Playwright: click ''#btn-generate-sample''; assert one plan is created
      with both arms, the URL becomes /plan/<id>/review/, work areas render, and the
      button flips to ''Regenerate plan'''
  - id: sampling-methodology
    description: Both arms sample from one methodology — size-balance bands + a building-footprint-size
      (area_min_m2/area_max_m2) filter — applied in the same Generate
    verify: 'pytest: the created plan''s sampling_config carries size_balance_bands>=2
      and area_min_m2/area_max_m2, and per-arm sampling_stats are stored for both
      arms on the one plan'
- persona: maya
  title: Maya validates the two arms on the one plan
  narrative: On the plan's review page the comparability panel now shows both arms
    side by side — Interv. vs Control on buildings, area, and settlement density —
    with a matched / not-matched flag and the reason if they diverge. Both arms sit
    on one map coloured by arm. Maya reads it and satisfies herself the control is
    a fair counterfactual, all within the single plan.
  viewport:
    width: 1440
    height: 900
  show: 'On the single plan''s review page Maya opens Sample details: a comparability
    table compares the intervention and control arms on buildings, area, and density
    with a matched / not-matched badge, both arms painted on one map by their arm
    colour.'
  concept_claim: Because the plan holds two arms, its review page renders a comparability
    panel comparing intervention vs control on buildings, area, and settlement density
    with a matched / not-matched flag — so Maya validates the control is a fair counterfactual
    without leaving the plan.
  provenance: S8
  design_intent: 'Bet: validation belongs on the plan that holds both arms — one comparability
    panel over the two arms'' sampled settlements lets the planner judge the counterfactual
    in place; the flag informs the call, the planner makes it.'
  actions:
  - kind: wait_for
    target: Regenerate plan
    seconds: 20
    must_succeed: true
    note: still on the create-in-place review page (carry-through) — the Regenerate
      button is the visible marker it loaded
  - kind: click
    target: Sample details
    must_succeed: false
    note: open the sample-details panel
  - kind: wait_for
    target: Control
    seconds: 10
    must_succeed: false
    note: the comparability table renders Interv./Control columns
  - kind: hold
    seconds: 3
    note: buildings, area, density per arm + a matched / not-matched badge
  - kind: hold
    seconds: 4
    note: both arms painted on one map by arm colour — intervention green, control
      blue
  features:
  - id: in-plan-arm-comparability
    description: 'When a plan has two arms, the review page''s Sample details renders
      a comparability table (Interv vs Control: buildings, area km², density /km²)
      with a matched / not-matched badge and a reason when they diverge'
    verify: 'Playwright: open a two-arm plan''s review page, open ''Sample details'';
      assert a comparability table shows Interv./Control columns and a ''matched''
      or ''not matched'' badge'
  - id: both-arms-one-map
    description: The single plan's map paints both arms by colour (intervention green,
      comparison blue) so the two arms are seen together in real geography
    verify: 'Playwright: assert the plan review map paints work areas in both the
      intervention and comparison arm colours'
- persona: maya
  title: Maya completes the study
  narrative: Satisfied, Maya advances the plan through its lifecycle from the program
    workspace — Submit for review, then Approve. The study is one balanced two-arm
    plan. Each work area carries its arm labs-side so future analysis can tell intervention
    from control — but the arm is never shown to the LLO or field and is kept out
    of the Connect-facing work-area properties, so the people running the survey stay
    blind while the design keeps its arms.
  show: 'From the program workspace Maya advances the two-arm plan: Submit for review,
    then Approve. Each work area keeps its arm labs-side for analysis, but neither
    the UI nor the Connect-facing export shows it — so the field never sees which
    ward is which arm.'
  concept_claim: Maya advances the single two-arm plan draft → in_review → approved
    from the workspace, completing a balanced study. Each work area stores its arm
    labs-side so future analysis can distinguish the arms, while the arm is kept off
    the LLO/field-facing surfaces (UI + Connect case properties) — so the study stays
    blind to the field yet carries its arms forward.
  provenance: S14
  design_intent: 'Bet: completing the study is approving the one plan that holds both
    arms; blinding is a display choice, not data loss — each work area keeps its arm
    labs-side for analysis, while the LLO/field-facing surfaces never show it.'
  actions:
  - kind: wait_for
    target: Planning
    seconds: 20
    must_succeed: false
    note: the program workspace lifecycle columns
  - kind: click
    target: Submit for review
    must_succeed: false
    note: draft → in_review
  - kind: hold
    seconds: 1
  - kind: click
    target: Approve
    must_succeed: false
    note: in_review → approved
  - kind: hold
    seconds: 2
    note: the two-arm plan is approved — the study is complete
  - kind: hover
    target: Connect CSV
    must_succeed: false
    note: 'tooltip: arm kept off the field-facing export — blind to the LLO/field'
  - kind: hold
    seconds: 2
    note: the field-facing file hides the arm; the work-area record keeps it labs-side
      for analysis
  features:
  - id: plan-lifecycle-complete
    description: From the program workspace the planner advances the two-arm plan
      draft → in_review ('Submit for review') → approved ('Approve')
    verify: 'pytest: program_plan_transition moves the plan draft -> in_review ->
      approved; the workspace reflects the approved state'
  - id: arm-carried-blind-to-field
    description: Each work area stores its study arm labs-side (WorkAreaPayload.arm)
      so future analysis can tell intervention from control; the arm is deliberately
      kept out of the FLW-facing case_properties and the displayed export, so the
      LLO/field never see it
    verify: 'pytest: each sampling WorkArea stores arm (intervention/comparison) labs-side;
      WorkAreaPayload.arm is NOT in case_properties and the Connect CSV headers carry
      no Arm column'
