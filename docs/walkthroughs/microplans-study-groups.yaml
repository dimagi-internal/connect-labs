  design_intent: 'Bet: a fair control is found by comparing the surrounding wards'' settlement-density
    distributions against the intervention''s - surfaced as a ranked, on-map comparison - instead of picking
    an adjacent ward by name.'
  features:
  - description: In sampling mode, with an intervention ward selected, "Compare surrounding boundaries"
      ranks every same-level ward that borders it by the overlap of their per-building (k-NN) density
      distributions, streaming a best-match-first table below the map and colour-filling each candidate's
      boundary to match its row
    id: compare-surrounding-boundaries
    verify: 'Playwright: in /new/ sampling mode select Attakar then click .mp-ab-compare; assert a ranked
      table appears with an overlap percentage per neighbour and each candidate boundary is filled on
      the map in its row colour'
  full_page: false
  narrative: 'She tags Attakar as the intervention arm and runs Compare. Every neighbouring ward is ranked
    against it — but look at what the table shows. Match is how similar the two wards look overall. The
    column that matters is Matched balance: if Maya picks this ward as her control and lets the engine
    match-sample it, how balanced the two arms actually come out — the very number her study''s comparability
    check will report. And Common support is how much of the settlement-density range the two wards share,
    because matching only draws from that shared range. So a ward that''s only a partial overall match
    can still deliver a perfectly balanced study.'
