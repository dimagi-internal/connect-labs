name: microplans-study-groups
narrative: 'Maya is setting up a controlled rooftop-survey impact study, and she doesn''t yet know which wards she''ll use — she knows where the program worked, not the ward names a paste-list would want.
  So she starts an empty study and works off the map: she opens the "add wards from map" view, turns on the service-delivery layer to see where the program actually reached the ground, and clicks two neighbouring
  wards straight off the boundaries — the one the program covered and a comparable neighbour. One action creates a plan for each ward and drops her back on the study, where she marks which ward is the intervention
  and which is the control — an assignment that lives only on the study, never on the wards themselves. Then a single bulk action samples both wards on one shared configuration and the study fills with
  sampling sites and work areas. She opens each ward on its own map to understand it, then pulls both arms onto one map to see them side by side. Finally she reads the comparability panel, satisfies herself
  the two arms are close enough on the attributes that matter, and completes the study — a blind, balanced two-arm design built from the map, each ward ready to export arm-free to its own Connect opportunity.'
base_url: https://labs.connect.dimagi.com
auth:
  type: session
why_brief: ../../.canopy/ddd/runs/microplans-study-groups-2026-06-05-001/why_brief.yaml
narrative_locked: true
personas:
  maya:
    name: Maya
    role: Program study planner
    color: '#7C3AED'
    intro: Maya plans a controlled rooftop-survey impact study for the program and needs two comparable arms that field surveyors execute completely blind.
scenes:
- persona: maya
  title: Maya starts a study from scratch
  url: /microplans/program/133/
  show: From the program portfolio Maya starts a brand-new two-arm study, names it, and lands on an empty study with no wards in it yet.
  concept_claim: Maya creates an empty named study from scratch and lands on its page ready to add wards, before committing any ward names.
  provenance: S12
  design_intent: 'Bet: a study should start as an empty container the planner fills from the map, not a list of names committed up front.'
  actions:
  - kind: wait_for
    target: Plan groups & studies
  - kind: scroll_to
    target: + New study
  - kind: click
    target: + New study
    note: open the inline new-study form
    must_succeed: true
  - kind: fill
    target: css:input[placeholder='Untitled study']
    value: Kano CHC rooftop impact study
    note: name the study
  - kind: press
    value: Enter
    note: creating the study navigates to its empty manage page (/group/<new_id>/manage/)
  - kind: wait_for
    target: No plans in this group yet
    seconds: 20
    must_succeed: true
    note: 'terminal state: the empty study page'
  - kind: hold
    seconds: 1.5
  features:
  - id: new-study-create
    description: '''+ New study'' names and creates an empty study (DEFINING, 0 plans) and routes to its manage page'
    verify: 'Playwright: click ''+ New study'', fill name, submit; assert URL is /program/133/group/<id>/manage/ and the page shows ''No plans in this group yet'''
- persona: maya
  title: Maya picks two wards off the delivery map
  full_page: false
  show: On the empty study Maya opens "Add wards from map", turns on the service-delivery layer to see where the program delivered, and clicks two neighbouring wards on the map — the covered ward and a
    comparable neighbour — softly highlighting each.
  concept_claim: Maya turns on the program's service-delivery points and selects two admin boundaries straight off the map as the study's two wards.
  provenance: S13
  design_intent: 'Bet: the planner knows where the program delivered, not the ward names — so the delivery map is where she should choose the study''s wards, picking more than one boundary in a single view.'
  actions:
  - kind: wait_for
    target: No plans in this group yet
  - kind: click
    target: + Add wards from map
    note: open the study-scoped map bulk-picker
    must_succeed: true
  - kind: wait_for
    target: Back to study
    seconds: 20
    must_succeed: true
  - kind: hold
    seconds: 5
    note: map + Boundaries layer auto-load over the program footprint; country auto-detects
  - kind: click
    target: aria:toggle Service delivery
    note: open the delivery-points picker
    must_succeed: false
  - kind: hold
    seconds: 1
  - kind: click
    target: css:[data-testid=sd-opp-10007]
    note: select the demo opportunity (Madobi Ward, Kano — Service Delivery Demo, opp 10007)
    must_succeed: true
  - kind: click
    target: css:#sd-picker .sd-show
    note: show its service-delivery points; the map flies to where the program worked
    must_succeed: false
  - kind: hold
    seconds: 6
    note: delivery footprint on the map at Madobi/Kano
  - kind: fill
    target: css:.mp-ab-search
    value: Madobi
    note: find the intervention ward
    must_succeed: true
  - kind: wait_for
    target: Madobi · Locality / Ward
    seconds: 20
    must_succeed: true
  - kind: click
    target: Madobi · Locality / Ward
    note: select the covered ward
    must_succeed: true
  - kind: wait_for
    target: 1 ward selected
    seconds: 10
    must_succeed: true
  - kind: fill
    target: css:.mp-ab-search
    value: Kauran Mata
    note: find a comparable neighbour ward
    must_succeed: true
  - kind: wait_for
    target: Kauran Mata · Locality / Ward
    seconds: 20
    must_succeed: true
  - kind: click
    target: Kauran Mata · Locality / Ward
    note: select the control ward
    must_succeed: true
  - kind: wait_for
    target: 2 wards selected
    seconds: 10
    must_succeed: true
  - kind: hold
    seconds: 4
    note: two wards selected on the delivery map; 'Create 2 plans' enabled
  features:
  - id: add-from-map-entry
    description: '''+ Add wards from map'' opens a study-scoped full-page map (service-delivery overlay + admin-boundaries multi-select)'
    verify: 'Playwright: from /group/<id>/manage/ click ''+ Add wards from map''; assert URL is /group/<id>/add-from-map/ and a mapboxgl canvas + Layers panel render'
  - id: multi-boundary-select
    description: The map lets the planner select more than one admin boundary; the footer counts 'N wards selected'
    verify: 'Playwright: select two boundaries; assert the footer reads ''2 wards selected'' and the Create button enables'
  - id: service-delivery-multi-opp
    description: One or more opportunities' service-delivery points render as visual context (reused ServiceDeliveryLayer)
    verify: 'Playwright: enable a ''Service delivery'' opp; assert delivery points render on the map'
- persona: maya
  title: Maya creates the plans and lands back on the study
  show: Maya clicks "Create plans" and one action files a plan for each selected ward into the study, dropping her back on the study page with both wards listed — one plan, one Connect opportunity per ward
    — still awaiting samples.
  concept_claim: One action creates a boundary-only plan per selected ward and returns Maya to the study, now listing both wards as members, one plan and one Connect opportunity per ward.
  provenance: S3
  design_intent: 'Bet: the executable unit is one ward = one plan = one opportunity, so the map''s multi-selection fans out into one plan per ward, assembled into the study.'
  url: /microplans/program/133/group/3635/manage/
  actions:
  - kind: wait_for
    target: Madobi ward
    seconds: 20
    must_succeed: true
    note: the study now lists both wards as members
  - kind: scroll_to
    target: Kauran Mata ward
  - kind: hold
    seconds: 1.5
    note: one plan + one Connect opportunity per ward
  features:
  - id: bulk-create-into-study
    description: Create plans files one boundary-only plan per selected boundary into the study and returns to the study manage page
    verify: 'pytest: POST group/<id>/bulk_create_from_boundaries with N boundaries creates N boundary-only plans (phase ''boundary'', no work areas, no arm) all in group.plan_ids'
  - id: one-opp-per-plan
    description: Each member plan is one ward and exports to its own Connect opportunity
    verify: 'Playwright: assert each ward row exposes a ''Connect CSV'' link to /program/133/plan/<id>/work_areas.csv'
- persona: maya
  title: Maya marks which ward got the program
  show: Back on the study, Maya marks Madobi as the intervention and Kauran Mata as the control using the per-ward arm picker — an assignment she sets by hand that lives only on the study, never on the
    wards' own plans.
  concept_claim: Maya assigns each ward's arm by hand on the study, and the arm lives only on the study group, never on the ward's own plan or work areas.
  provenance: S11
  design_intent: 'Bet: keeping the arm a deliberate planner choice stored only on the group keeps the executable plan blind by construction — there is nothing to strip at export.'
  actions:
  - kind: wait_for
    target: Two-arm controlled study
    seconds: 20
  - kind: scroll_to
    target: Arm
  - kind: select
    target: css:select
    value: intervention
    note: first ward's arm picker — mark it the intervention
  - kind: hold
    seconds: 1.5
    note: hold on the arm column so the manual assignment reads
  features:
  - id: arm-select-manual
    description: Per-plan arm picker on the study page sets intervention/control, persisted on the group's arms map (labs-side only)
    verify: 'pytest: POST group update with arms={plan_id: ''intervention''} persists on PlanGroupRecord.arms; PlanRecord carries no arm'
  - id: arm-on-group-only
    description: Arm assignment is stored on the group, not on the plan or its work areas
    verify: 'pytest: after assignment, assert PlanRecord and each WorkArea expose no arm field'
- persona: maya
  title: Maya samples both wards at once
  show: With both wards in the study, Maya runs one Generate samples action and the empty study fills — each ward flips to sampled with its sampling sites and work areas, drawn on a single shared configuration.
  concept_claim: Maya samples both wards with one action on one shared configuration, and each ward flips to sampled with its work-area count.
  provenance: S7
  design_intent: 'Bet: comparability starts at sampling — one shared configuration means differences between the arms reflect the wards, not the method.'
  actions:
  - kind: wait_for
    target: Re-generate samples
    seconds: 20
    must_succeed: false
  - kind: scroll_to
    target: Re-generate samples
  - kind: hover
    target: Re-generate samples
    note: the single action that samples every member ward identically on one shared config
  - kind: scroll_to
    target: Work areas
  - kind: hold
    seconds: 2
    note: both wards read sampled with their work-area counts (399 / 302)
  features:
  - id: group-generate-samples
    description: A single 'Generate samples' action samples every boundary-phase member plan using the study's one shared sampling_config
    verify: 'pytest: POST group/<id>/generate flips every boundary-phase member plan to phase ''sampled'' using group.sampling_config'
  - id: shared-sampling-config
    description: All member plans sample from one shared sampling_config stored on the study
    verify: 'pytest: assert every member plan''s sample was drawn from the same sources/confidence/target in group.sampling_config'
- persona: maya
  title: Maya studies each ward on its own map
  url: /microplans/program/133/plan/3636/review/
  full_page: false
  show: Maya opens the intervention ward on its own review map to understand its sampled sites and work areas before judging it against the other arm.
  concept_claim: Maya opens a single ward on its own review map to see its sampled sites and work areas in detail.
  provenance: S6
  design_intent: 'Bet: a planner needs to understand each arm on its own before comparing them, so each ward has its own full review map.'
  actions:
  - kind: wait_for
    target: Microplan review
    seconds: 20
    must_succeed: true
  - kind: hold
    seconds: 12
    note: high-zoom satellite tiles are slow to load in headless — give them time before the viewport capture
  features:
  - id: per-plan-review-map
    description: Each ward has its own review page with a map of its sampled work areas plus grouping and worker-assignment controls
    verify: 'Playwright: open /plan/3636/review/; assert a mapboxgl canvas renders and the page reads ''Microplan review'''
- persona: maya
  title: Maya sees both arms together
  url: /microplans/program/133/group/3635/map/
  full_page: false
  show: Maya pulls both wards onto one read-only map, each coloured by its arm, and opens the Inspect panel to confirm which plan and arm each area belongs to.
  concept_claim: Maya sees both study arms overlaid on one read-only map coloured by arm, and opens an inspector that names each ward's plan and arm.
  provenance: S6
  design_intent: 'Bet: seeing intervention and control side by side in real geography lets a planner sanity-check comparability before completing.'
  actions:
  - kind: wait_for
    target: View-only
    seconds: 20
    must_succeed: true
  - kind: wait_for
    target: intervention
    note: arm legend rendered
  - kind: hold
    seconds: 12
    note: high-zoom satellite tiles + arm layers are slow in headless — give them time before the viewport capture
  - kind: click
    target: INSPECT
    note: open the inspector that names each area's plan and arm
    must_succeed: false
  - kind: hold
    seconds: 2
  features:
  - id: multi-plan-overlay-map
    description: View-only group map overlays every member plan's boundary and work areas on one Mapbox map, coloured by arm
    verify: 'Playwright: open /group/<id>/map/; assert a mapboxgl canvas renders and the legend shows each ward with its arm'
  - id: map-inspect-panel
    description: An Inspect panel on the group map names each work area's plan and arm
    verify: 'Playwright: open the group map, click ''INSPECT''; assert the panel lists each ward with its arm'
- persona: maya
  title: Maya checks the control is a fair counterfactual
  url: /microplans/program/133/group/3635/manage/
  viewport:
    width: 1440
    height: 900
  show: Back on the study, Maya reads the comparability panel — her control comes back within tolerance on settlement density, the one thing a matched study can't fix afterward, while building stock is
    flagged to adjust for during analysis.
  concept_claim: Maya's comparability check reports the intervention and control within tolerance on settlement density, the axis the verdict gates on, and flags building stock to adjust for at analysis.
  provenance: S8
  design_intent: 'Bet: gating the verdict only on what a matched design can''t fix after the fact, and reporting the rest as objective data to adjust for, keeps the planner making the call.'
  actions:
  - kind: wait_for
    target: ARM COMPARABILITY
    seconds: 20
    must_succeed: true
  - kind: scroll_to
    target: ARM COMPARABILITY
  - kind: wait_for
    target: within tolerance
  - kind: scroll_to
    target: DECIDES THE VERDICT
  - kind: hold
    seconds: 2
    note: settlement density is the gating axis
  - kind: scroll_to
    target: ADJUSTED AT ANALYSIS
  - kind: hold
    seconds: 2
    note: PSU size and building footprint are advisory, adjust-at-analysis
  features:
  - id: arm-comparability-psu
    description: Comparability panel computes standardized mean differences on the selected survey sites for settlement density, PSU size, and building footprint, each with a balance band
    verify: 'pytest: arm_comparability_psu returns per-metric SMD + bands and a ''matched'' verdict gated on settlement density + PSU size'
  - id: comparability-gating-split
    description: Panel splits the headline-gating metric (settlement density) from advisory adjust-at-analysis flags (PSU size, building footprint)
    verify: 'Playwright: assert the panel shows ''DECIDES THE VERDICT'' for settlement density and ''ADJUSTED AT ANALYSIS'' for PSU size and building footprint'
- persona: maya
  title: Maya completes the study
  show: Satisfied the two arms are close enough, Maya completes the study — a blind, balanced two-arm design, each ward ready to export arm-free to its own Connect opportunity, with no arm column for the
    field to bias on.
  concept_claim: Maya completes the comparable study, leaving a blind two-arm design where each ward exports to its own Connect CSV with no arm column.
  provenance: S14
  design_intent: 'Bet: completing the study is the planner''s sign-off, and the export is blind by construction — the arm is shown for planning but never written to the field file.'
  actions:
  - kind: scroll_to
    target: Connect CSV is blind
  - kind: wait_for
    target: arm-free work-area file
  - kind: hover
    target: Connect CSV
    note: 'tooltip: ''one opportunity per plan; arm never included'''
    must_succeed: false
  - kind: hold
    seconds: 2
    note: the planning page shows the arm, but the export is arm-free — blind by construction
  features:
  - id: complete-study-lifecycle
    description: The planner advances the study's plans past draft (draft -> in_review -> approved) once comparability is confirmed
    verify: 'pytest: program_plan_transition moves a plan draft -> in_review -> approved; the study reflects the advanced state'
  - id: blind-claim-observable
    description: The study page states the export is blind and labels each Connect CSV as arm-free
    verify: 'Playwright: assert the page shows ''Connect CSV is blind'' and each ''Connect CSV'' link title contains ''arm never included'''
