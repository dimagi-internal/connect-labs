name: microplans-study-groups
narrative: Maya wants to start a brand-new two-arm study, so she creates a new study
  on her existing Kaura programme. On the empty study Maya clicks “+ Add a plan in
  the editor”, and in the plan UI she turns on the service-delivery data for the opportunity
  she's building the study around — the existing Kaura CHC opp. In the editor she
  opens the map's LAYERS, switches on the Service delivery layer and points it at
  the Kaura CHC opportunity — hundreds of delivery visits blanket the whole of Attakar,
  showing the programme worked the entire ward.  So she plans to use Administrative
  boundaries -- wards -- as the survey unit. Maya clicks on Attakar to select it and
  tags it as the intervention arm. Maya switches the plan to sampling mode and clicks
  "Compare surrounding boundaries". The tool finds every ward that shares a border
  with Attakar, measures each one's local building-density distribution, and ranks
  them by how closely that distribution overlaps Attakar's - filling each candidate's
  boundary on the map in its own colour so she can see which ward is which. The tightest
  density match is Zankan - but Maya knows the programme worked Zankan the previous
  cycle, so it cannot serve as a clean, un-treated control. She passes over it and
  takes Gura, the next-closest neighbour the programme never touched. One click of
  "Add boundary" on Gura's row drops it into the plan as the control arm. Both wards
  now sit in the one plan, each carrying its arm. She sets the sampling methodology
  — size-balanced PSU bands and a building-footprint-size filter — and clicks Generate
  plan. In one action the editor draws the sample for both arms and creates the plan.
  On the plan's review page the comparability panel now shows both arms side by side
  — Interv. vs Control on buildings, area, and settlement density — with a matched
  / not-matched flag and the reason if they diverge. Both arms sit on one map coloured
  by arm. Maya reads it and satisfies herself the control is a fair counterfactual,
  all within the single plan. Maya advances the plan through its lifecycle from the
  program workspace — Submit for review, then Approve. The study is one balanced two-arm
  plan. Each work area carries its arm labs-side so future analysis can tell intervention
  from control — but the arm is never shown to the LLO or field and is kept out of
  the Connect-facing work-area properties, so the people running the survey stay blind
  while the design keeps its arms.
