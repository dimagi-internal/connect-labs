name: campaign-utility-tool
tagline: Run a national vaccination campaign from one command center
base_url: https://labs.connect.dimagi.com
auth:
  type: session
narrative: >-
  Amara runs Nigeria's national measles–rubella campaign, and she opens the Campaign
  Utility Tool to her command center: one screen where the whole campaign's funding,
  enrolment, attendance, verification and payment progress are already current. She
  moves to payments to release this week's worker pay, and the tool stops her on a
  worker it won't let her pay — his identity verification was rejected — so she opens
  his KYC, sees the duplicate national-ID flag behind it, and holds him instead of
  paying. She drops into a state's microplan to check planned-versus-actual workforce
  and budget before she releases more funds, then opens Reporting and reads coverage
  straight off a map of Nigeria shaded by reach, and exports the week's numbers as a
  CSV for the donor. Before she closes out she opens one worker and confirms what she's
  been acting on is a real CommCare case on a real ward — not a mock — sees the campaign
  holds every state in the country, and checks the audit log that recorded every payment
  and verification decision she just made.
personas:
  amara:
    name: Amara
    role: National Campaign Manager
    color: "#3843D0"
    intro: >-
      Amara manages Nigeria's national measles–rubella vaccination campaign and needs
      to see its real-time state and act on payments, verification, planning and
      coverage from one place.
scenes:
  - persona: amara
    title: The campaign at a glance
    url: "/campaign/?campaign=MR-NAT-2026"
    provenance: S1
    narrative: >-
      Amara opens her campaign and the whole thing is already in front of her — funding
      drawn down, enrolment and attendance climbing, verification and payment status
      broken out — so she starts the morning reading where the campaign actually stands
      instead of assembling it.
    concept_claim: >-
      The Overview is a real-time command center: server-computed KPIs over every worker
      (funding, enrolment/attendance/verification/payment progress, KYC + payment donuts).
    design_intent: >-
      Land on a dense-but-legible dashboard; the numbers are real aggregates over the
      national roster, conveying "the whole campaign, live, on one screen".
    show: The national campaign Overview with its KPI cards, progress, and KYC/payment donuts loaded
    features:
      - id: overview-realtime-kpis
        description: "Overview renders server-side KPIs (funding, progress, workforce, KYC/payment donuts) over all workers"
        verify: "Playwright: load /campaign/?campaign=MR-NAT-2026; assert the Overview KPI cards and the KYC/payment donuts render with non-zero values."
    actions:
      - kind: wait_for
        target: Overview
        must_succeed: true
      - kind: hold
        seconds: 4
  - persona: amara
    title: The tool stops an ineligible payment
    provenance: S2
    narrative: >-
      Amara moves to payments to release this week's pay, and the tool stops her on a
      worker it won't let her approve — his identity check came back rejected — so the
      bad payment never leaves.
    concept_claim: >-
      Approving a worker's payment is blocked server-side when the worker has rejected
      KYC or open fraud flags.
    design_intent: >-
      Show the payments queue, then the explicit block when Amara tries to approve an
      ineligible worker — the guard fires at the moment of approval, not after.
    show: Amara opens Workers → Payments and the fraud guard blocks approving a flagged/failed-KYC worker
    features:
      - id: payment-fraud-guard
        description: "Payment approval is refused for workers with rejected KYC or fraud flags (server-enforced)"
        verify: "Playwright: in Workers -> Payments, attempt to approve a worker with rejected KYC; assert the approval is blocked with a guard message and the status does not change."
    actions:
      - kind: click
        target: "Workers"
        must_succeed: true
      - kind: wait_for
        target: "Payments"
      - kind: click
        target: "Payments"
      - kind: hold
        seconds: 3
  - persona: amara
    title: Verification, with the fraud signal attached
    provenance: S3
    narrative: >-
      Amara opens the worker's KYC to see why, and there it is — a duplicate
      national-ID flag tying him to another record — so she holds him instead of paying.
    concept_claim: >-
      KYC review shows verification status, submitted documents, and shared-identifier
      duplicate detection in one view.
    design_intent: >-
      Open the KYC tab and a worker's verification detail; the duplicate/shared-ID flag
      is visible beside the documents, so the hold decision is defensible.
    show: Amara opens Workers → KYC and reviews a worker's verification, documents, and duplicate flag
    features:
      - id: kyc-duplicate-detection
        description: "KYC view surfaces status, documents, and shared-identifier duplicate detection"
        verify: "Playwright: in Workers -> KYC, open a flagged worker; assert verification status, document list, and a duplicate/shared-identifier flag are shown."
    actions:
      - kind: click
        target: "KYC"
        must_succeed: true
      - kind: hold
        seconds: 4
  - persona: amara
    title: Planned versus actual, per area
    provenance: S4
    narrative: >-
      Before she releases more funds Amara drops into a state's microplan and reads the
      planned workforce and budget against what's actually been spent and deployed.
    concept_claim: >-
      Microplanning & Budget shows per-area planned-vs-actual workforce, budget vs spent,
      doses and coverage targets.
    design_intent: >-
      Show the Activity → Microplanning & Budget view with the plan/actual columns, so
      the steer-the-campaign decision is grounded in numbers.
    show: Amara opens Activity → Microplanning & Budget and reads planned-vs-actual workforce and budget
    features:
      - id: microplan-plan-vs-actual
        description: "Per-area microplans track planned vs actual workforce, budget vs spent, doses and coverage targets"
        verify: "Playwright: in Activity -> Microplanning & Budget, assert a per-area row shows planned vs actual workforce and budget vs spent columns."
    actions:
      - kind: click
        target: "Activity"
        must_succeed: true
      - kind: hold
        seconds: 4
  - persona: amara
    title: Coverage, read off the map
    provenance: S5
    narrative: >-
      Amara opens Reporting and reads coverage straight off a map of Nigeria — states
      shaded by how far the campaign has reached, worker locations plotted on top.
    concept_claim: >-
      Reporting includes a geographic coverage map: a region choropleth shaded by reach
      with worker GPS points.
    design_intent: >-
      Open Reporting and the coverage map; the Nigeria choropleth + worker points make
      "are we reaching everyone" answerable at a glance. Give the map time to paint.
    show: Amara opens Reporting and the geographic coverage map of Nigeria (choropleth + worker GPS)
    full_page: false
    features:
      - id: coverage-map
        description: "Coverage map renders a region choropleth (by worker count) plus worker GPS points"
        verify: "Playwright: in Reporting click 'View map'; assert a Mapbox canvas renders with shaded regions and worker GPS points."
    actions:
      - kind: click
        target: "Reporting"
        must_succeed: true
      - kind: wait_for
        target: "View map"
      - kind: click
        target: "View map"
      - kind: hold
        seconds: 6
  - persona: amara
    title: The donor's numbers, exported
    provenance: S5
    narrative: >-
      With coverage in hand Amara exports the week's numbers as a CSV she can hand
      straight to the donor.
    concept_claim: >-
      Reporting exports real CSV reports (and a custom-report builder) for donors.
    design_intent: >-
      Close the map and show the Export / Custom report controls — the report is a real
      download, the funder-facing payoff.
    show: Amara exports a reporting CSV from the Reporting tab
    features:
      - id: reporting-csv-export
        description: "Reporting produces real CSV exports and a custom-report builder"
        verify: "Playwright: in Reporting click 'Export data'; assert a CSV download is triggered (Content-Disposition attachment)."
    actions:
      - kind: hold
        seconds: 3
  - persona: amara
    title: A worker is a real CommCare case
    provenance: S6
    narrative: >-
      Before she closes out, Amara opens one worker and confirms what she's been acting
      on all morning is a real CommCare case on a real ward — name, role, NIN, location —
      not a mock.
    concept_claim: >-
      Each worker is a real CommCare case (read via the Case API) carrying its full
      Worker + KYC field set, placed on real Nigeria geography.
    design_intent: >-
      Open a worker profile showing the case-shaped fields + the real ward/LGA/state,
      conveying the demo == the production read.
    show: Amara opens a worker profile showing the real CommCare-case fields and Nigeria ward/LGA placement
    features:
      - id: worker-is-commcare-case
        description: "Workers are CommCare cases on real AdminBoundary geography, read through the Case API"
        verify: "Playwright: open a worker profile; assert CommCare-case fields (name, role, NIN) and a real ward/LGA/state placement are shown."
    actions:
      - kind: click
        target: "Workers"
        must_succeed: true
      - kind: hold
        seconds: 4
  - persona: amara
    title: The whole country, and it stays fast
    provenance: S8
    narrative: >-
      Amara sees the campaign holds the whole nation — thousands of workers across every
      one of Nigeria's 37 states — and it still moves the moment she filters or pages.
    concept_claim: >-
      The tool holds a national-scale campaign (thousands of workers across all 37 states)
      and stays responsive via a paginated worker list.
    design_intent: >-
      Show the worker roster's scale (count + states) and a fast filter/page interaction,
      proving the single pane of glass holds the real campaign.
    show: Amara filters/pages the national worker roster, showing scale across 37 states stays fast
    features:
      - id: paginated-national-roster
        description: "The worker roster is paginated server-side so a national-scale campaign stays usable"
        verify: "Playwright: in Workers, assert the roster reports a national worker count across 37 states and a filter/page interaction returns quickly."
    actions:
      - kind: hold
        seconds: 4
  - persona: amara
    title: Every decision, on the record
    provenance: S7
    narrative: >-
      Amara closes the morning by opening the audit log and seeing every payment hold and
      verification decision she just made written down, against her name.
    concept_claim: >-
      Every privileged action (payment, KYC, user change) is written to an audit log
      under role-controlled access.
    design_intent: >-
      Open Administration → the audit log showing the morning's actions, conveying the
      tool is an accountable admin surface, not a dashboard.
    show: Amara opens Administration and reviews the audit log of the actions she just took
    features:
      - id: audit-log-rbac
        description: "Privileged actions are recorded to an audit log; access is role-controlled (RBAC)"
        verify: "Playwright: in Administration, assert the audit log lists recent payment/KYC actions with actor and timestamp."
    actions:
      - kind: click
        target: "Administration"
        must_succeed: true
      - kind: hold
        seconds: 4
