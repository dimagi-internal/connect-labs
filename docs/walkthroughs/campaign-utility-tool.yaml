base_url: https://labs.connect.dimagi.com
name: campaign-utility-tool
narrative: 'Amara opens her campaign and the whole picture is already here — funding,
  enrolment, attendance, verification and payment status, in one read. She moves to
  release pay, and the tool blocks a worker whose ID check was rejected — the bad
  payment never leaves. And it''s the whole nation: five thousand workers across all
  37 states, paged through without a stutter. His KYC shows why — a duplicate national-ID
  flag — so she holds him instead of paying. Before releasing more funds she checks
  the microplans: planned budget and workforce against what''s actually been spent.
  The worker she''s been acting on is a real CommCare case on a real ward — name,
  role, NIN, location. Not a mock. In System Administration the audit log holds every
  payment hold and decision she just made, against her name. She ends on the reporting
  board — per-state coverage across all 37 states — and exports the week''s numbers
  for the donor. And the coverage map: every state shaded by reach, every worker''s
  location on top — where the country still needs her.'
narrative_locked: true
narrative_locked_at: '2026-06-21T20:12:06.616066+00:00'
