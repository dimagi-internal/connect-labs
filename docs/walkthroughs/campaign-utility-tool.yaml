  title: Planned versus actual, per area
- actions:
  - kind: click
    must_succeed: true
    target: Workers
  - kind: wait_for
    must_succeed: true
    target: Worker Profiles
  - kind: click
    target: Worker Profiles
  - kind: hold
    seconds: 4
  concept_claim: Each worker is a real CommCare case (read via the Case API) carrying
    its full Worker + KYC field set, placed on real Nigeria geography.
  design_intent: Open the Worker Profiles sub-tab showing the case-shaped fields +
