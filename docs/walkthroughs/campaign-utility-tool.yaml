auth:
  type: session
base_url: https://labs.connect.dimagi.com
name: campaign-utility-tool
narrative: 'Amara runs Nigeria''s national measles-rubella campaign, and she opens
  the Campaign Utility Tool to her command center: one screen where the whole campaign''s
  funding, enrolment, attendance, verification and payment progress are already current.
  She moves to payments to release this week''s worker pay, and the tool stops her
  on a worker it won''t let her pay - his identity verification was rejected - so
  she opens his KYC, sees the duplicate national-ID flag behind it, and holds him
  instead of paying. She drops into the microplans to check planned-versus-actual
  workforce and budget, then opens one worker and confirms what she''s been acting
  on is a real CommCare case on a real ward - not a mock - and sees the campaign holds
  every state in the country. She checks the audit log that recorded every decision
  she just made, and ends on the reporting board - per-state coverage across all 37
  states - exporting the week''s numbers as a CSV for the donor.'
narrative_locked: true
narrative_locked_at: '2026-06-21T05:19:36.958122+00:00'
personas:
  amara:
    color: '#3843D0'
    intro: Amara manages Nigeria's national measles–rubella vaccination campaign and
      needs to see its real-time state and act on payments, verification, planning
      and coverage from one place.
    name: Amara
    role: National Campaign Manager
scenes:
- actions:
  - kind: wait_for
    must_succeed: true
    target: Overview
  - kind: hold
    seconds: 4
  concept_claim: 'The Overview is a real-time command center: server-computed KPIs
    over every worker (funding, enrolment/attendance/verification/payment progress,
    KYC + payment donuts).'
  design_intent: Land on a dense-but-legible dashboard; the numbers are real aggregates
    over the national roster, conveying "the whole campaign, live, on one screen".
  features:
  - description: Overview renders server-side KPIs (funding, progress, workforce,
      KYC/payment donuts) over all workers
    id: overview-realtime-kpis
    verify: 'Playwright: load /campaign/?campaign=MR-NAT-2026; assert the Overview
      KPI cards and the KYC/payment donuts render with non-zero values.'
  narrative: Amara opens her campaign and the whole thing is already in front of her
    — funding drawn down, enrolment and attendance climbing, verification and payment
    status broken out — so she starts the morning reading where the campaign actually
    stands instead of assembling it.
  persona: amara
  provenance: S1
  show: The national campaign Overview with its KPI cards, progress, and KYC/payment
    donuts loaded
  title: The campaign at a glance
  url: /campaign/?campaign=MR-NAT-2026
- actions:
  - kind: click
    must_succeed: true
    target: Workers
  - kind: wait_for
    target: Worker Payments
  - kind: click
    target: Worker Payments
  - kind: hold
    seconds: 4
  concept_claim: Approving a worker's payment is blocked server-side when the worker
    has rejected KYC or open fraud flags.
  design_intent: Show the payments queue with its rejected/blocked rows and the fraud
    filter — the guard couples KYC status to payability.
  features:
  - description: Payment approval is refused for workers with rejected KYC or fraud
      flags (server-enforced)
    id: payment-fraud-guard
    verify: 'Playwright: in Workers -> Payments, a worker with rejected KYC shows
      a non-approvable/Rejected payment status.'
  full_page: false
  narrative: Amara moves to payments to release this week's pay, and the tool stops
    her on a worker it won't let her approve — his identity check came back rejected
    — so the bad payment never leaves.
  persona: amara
  provenance: S2
  show: Amara opens Workers → Worker Payments where flagged/rejected-KYC workers cannot
    be approved
  title: The tool stops an ineligible payment
- actions:
  - kind: scroll_to
    target: Next
  - kind: click
    target: Next
  - kind: hold
    seconds: 3
  concept_claim: The tool holds a national-scale campaign (thousands of workers across
    all 37 states) and stays responsive via a paginated worker list.
  design_intent: Show the worker roster's scale — the worker count, the 37-state filter,
    and the pager — proving the single pane of glass holds the real campaign.
  features:
  - description: The worker roster is paginated server-side so a national-scale campaign
      stays usable
    id: paginated-national-roster
    verify: 'Playwright: in Workers -> Worker Payments, assert a national worker count,
      a 37-state filter, and pagination controls are shown.'
  full_page: false
  narrative: And it isn't a handful of workers - the same roster holds the whole nation,
    five thousand across every one of Nigeria's 37 states, and Amara pages straight
    through it without a stutter.
  persona: amara
  provenance: S8
  show: Amara pages through the national worker roster - 5,000 workers across 37 states
    - on the Payments view
  title: The whole country, and it stays fast
- actions:
  - kind: click
    must_succeed: true
    target: Workers
  - kind: wait_for
    must_succeed: true
    target: Worker KYC
  - kind: click
    target: Worker KYC
  - kind: hold
    seconds: 4
  concept_claim: KYC review shows verification status, submitted documents, and shared-identifier
    duplicate detection in one view.
  design_intent: Open the Worker KYC sub-tab; the verification status, documents,
    and the duplicate/shared-ID flags are visible together.
  features:
  - description: KYC view surfaces status, documents, and shared-identifier duplicate
      detection
    id: kyc-duplicate-detection
    verify: 'Playwright: in Workers -> Worker KYC, assert verification status, documents,
      and duplicate/shared-identifier flags are shown.'
  full_page: false
  narrative: Amara opens the worker's KYC to see why, and there it is — a duplicate
    national-ID flag tying him to another record — so she holds him instead of paying.
  persona: amara
  provenance: S3
  show: Amara opens Workers → Worker KYC and reviews verification, documents, and
    duplicate flags
  title: Verification, with the fraud signal attached
- actions:
  - kind: click
    must_succeed: true
    target: Activity
  - kind: wait_for
    must_succeed: true
    target: Microplanning & Budget
  - kind: click
    target: Microplanning & Budget
  - kind: hold
    seconds: 4
  concept_claim: Microplanning & Budget shows per-area planned-vs-actual workforce,
    budget vs spent, doses and coverage targets.
  design_intent: Open the Activity → Microplanning & Budget sub-tab with its per-area
    plan/actual rows, so the steer-the-campaign decision is grounded in numbers.
  features:
  - description: Per-area microplans track planned vs actual workforce, budget vs
      spent, doses and coverage targets
    id: microplan-plan-vs-actual
    verify: 'Playwright: in Activity -> Microplanning & Budget, assert a per-area
      row shows planned vs actual workforce and budget vs spent.'
  full_page: false
  narrative: Before she releases more funds Amara drops into the microplans and reads
    the planned workforce and budget against what's actually been spent and deployed.
  persona: amara
  provenance: S4
  show: Amara opens Activity → Microplanning & Budget and reads planned-vs-actual
    workforce and budget
  title: Planned versus actual, per area
- actions:
  - kind: click
    must_succeed: true
    target: Workers
  - kind: wait_for
    must_succeed: true
    target: Worker Profiles
  - kind: click
    target: Worker Profiles
  - kind: hold
    seconds: 4
  concept_claim: Each worker is a real CommCare case (read via the Case API) carrying
    its full Worker + KYC field set, placed on real Nigeria geography.
  design_intent: Open the Worker Profiles sub-tab showing the case-shaped fields +
    the real ward/LGA/state, conveying the demo == the production read.
  features:
  - description: Workers are CommCare cases on real AdminBoundary geography, read
      through the Case API
    id: worker-is-commcare-case
    verify: 'Playwright: in Workers -> Worker Profiles, assert CommCare-case fields
      (name, role, NIN) and a real ward/LGA/state placement are shown.'
  narrative: Amara opens the worker profiles and confirms what she's been acting on
    all morning is a real CommCare case on a real ward — name, role, NIN, location
    — not a mock.
  persona: amara
  provenance: S6
  show: Amara opens Workers → Worker Profiles showing the real CommCare-case fields
    and Nigeria placement
  title: A worker is a real CommCare case
- actions:
  - kind: click
    must_succeed: true
    target: System Administration
  - kind: wait_for
    must_succeed: true
    target: User Management
  - kind: click
    target: User Management
  - kind: wait_for
    must_succeed: true
    target: Activity log
  - kind: click
    target: Activity log
  - kind: scroll_to
    target: Activity & audit log
  - kind: hold
    seconds: 3
  concept_claim: Every privileged action (payment, KYC, user change) is written to
    an audit log under role-controlled access.
  design_intent: Open System Administration → User Management and scroll to the Activity
    & audit log, conveying the tool is an accountable admin surface, not a dashboard.
  features:
  - description: Privileged actions are recorded to an audit log; access is role-controlled
      (RBAC)
    id: audit-log-rbac
    verify: 'Playwright: in System Administration -> User Management, assert the audit
      log lists actions with actor, action, module and timestamp.'
  full_page: false
  narrative: Amara opens System Administration and reads the audit log — every payment
    hold and verification decision she just made, written down against the actor's
    name.
  persona: amara
  provenance: S7
  show: Amara opens System Administration → User Management and reviews the Activity
    & audit log
  title: Every decision, on the record
- actions:
  - kind: click
    must_succeed: true
    target: Reporting & Monitoring
  - kind: wait_for
    must_succeed: true
    target: Export data
  - kind: click
    target: Export data
  - kind: scroll_to
    target: Geographic coverage
  - kind: hold
    seconds: 3
  concept_claim: Reporting exports real CSV reports (and a custom-report builder)
    for donors.
  design_intent: Open Reporting and trigger the export — the report is a real download,
    the funder-facing payoff.
  features:
  - description: Reporting produces real CSV exports and a custom-report builder
    id: reporting-csv-export
    verify: 'Playwright: in Reporting click ''Export data''; assert a CSV download
      is triggered.'
  full_page: false
  narrative: Amara ends the morning on the reporting board - per-state coverage shaded
    by reach across all 37 states - and exports the week's numbers as a CSV she can
    hand straight to the donor.
  persona: amara
  provenance: S5
  show: Amara reviews per-state coverage on the Reporting board and exports a CSV
    report
  title: The donor's numbers, exported
tagline: Run a national vaccination campaign from one command center
