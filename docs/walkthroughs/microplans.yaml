# Unified spec for microplans — demo-driven-development v3 (cohesive narrative).
# REBUILT 2026-05-29 as ONE continuous multi-persona demo (Maya designs -> Sam cleans ->
# Maya measures), decomposed into ordered story-beat scenes (numbered from 1). Grounded in
# the CURRENT microplans code (PRs #299 shared core, #301 GeoPoDe selectable boundary source,
# #304 LLO planning-phase plan review/edit). Scene 4 (Sam cleans the plan) is the hero.
# Built scenes' `verify` assert current behavior; the delivery overlay (scene 1) and the
# monitoring/DiD payoff (scene 6) are the committed frontier — see the why-brief for status.

name: microplans
narrative: >-
  Maya, a program lead, needs to run a survey in a new region and prove it changed
  outcomes. She starts on the map where Connect delivery is already happening, picks
  the district that matters from real administrative boundaries, and turns it into a
  draft plan — a representative sample or full-coverage clusters — in one click.
  Because a map drawn by an algorithm always contains a lake that isn't a settlement,
  she hands the draft to Sam, the local partner who runs the field teams. Sam cleans
  it on a map — dropping invalid areas with a reason, rebalancing lopsided workloads —
  and every edit is logged as a planning-phase audit before anything touches Connect.
  The cleaned plan exports straight into Connect's microplanning importer. Weeks later
  Maya returns to the same plan to watch completion by treatment and comparison arm,
  and read the difference-in-differences the program actually produced.
base_url: https://labs.connect.dimagi.com
auth:
  type: session
why_brief: ../superpowers/ddd/microplans/why-brief.yaml

personas:
  lead:
    name: Maya
    role: Program / M&E Lead
    color: "#3B82F6"
    intro: Maya designs where the program works and proves it worked.
  llo:
    name: Sam
    role: Local Partner (LLO) field coordinator
    color: "#10B981"
    intro: Sam runs the field work and must trust the plan before sending teams out.

scenes:
  - persona: lead
    title: Maya starts where the work already is
    show: >-
      on the microplans setup map, toggle the "Connect delivery data" layer on and observe
      existing service-delivery activity before choosing an area.
    concept_claim: >-
      The setup map overlays the opportunity's existing Connect delivery points so Maya targets
      areas with real activity instead of guessing.
    provenance: delivery-viz
    design_intent: Anchor area choice to real delivery density — the one front-half capability still to wire.
    features:
      - id: delivery-geojson-endpoint
        description: A microplans endpoint returning the opp's existing Connect delivery units + visit points as GeoJSON, reusing the coverage app's build_du_geojson.
        verify: GET /microplans/<opp>/delivery-geojson returns a FeatureCollection with >=1 feature for a seeded opportunity.
      - id: delivery-layer-toggle
        description: A "Connect delivery data" toggle on the setup map that adds/removes the delivery layer.
        verify: Toggling the control adds a Mapbox source+layer for the delivery GeoJSON (assert map.getSource('delivery') defined after toggle).

  - persona: lead
    title: She picks the district that matters
    show: >-
      open the area picker, choose a country and admin level, pick the boundary SOURCE (bespoke
      GeoPoDe where shown, else Overture), drill the hierarchy with population displayed and select
      an area — or draw a polygon, or drop a pin with a radius.
    concept_claim: >-
      Maya selects a work area from real administrative boundaries with a per-level source choice
      (bespoke GeoPoDe or global Overture) and population shown, or by drawing, or by pin plus radius.
    provenance: area-selection
    design_intent: Source-attributed, population-bearing boundaries are reproducible and defensible; GeoPoDe beats Overture where loaded.
    features:
      - id: boundary-source-picker
        description: Per-(country,level) boundary source resolver + UI dropdown choosing bespoke GeoPoDe (PostGIS) vs Overture (global).
        verify: AdminAreasView returns areas with a source name; the setup.html source picker (syncSourcePicker) switches sources per level.
      - id: admin-hierarchy-drilldown
        description: Country -> level drill-down listing admin areas with population, narrowable by parent + name.
        verify: POST /microplans/<opp>/admin-areas {country, level, parent?} returns >=1 area each with a population value.
      - id: multi-input-area
        description: Three area-input modes resolve to a geometry — admin-area pick, drawn polygon, and pin+radius.
        verify: core/area_input.py:resolve_area returns a geometry for each of the three input kinds (unit test).

  - persona: lead
    title: One click turns the district into a draft plan
    show: >-
      choose sampling or coverage mode and Generate; watch PPS clusters + pins (sampling) or
      cluster work-area polygons covering every household (coverage) draw on the map.
    concept_claim: >-
      For the chosen area Maya generates a sampling plan (PPS rooftop frame) or a coverage plan
      (cluster-as-WorkArea, every household) on one shared footprint-to-cluster core.
    provenance: plan-generation
    design_intent: One engine, two intents; clustering strategy chosen per mode (kmeans_merge / balanced_kmeans / grid).
    features:
      - id: sampling-preview
        description: Sampling mode returns PPS clusters + selected pins (8 primary + 8 alternate, design weights) for the area.
        verify: POST /microplans/<opp>/preview-frame {areas, config} returns pins GeoJSON with >=1 feature and >=1 cluster hull.
      - id: coverage-preview
        description: Coverage mode returns cluster work-area polygons (each = visit every household) via balanced_kmeans/grid.
        verify: POST /microplans/<opp>/preview-coverage {areas, config} returns an areas GeoJSON with >=1 polygon feature.
      - id: clustering-strategies
        description: The shared core offers kmeans_merge (sampling), balanced_kmeans (even workloads), and grid_clusters.
        verify: core/clustering.py exposes all three strategies and each returns clusters for a test footprint set (unit test).

  - persona: llo
    title: Maya hands the draft to Sam, who knows the ground
    show: >-
      Sam opens the draft and materializes editable work areas, then on the map + table excludes the
      lake that isn't a settlement (with a reason), lasso-selects to bulk-exclude, resizes/regroups/
      reassigns the rest, and watches the per-worker workload rebalance live.
    concept_claim: >-
      Before anything touches Connect, Sam excludes invalid work areas with a reason and
      resizes/regroups/reassigns the rest on a map, and every edit is recorded as a planning-phase
      audit event in Connect's own history shape.
    provenance: plan-review
    design_intent: The generated frame is never field-ready as-is; a Connect-shaped, phase-tagged audit makes it trustworthy and joinable to execution history later.
    features:
      - id: materialize-plan
        description: The Review-and-edit-plan action materializes a microplan_plan record with one editable work area per cluster/pin.
        verify: MaterializePlanView creates a microplan_plan record whose work-area count equals the generated cluster count.
      - id: plan-edit-actions
        description: Exclude (required reason), unexclude, resize (expected_visit_count), regroup, reassign — single or bulk via lasso (wa_ids).
        verify: core/plan.py:apply_action applies each ACTION; a bulk exclude over wa_ids marks all selected EXCLUDED (test_plan.py).
      - id: workload-readout
        description: A live per-worker / per-group workload summary updates as Sam edits.
        verify: core/plan.py:summarize returns per-worker expected-visit totals that change after a resize/reassign (unit test).
      - id: phase-tagged-audit
        description: Every edit appends an event in Connect's pghistory shape (TRACKED_FIELDS) stamped phase="planning"; Connect itself is untouched.
        verify: apply_action records an audit event whose tracked fields match Connect's WorkArea history shape and phase=="planning" (test_plan.py).

  - persona: lead
    title: The cleaned plan lands in Connect
    show: >-
      export the cleaned plan as a work-area CSV and import it into Connect's microplanning importer.
    concept_claim: >-
      The cleaned plan exports as a Connect microplanning work-area CSV that excludes dropped areas and
      honors Sam's edits, matching Connect's importer headers.
    provenance: connect-push
    design_intent: A plan only matters once it's in Connect; CSV import works today without a prod write API.
    features:
      - id: cleaned-csv-export
        description: PlanCSVView exports the reviewed plan as CSV (excludes EXCLUDED, honors edits) with Connect importer headers.
        verify: GET the plan CSV — its header row matches Connect's WorkAreaCSVImporter columns and EXCLUDED work areas are absent.

  - persona: lead
    title: Weeks later, Maya sees whether it worked
    show: >-
      open the monitoring dashboard, observe per-work-area completion split by treatment vs comparison
      arm, and across rounds read the difference-in-differences estimate.
    concept_claim: >-
      A wired dashboard shows per-work-area completion by arm and, across monitoring rounds, reports the
      difference-in-differences between treatment and comparison areas.
    provenance: monitoring-impact
    design_intent: The payoff and committed frontier — the monitoring libraries exist but are unwired, and there is no round model or DiD estimator yet.
    features:
      - id: monitoring-wiring
        description: Wire a monitoring view/template that runs monitoring/pipeline.py (+ coverage.py) on the Connect export per work-area, split by arm.
        verify: GET /microplans/<opp>/monitoring returns per-work-area completion rows grouped into treatment and comparison arms.
      - id: round-model
        description: A longitudinal round model storing each monitoring snapshot as a dated round (baseline + follow-ups) per arm.
        verify: Ingesting two dated exports produces two round records per arm (assert 2 rounds x 2 arms == 4 points).
      - id: did-estimator
        description: Compute difference-in-differences on completion-rate — (Δtreatment) − (Δcomparison) between baseline and follow-up.
        verify: Given synthetic baseline+follow-up per-arm completion, the computed DiD equals the hand-computed value within tolerance (unit test).
