  - kind: wait_for
    target: text:has been notified
    note: the in-place confirmation "Awarded to <org> — the organization has been notified" renders
  - kind: hold
    seconds: 7.0
    note: VO-sized teach hold — settle on the confirmation + the dashed "Next step — not yet built" panel
