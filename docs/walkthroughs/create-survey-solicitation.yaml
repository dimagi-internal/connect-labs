auth:
  type: session
base_url: https://labs.connect.dimagi.com
name: create-survey-solicitation
narrative: Maya has just finished designing her Round 6 study — the two-arm Attakar-versus-Gura household
  survey that her Vitamin-A programme will use to check whether its visits are actually changing coverage.
  She has the plan; what she does not yet have is the independent survey firm to run it. So from the plan
  she just built, Maya clicks "Create solicitation" and lets the plan itself become the call for a firm.
  On the create form the R6 plan is already waiting as the coverage area, so Maya only sets the survey
  scope, marks the call active, and publishes it — minting a brand-new solicitation live, on camera, no
  fixed record reused. A survey firm then opens that exact public solicitation, reads the coverage on
  offer, ticks the Attakar-and-Gura area as the work its enumerators can staff, and submits its application.
  Back in her workspace, Maya opens the responses for the call she just published and sees the applying
  firm tied to the exact coverage area she designed — the loop from a study plan to a real applicant closed,
  minted fresh each render. Awarding that firm and standing up the live Connect opportunity her enumerators
  would actually run is the step Maya is reaching for next; today she has recruited and can compare applicants
  against the real coverage.
narrative_locked: true
narrative_locked_at: '2026-06-18T12:12:32.891224+00:00'
personas:
  firm:
    color: '#059669'
    intro: Sahel Field Research is an independent northern-Nigeria household-survey firm looking for survey
      work it can staff; it answers public solicitations with the coverage its enumerators can commit to.
      It names itself in the response form's "Your organization" block, so the owner reviews and awards a
      named firm rather than the individual account that submitted the application.
    name: Sahel Field Research
    role: Independent survey firm
  maya:
    color: '#7C3AED'
    intro: Maya designed the Round 6 two-arm Attakar-versus-Gura study for her Vitamin-A programme and
      now needs to recruit the independent firm that will run the household survey on it.
    name: Maya
    role: Program study planner
review_mode: autonomous
scenes:
- concept_claim: A program owner can launch a call for a firm directly from a finished micro-plan, because
    the study-group card carries a button that opens the solicitation form with that plan already attached
    as the source.
  design_intent: 'Bet: recruiting a firm is a continuation of designing the study, so the call starts
    from the plan the owner just built — not from a blank solicitation form.'
  features:
  - description: The program workspace (portfolio) renders a "Create solicitation" link on every plan
      card and study-group card, to /solicitations/create/?source_program_id=<pid>&source_group_id=<gid>
    id: create-solicitation-from-portfolio
    verify: 'Playwright: on /microplans/program/10008/, assert the R6 — Attakar × Gura study-group card
      reads as finished (the "Attakar × Gura" arm-pair title, a Reviewed status badge, the "Finished study
      — ready to recruit a survey firm" marker, "2 wards") and renders a primary "Create solicitation"
      anchor whose href contains source_group_id=4492'
  narrative: Maya's finished Round 6 study sits in her portfolio, flagged ready to solicit — and right
    on the card is the way to turn that plan into a call for a survey firm, no separate tool.
  persona: maya
  provenance: S3
  show: On the program portfolio Maya finds her finished R6 — Attakar × Gura study group card — the arm-pair
    title, a Reviewed status badge, the "Finished study — ready to recruit a survey firm" marker, "2 wards"
    — with Create solicitation as its primary action; that button carries the group's approved plan straight
    into a new solicitation.
  actions:
  - kind: wait_for
    target: css:a.primary-dark:has-text("Create solicitation")
    note: the finished R6 study-group card's primary "Create solicitation" CTA paints
  - kind: hold
    seconds: 2.0
    note: let the ready-to-solicit study card settle as the page hero
  - kind: hover
    target: css:a.primary-dark:has-text("Create solicitation")
    seconds: 1.5
    note: glide the cursor to the R6 group's primary "Create solicitation" CTA — the next scene navigates
      to it; we hover (not click) here so this capture stays on the portfolio that scene 1 is about
  - kind: hold
    seconds: 10.0
    note: VO-sized teach hold — this scene's narration runs ~14s; hold the finished study-group card on
      screen so the footage carries the full line instead of freezing on the last frame
  title: Maya turns her finished study into a call for a firm
  url: /microplans/program/10008/
  pace: teach
- concept_claim: The create form pre-seeds the source plan into a Coverage areas panel snapshotted at
    creation, and on submit mints a brand-new active solicitation whose id is read off the resulting responses
    page.
  design_intent: 'Bet: the owner should confirm the coverage the firm will see, frozen at creation, so
    later plan edits never silently change a published solicitation; and the call is minted live each
    render rather than reusing a fixed record.'
  features:
  - description: The create form renders a Coverage-areas panel populated from the snapshotted plans (source_plan_ids=[4494]),
      drawing the wards as a real map — Attakar (intervention, green) and Gura (comparison, blue) polygons
      fit to bounds
    id: coverage-panel-from-snapshot
    verify: 'Playwright: on the create form with source_group_id=4492, assert a "#sol-coverage-map" element
      renders a mapbox canvas and that the page text includes "Attakar" and "Gura"'
  - description: Submitting the create form with status=active mints a new type=solicitation record on
      program 10008 and redirects to /solicitations/<new-id>/responses/ ("Review and manage responses"),
      from which the new solicitation_id is captured on camera
    id: create-mints-active-solicitation
    verify: 'Playwright: after clicking "Create Solicitation" with status set to Active, assert the URL
      matches /solicitations/(\d+)/responses/?created=1 and the page reads "Solicitation published — organizations
      can now apply"'
  narrative: The create form already has her R6 plan waiting as the coverage area. She sets the scope,
    marks it active, and publishes — a brand-new call, minted live.
  persona: maya
  provenance: S4
  show: Maya reads the pre-seeded title and the Coverage-areas panel, which shows the R6 — Attakar × Gura
    coverage as a map (Attakar green / Gura blue ward polygons, not just names); she fills the Description,
    sets Status to Active, scrolls to the publish button, and clicks "Create Solicitation" — minting a
    fresh call and landing on its "Review and manage responses" page.
  actions:
  - kind: scroll_to
    target: css:#sol-coverage-map
    note: NON-effecting camera move bringing the Coverage-areas panel into frame. CRITICAL for the before-frame
      — because this leading action is NOT a wait_for, the recorder runs the full domcontentloaded + load
      + goto_settle_ms + initial_hold_ms flow (~2.7s of settle) before the before-frame fires, giving
      the Mapbox canvas time to paint the Attakar (green) / Gura (blue) ward polygons. With a leading
      wait_for the navigation used wait_until=commit and the before-frame caught the blank, unpainted,
      zoomed-out canvas. The before/after delta for this scene is the form fill (empty Description + Draft
      status → filled Description + Active), framed against the painted coverage panel.
  - kind: wait_for
    target: css:#sol-coverage-map canvas.mapboxgl-canvas
    note: the pre-seeded Coverage-areas map paints the Attakar/Gura ward polygons
  - kind: hover
    target: css:#sol-coverage-map
    seconds: 1.0
    note: glide the cursor over the snapshotted Coverage-areas panel — Maya confirms the exact coverage
      the firm will bid on
  - kind: scroll_to
    target: css:#id_description
    note: scroll down to the Description field — REQUIRED to publish; the pre-seed fills the title and
      scope from the plan but leaves Description for Maya to write
  - kind: fill
    target: css:#id_description
    value: Independent household survey to verify Vitamin-A program coverage across the Round 6 Attakar
      × Gura two-arm study — rooftop visits, GPS-stamped, ~285 treatment / 263 comparison surveys per
      round.
    note: Maya writes the survey scope into the required Description field
  - kind: select
    target: css:#id_status
    value: active
    note: set Status to Active — the form defaults to Draft, and can_accept_responses() requires status=='active',
      so without this scene 3's respond form would be blocked (a draft call accepts no responses)
  - kind: scroll_to
    target: css:button[type=submit]:has-text("Create Solicitation")
    note: bring the publish button into frame alongside the just-filled form — the ACTION frame for this
      scene is the completed-but-not-yet-published form (scope written, Status=Active, publish button in
      view), so the de-dweller has a teach frame ON the effecting act to land the narration on.
  - kind: hold
    seconds: 8.0
    note: ACTION-FRAME teach hold ON the act the narration describes — "she sets the scope, marks it active,
      and publishes." The footage rests on the FILLED form (Description written, Status=Active, Create
      Solicitation in frame) so the VO ("sets the scope, marks it active") carries on the act being performed,
      NOT on the result page. Sized ~8s so the de-dweller keeps this teach frame as the load-bearing one
      instead of the trailing responses page. The publish click then resolves the act on camera.
  - kind: click
    target: css:button[type=submit]:has-text("Create Solicitation")
    must_succeed: true
    note: Maya clicks Create Solicitation — the REAL publish. This mints a brand-new active solicitation
      on program 10008 (source_group_id=4492) live, on camera; the create view redirects to /solicitations/<new-id>/responses/,
      where the next action captures the fresh id. No fixed record is reused; ensure_demo.py sweeps every
      render's call before the next render.
  - kind: wait_for
    target: text:Solicitation published
    note: the post-create redirect lands on responses_list?created=1 with the success banner "Solicitation
      published — organizations can now apply" — the open call is now published and live, with a primary
      "View public page / Copy share link" action
  - kind: capture
    var: solicitation_id
    source: url
    pattern: /solicitations/(\d+)/
    must_succeed: true
    note: read the brand-new solicitation's id off the responses-page URL the create redirect produced;
      scenes 3/4/5 thread this fresh id forward via ${solicitation_id}
  - kind: hold
    seconds: 1.0
    note: brief settle on the "Solicitation published" confirmation banner so the publish lands on camera
  - kind: goto
    target: /solicitations/${solicitation_id}/?program_id=10008
    note: navigate to the just-minted call's PUBLIC detail page so the scene's END frame (the judge's
      after-snapshot) shows the ARTIFACT THE ACT PRODUCED — the live published call with its title, scope,
      and the Attakar × Gura coverage — rather than the empty "No responses yet" inbox. This makes the
      static hero frame depict "she published THIS call", aligned to the narration's act, not a blank list.
  - kind: wait_for
    target: text:Accepting Responses
    note: the public detail of the freshly published call has rendered (status badge "Accepting Responses"
      + the scope + coverage), confirming the call is live and open
  - kind: scroll_to
    target: css:#sol-coverage-map
    note: scroll the published call's Coverage-areas MAP into the viewport so the scene's END frame (the
      judge's hero) actually SHOWS the Attakar (green) × Gura (blue) ward polygons the narration sells —
      "the R6 plan already waiting as the coverage area." Without this the map sits below the fold and the
      hero is text-only; the differentiating visual of the published call belongs in frame.
  - kind: wait_for
    target: css:#sol-coverage-map canvas.mapboxgl-canvas
    seconds: 5
    note: best-effort (≤5s, non-blocking) wait for the public-detail coverage map to paint the Attakar/Gura
      polygons before the hero settle
  - kind: hold
    seconds: 3.0
    note: VO-sized teach settle framed ON the published call's coverage map — the minted-live artifact with
      its Attakar × Gura coverage visible — carrying the "a brand-new call, minted live" tail of the narration
      on the call Maya just created. This is the frame the judge sees as scene 2's hero.
  title: Maya mints the call live and lands on its responses page
  url: /solicitations/create/?program_id=10008&source_program_id=10008&source_group_id=4492
  full_page: false  # the scene ENDS on the published call's public detail page, which is long; a full-page
  # strip downscales to a blurry hero. Capture the VIEWPORT so the published-call header (title, "Accepting
  # Responses" status, scope) reads sharp at projector scale — the artifact the publish act produced.
  pace: teach
- concept_claim: A survey firm reads the public solicitation and applies by selecting a specific coverage
    area from a checklist, and submission is blocked until one area is chosen.
  design_intent: 'Bet: an application should commit to a concrete coverage area, not a free-text claim,
    so the owner compares applicants on the real area they will work.'
  features:
  - description: The public response form draws the coverage as an interactive map — clicking a ward boundary
      toggles its whole parent plan, synced two-way with the "Which areas can you cover?" checklist; submit
      is blocked until at least one area is selected
    id: respondent-coverage-selector
    verify: 'Playwright: on /solicitations/${solicitation_id}/respond/, assert a "#sol-respond-map" mapbox
      canvas renders the Attakar/Gura wards and a "#sol-plan-checklist" checkbox for the R6 plan; ticking
      the R6 area enables Submit (≥1 required to submit)'
  - description: The response form carries a "Your organization" identity block (firm name + contact email)
      so a firm answering a public call names itself; the entered firm name is stored as the response's
      org_name / submitted_by_name and shown to the owner on the responses list and award screen, instead
      of the individual account that submitted the form
    id: respondent-names-its-firm
    verify: 'Playwright: on /solicitations/${solicitation_id}/respond/, assert "#id_firm_name" and "#id_firm_email"
      inputs render; after filling firm name "Sahel Field Research" and submitting, the responses list row
      reads "Sahel Field Research" (not the operator account email)'
  - description: Submitting the response redirects to the solicitation's public detail page (/solicitations/${solicitation_id}/?submitted=1)
      which shows a "Response submitted" confirmation receipt for the coverage the firm committed to
    id: respond-submit-lands-on-receipt
    verify: 'Playwright: after clicking "Submit Response", assert the URL is /solicitations/${solicitation_id}/
      and the page text includes "Response submitted"'
  narrative: A survey firm opens the public call, ticks the Attakar-and-Gura coverage it can staff, and
    submits its application.
  persona: firm
  provenance: S5
  show: On the application form the survey firm names itself in the "Your organization" block (Sahel Field
    Research) and sees the R6 — Attakar × Gura coverage drawn as an interactive map (Attakar green / Gura
    blue); it selects the coverage by ticking the checklist entry, which enables the submit (at least one
    area is required), then submits — landing on the "Response submitted" confirmation receipt for its
    committed coverage.
  actions:
  - kind: scroll_to
    target: css:#sol-plan-checklist
    note: NON-effecting camera move scrolling the "Which areas can you cover?" checklist into frame. CRITICAL
      for the before-frame — because this leading action is NOT a wait_for, the recorder runs the full
      domcontentloaded + load + goto_settle_ms + initial_hold_ms flow, so the /respond/ form is fully
      painted and settled (checklist visible, Submit disabled — UNCHECKED state) before the before-frame
      fires. With a leading wait_for the navigation used wait_until=commit and the before-frame caught
      the crossfading-out owner manage view instead of this respond form.
  - kind: wait_for
    target: css:#sol-plan-checklist input[type=checkbox]
    note: gate on the coverage CHECKLIST checkbox — the load-bearing, always-present DOM element that
      proves the respond page (for the just-minted call) has loaded. This is the navigation gate; we do
      NOT gate on the Mapbox canvas here because the WebGL canvas paints later/asynchronously and a slow
      canvas must not block the (reliable) checklist click.
  - kind: wait_for
    target: css:#sol-respond-map canvas.mapboxgl-canvas
    seconds: 5
    note: best-effort wait (≤5s) for the coverage map to paint the Attakar (green) + Gura (blue) ward
      polygons — NON-blocking; if the WebGL canvas is slow this logs a timeout and we proceed, since the
      checklist (already present) is what the click needs. Capped at 5s so a slow canvas adds at most
      5s of dead air, not 12s.
  - kind: hold
    seconds: 1.5
    note: let the map settle and fit to the two wards — the form is now framed in its UNCHECKED state
      (Submit disabled); the next action ticks the coverage area, so the before/after pair shows the checklist-commit
      mechanic end-to-end (disabled → submitted)
  - kind: scroll_to
    target: css:#id_firm_name
    note: bring the "Your organization" identity fields into frame — a real firm names itself when it
      answers a public call; the owner reviews and awards a NAMED survey firm, not the individual account
      that submitted the form
  - kind: fill
    target: css:#id_firm_name
    value: Sahel Field Research
    note: the applying firm names itself — Sahel Field Research, a plausible northern-Nigeria independent
      household-survey firm. This is what renders on the responses list and award screen (org_name), so
      scenes 4-5 show a believable firm, NOT the operator's own ace@dimagi-ai.com dev account.
  - kind: fill
    target: css:#id_firm_email
    value: bids@sahelfieldresearch.org
    note: the firm's contact email — stored as submitted_by_email and shown beside the firm name on the
      responses list, replacing the operator account's email
  - kind: scroll_to
    target: css:#sol-plan-checklist
    note: scroll back to the coverage checklist now that the firm has identified itself, to commit the area
  - kind: click
    target: css:#sol-plan-checklist input[type=checkbox]
    must_succeed: true
    note: tick the coverage area — synced two-way with the map; this enables Submit (≥1 required). The
      created call has exactly one plan (R6 — Attakar × Gura), so the first checkbox is that area.
  - kind: scroll_to
    target: css:button[type=submit]:has-text("Submit Response")
    note: bring the Submit Response button into frame alongside the now-completed application — the ACTION
      frame for this scene is the firm-named, coverage-ticked, Submit-enabled form
  - kind: hold
    seconds: 7.0
    note: ACTION-FRAME teach hold ON the act the narration describes — "ticks the Attakar-and-Gura coverage
      it can staff, and submits its application." The footage rests on the COMPLETED application (Sahel
      Field Research named, R6 — Attakar × Gura coverage ticked, Submit enabled) so the VO carries on the
      act being performed, NOT on the result receipt. Sized ~7s so the de-dweller keeps this teach frame
      as the load-bearing one. The submit click then resolves the act on camera.
  - kind: click
    target: css:button[type=submit]:has-text("Submit Response")
    must_succeed: true
    note: submit the firm's application — the REAL submit; redirects to the call's public detail page
  - kind: wait_for
    target: text:Response submitted
    note: the post-submit redirect lands on public_detail?submitted=1 with the "Response submitted" confirmation
      receipt — the firm's application is recorded and the re-invite to respond/login is suppressed for
      the already-responded actor
  - kind: hold
    seconds: 1.5
    note: short RESULT settle on the "Response submitted" receipt confirming the application landed — kept
      short so the ACTION frame above (the completed application) stays the load-bearing teach frame
  title: A survey firm reads the open call and ticks the area it can staff
  url: /solicitations/${solicitation_id}/respond/?program_id=10008
  pace: teach
  full_page: false  # the post-submit receipt page is long; a full-page strip downscales to a blurry,
  # illegible hero. Capture the VIEWPORT only so the "Response submitted" confirmation reads sharp at
  # projector scale (the receipt header is at the top of the page, in-viewport).
- concept_claim: The owner reviewing responses sees each firm's committed coverage area resolved from
    the authoritative snapshot, tying every application to a concrete designed coverage.
  design_intent: 'Bet: the reviewer should compare applicants against the designed coverage, so the area
    the firm committed to is shown directly on the response.'
  features:
  - description: The responses list shows each response's selected_plan_names resolved against the solicitation
      snapshot, and renders an Award action linking to /solicitations/response/<response-id>/award/
    id: reviewer-sees-selected-coverage
    verify: 'Playwright: on /solicitations/${solicitation_id}/responses/, assert the submitted response
      row shows "R6 — Attakar" as its selected coverage area and an "Award" link whose href contains response/<id>/award'
  narrative: Back in her workspace, Maya opens the responses and sees Sahel Field Research tied to the exact
    coverage she designed.
  persona: maya
  provenance: S6
  show: On the responses page Maya sees Sahel Field Research's submitted application showing the selected
    coverage "R6 — Attakar × Gura", with View, Review, and Award actions ready; the Award link carries the
    response's id forward to the award screen.
  actions:
  - kind: wait_for
    target: css:span:has-text("R6 — Attakar")
    note: the response row's "Selected coverage" chip resolves to R6 — Attakar × Gura
  - kind: capture
    var: response_id
    source: element
    target: css:a:has-text("Award")
    attr: href
    pattern: response/(\d+)/
    must_succeed: true
    note: read the fresh response's id off the Award link's href (/solicitations/response/<id>/award/);
      scene 5 navigates to that award screen via ${response_id}. Done EARLY via a DOM href read (no scroll),
      so the camera need not scroll the wide table right to the Award column — keeping the firm's
      Organization column (leftmost) un-clipped in the hero frame below.
  - kind: hover
    target: css:a:has-text("Award")
    seconds: 2.5
    note: glance at the Award action Maya is reaching for next — hover only, the award itself happens in
      scene 5; reading the row does not mutate state. (This may scroll the table right; the trailing hover
      below scrolls it back so the firm-name hero is un-clipped.)
  - kind: scroll_to
    target: css:th:has-text("Organization")
    note: scroll the wide responses table back to its LEFT edge so the Organization column header + the
      firm's Organization cell are fully in frame for the hero (the earlier Award hover scrolled the table
      right, clipping "Organization" to "…GANIZATION" and the firm name to "…hel Field Research"). This
      camera move un-clips the firm identity that finding 1 fixed.
  - kind: hover
    target: css:span:has-text("R6 — Attakar")
    seconds: 3.5
    note: settle the cursor on the firm's Selected-coverage chip (R6 — Attakar × Gura), now beside a fully
      visible Organization column reading Sahel Field Research. This is the scene HERO — the named firm tied
      to the exact coverage Maya designed, un-clipped. Dwell sized up to carry the VO.
  title: Maya sees the firm tied to the coverage she designed
  url: /solicitations/${solicitation_id}/responses/?program_id=10008
  pace: teach
- concept_claim: Awarding the chosen firm records the decision and notifies the organization, while standing
    up the live Connect opportunity that firm would run is the next step, not yet built.
  design_intent: 'Bet: the demo must be honest about the planning-versus-execution boundary — awarding
    a firm is a real, shipped end-state, and field execution (provisioning the live opportunity) is the
    aspirational next step, not a shipped mechanism dressed up as done.'
  features:
  - description: The award screen summarizes the applying firm (Sahel Field Research, the name it entered
      on its application) with its selected coverage, and on award records the decision and confirms the
      organization was notified ("Awarded to Sahel Field Research — the organization has been notified");
      it does NOT, on award, provision a Connect opportunity or push the plan's work areas into one — that
      downstream step is deferred (G1)
